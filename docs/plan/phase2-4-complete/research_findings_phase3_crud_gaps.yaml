plan_id: phase2-4-complete
objective: "Map codebase patterns for Phase 3 items: P9-P17 (CRUD gaps and operational polish)"
focus_area: "Phase 3 — CRUD gaps, expert features, session management"
created_at: "2026-04-13"
created_by: gem-researcher
status: completed

tldr: |
  - P9 (Media): Frontend is list+audit+process only — no upload/delete/replace UI or backend endpoints. Backend has upsert, list, process, audit but no DELETE or file-upload endpoint.
  - P10 (Content Hierarchy): Backend has full CRUD for programs/tracks/modules/lessons/packages. Frontend is read-only (tabs for programs and packages). Big gap — needs edit/create forms.
  - P11 (Permission Templates): Backend has granular AdminPermissions (13 permissions) + AdminPermissionGrant entity. Frontend shows admin users but has no permission editing UI.
  - P12 (Bulk CSV Import): Backend has ContentImportService.BulkImportAsync for content — no USER CSV import exists. Frontend has user invite (single) but no bulk import.
  - P13 (Schedule Exceptions): Expert review schedule is weekly-only (GET/PUT /expert/schedule). Private speaking has date-override/block system. Review schedule lacks exception mechanism.
  - P14 (Expert Session Cancel): Backend has learner + admin cancel endpoints for private-speaking bookings. Expert-initiated cancel endpoint is MISSING.
  - P15 (Forum Moderation): Expert can post verified replies only. No delete/pin/ban/lock endpoints for experts — threads have isPinned/isLocked fields but no moderation API.
  - P16 (Mobile Review): NOT a dead stub — it's a fully functional multi-step review wizard (queue→read→score→comment→confirm). Calls real endpoints.
  - P17 (Session Management): RefreshTokenRecord entity tracks tokens per user with CreatedAt/RevokedAt/LastUsedAt. No listing/revoke-all endpoints or device-session UI exist.

research_metadata:
  methodology: "Hybrid retrieval: semantic_search + grep_search across frontend pages and backend endpoints/services/entities. Targeted read_file for all 9 focus areas."
  scope: "All admin, expert frontend pages for P9-P17. All backend endpoint files, service files, and domain entities relevant to media, content hierarchy, permissions, community, private speaking, auth tokens."
  confidence: high
  coverage: 92
  decision_blockers: 0
  research_blockers: 0

