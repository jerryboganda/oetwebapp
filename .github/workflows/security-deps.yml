name: Security — Dependency Vulnerabilities
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: deps-${{ github.ref }}
  cancel-in-progress: true
jobs:
  frontend-audit:
    name: pnpm audit (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high || true
  backend-vulnerable:
    name: dotnet vulnerable packages (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - run: dotnet restore backend/OetLearner.sln
      - name: List vulnerable packages
        run: dotnet list backend/OetLearner.sln package --vulnerable --include-transitive || true
