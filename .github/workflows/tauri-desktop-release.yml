name: Tauri Desktop Release

# Builds the Tauri 2 desktop shell (src-tauri/) for Windows (NSIS) and macOS (dmg).
# The shell is a remote-only thin client: it bundles no backend, no Next.js
# renderer, and no Node runtime, so the build is just `tauri build` (Rust core +
# a tiny bundled splash). See docs/tauri-desktop-shell.md.
#
# Triggers:
#  - Manual: workflow_dispatch with version + allow_unsigned inputs.
#  - Tag push: v*.*.*-tauri-desktop (e.g. v1.2.0-tauri-desktop) builds and uploads
#    artifacts. Publishing updater feeds / GitHub Releases stays a manual step.
#
# Required repository secrets:
#  - TAURI_SIGNING_PRIVATE_KEY           — minisign private key for updater artifacts
#                                          (generate: pnpm dlx @tauri-apps/cli signer generate;
#                                          the matching pubkey lives in src-tauri/tauri.conf.json)
#  - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — its password ('' if none)
#  Windows Authenticode (optional until wired into NSIS signCommand): the same
#  AZURE_* / WIN_CSC_* groups documented in desktop-release.yml.
#  macOS signing/notarisation (optional): APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#  APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID (tauri-cli reads these).
#
# NOTE: a green macOS build here does NOT discharge the migration plan's macOS
# gate — WKWebView microphone capture needs a one-time manual run on real
# hardware (no audio input or interactive permission prompts on CI runners).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to stamp into src-tauri/tauri.conf.json (e.g. 1.2.0)'
        required: true
        type: string
      allow_unsigned:
        description: 'Allow build without updater signing key (artifacts cannot be served to the auto-updater)'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*.*.*-tauri-desktop'

concurrency:
  group: tauri-desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  conformance:
    name: Bridge conformance gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: desktopBridge contract conformance (types/desktop.d.ts parity)
        run: pnpm vitest run src-tauri/__tests__/desktop-bridge-conformance.test.ts

  build:
    name: ${{ matrix.platform.name }}
    needs: conformance
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows x64 (NSIS)
            os: windows-latest
            bundle-glob: src-tauri/target/release/bundle/nsis/*
          - name: macOS arm64 (dmg)
            os: macos-latest
            bundle-glob: src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 90
    steps:
      # Repo has content files with paths > Windows MAX_PATH (260); enable long
      # paths before checkout so the Windows runner can write them.
      - name: Enable Git long paths
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
            v="${tag#v}"; v="${v%-tauri-desktop}"
          else
            v="${{ inputs.version }}"
          fi
          if ! echo "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.\-]+)?$'; then
            echo "Resolved version '$v' is not valid semver." >&2; exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved tauri desktop version: $v"

      - name: Stamp tauri.conf.json version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(p, 'utf8'));
            conf.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync(p, JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Stamp Cargo.toml version
        shell: bash
        run: |
          # Keep the crate version in lockstep with tauri.conf.json so
          # env!("CARGO_PKG_VERSION") (used by runtime_info + updater_check)
          # reports the shipped version. Only the [package] version is touched;
          # dependency lines are keyed by crate name, not a bare `version =`.
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/Cargo.toml';
            let toml = fs.readFileSync(p, 'utf8');
            toml = toml.replace(/^version = \"[^\"]*\"/m, 'version = \"${{ steps.version.outputs.version }}\"');
            fs.writeFileSync(p, toml);
          "

      - name: Validate updater signing configuration
        if: inputs.allow_unsigned != true
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is not configured. The auto-updater" >&2
            echo "refuses unsigned artifacts. Re-run with allow_unsigned=true for throwaway builds." >&2
            exit 1
          fi
          echo "Updater signing key detected."

      - name: Import Windows code-signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            Write-Host "No WINDOWS_CERTIFICATE secret set - skipping Authenticode import."
            Write-Host "NOTE: installer code-signing is disabled by default (no certificateThumbprint"
            Write-Host "in tauri.conf.json), so the Windows build produces an UNSIGNED NSIS installer."
            Write-Host "See README 'Desktop signing' to enable Authenticode."
            exit 0
          }
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $pfx = Join-Path $env:RUNNER_TEMP 'oet-codesign.pfx'
          [IO.File]::WriteAllBytes($pfx, $bytes)
          $pw = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw | Out-Null
          Remove-Item $pfx -Force
          Write-Host "Imported code-signing certificate into CurrentUser\My."

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build + bundle (tauri build — remote-only shell)
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Video playback attestation secret (64-hex chars) — embedded into the
          # Rust binary at COMPILE time via option_env!. Release builds without it
          # still compile but sign_video_challenge returns an error at runtime
          # ("attestation secret not embedded"); dev builds fall back to the
          # public dev constant.
          OET_DESKTOP_ATTEST_SECRET: ${{ secrets.OET_DESKTOP_ATTEST_SECRET }}
          # The shell loads the remote web app over HTTPS — there is no Next.js or
          # .NET build here. The remote URLs live in src-tauri/desktop-runtime-config.json.
          # macOS is built UNSIGNED (no Apple Developer ID, per the QA decision).
          # Do NOT pass empty APPLE_* env — tauri treats an empty APPLE_CERTIFICATE
          # as "import this cert" and fails ("security import ... not valid").
          # To enable macOS signing later, add the APPLE_* secrets and map them here.
        run: node scripts/tauri-dist.cjs build

      - name: Generate checksums
        shell: bash
        run: |
          set -e
          # Use `find` (not bash `globstar`) — macOS runners ship bash 3.2 where
          # `shopt -s globstar` is unavailable.
          mkdir -p dist/tauri-desktop
          found=0
          while IFS= read -r f; do
            cp "$f" dist/tauri-desktop/ && found=1
          done < <(find src-tauri/target/release/bundle -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.sig' -o -name '*.app.tar.gz' \))
          if [ "$found" -eq 0 ]; then
            echo "No bundle artifacts found for checksum generation." >&2; exit 1
          fi
          cd dist/tauri-desktop
          if command -v sha256sum >/dev/null; then
            sha256sum * > SHA256SUMS.txt
          else
            shasum -a 256 * > SHA256SUMS.txt
          fi
          cat SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-desktop-${{ runner.os }}-${{ steps.version.outputs.version }}
          path: dist/tauri-desktop/
          if-no-files-found: error
          retention-days: 90

  # On a tag push, gather both platforms' artifacts, build the Tauri updater
  # latest.json from the Windows .sig, and publish a GitHub Release with the
  # installers attached. (Hosting latest.json + the .exe/.sig on the prod feed
  # at /desktop/updates/ remains a manual VPS step — see docs/qa/TESTER_SETUP.md.)
  publish:
    name: Publish GitHub Release + updater feed
    needs: build
    # Run on tag push even if a build leg failed (e.g. macOS), as long as the
    # run wasn't cancelled. The Windows installer is required (the latest.json
    # step fails if its artifact is missing); the macOS dmg is best-effort.
    if: github.event_name == 'push' && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          tag="${{ github.ref_name }}"; v="${tag#v}"; v="${v%-tauri-desktop}"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble updater latest.json
        shell: bash
        run: |
          set -euo pipefail
          exe=$(find artifacts -name '*-setup.exe' | head -1)
          sig=$(find artifacts -name '*-setup.exe.sig' | head -1)
          if [ -z "$exe" ] || [ -z "$sig" ]; then
            echo "Missing Windows installer (.exe) or signature (.sig) in artifacts." >&2
            exit 1
          fi
          base_url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          # GitHub release assets replace spaces with dots in the asset name.
          asset_name=$(basename "$exe" | tr ' ' '.')
          win_sig=$(cat "$sig")
          platforms="    \"windows-x86_64\": {\n      \"signature\": \"${win_sig}\",\n      \"url\": \"${base_url}/${asset_name}\"\n    }"

          # macOS updater bundle is best-effort: the mac leg is built unsigned/
          # un-notarized and may be absent. Only add darwin-aarch64 when both the
          # updater tarball and its signature exist, so Windows releases never break.
          mac_tar=$(find artifacts -name '*.app.tar.gz' | head -1 || true)
          mac_sig_file=$(find artifacts -name '*.app.tar.gz.sig' | head -1 || true)
          if [ -n "$mac_tar" ] && [ -n "$mac_sig_file" ]; then
            mac_asset=$(basename "$mac_tar" | tr ' ' '.')
            mac_sig=$(cat "$mac_sig_file")
            platforms="${platforms},\n    \"darwin-aarch64\": {\n      \"signature\": \"${mac_sig}\",\n      \"url\": \"${base_url}/${mac_asset}\"\n    }"
          else
            echo "No macOS updater artifact (*.app.tar.gz[.sig]) — omitting darwin-aarch64 from latest.json."
          fi

          {
            echo '{'
            echo "  \"version\": \"${{ steps.version.outputs.version }}\","
            echo "  \"notes\": \"OET with Dr Hesham desktop ${{ steps.version.outputs.version }}\","
            echo "  \"pub_date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\","
            echo '  "platforms": {'
            printf '%b\n' "$platforms"
            echo '  }'
            echo '}'
          } > latest.json
          echo "Generated latest.json:"; cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: OET with Dr Hesham Desktop ${{ steps.version.outputs.version }}
          files: |
            artifacts/**/*-setup.exe
            artifacts/**/*-setup.exe.sig
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            latest.json
          body: |
            Internal-testing build of the OET with Dr Hesham desktop shell (Tauri 2).

            Install + certificate-trust steps: `docs/qa/TESTER_SETUP.md`.

            **Auto-update:** copy `latest.json`, the `*-setup.exe`, and its `.sig`
            to the prod feed at `/desktop/updates/` (see TESTER_SETUP §7).
