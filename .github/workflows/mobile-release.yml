name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - android
          - ios
          - both
        default: both
      version:
        description: 'Version name (e.g. 1.2.0)'
        required: true
        type: string
      version_code:
        description: 'Version code / build number (integer)'
        required: true
        type: string

concurrency:
  group: mobile-release
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ── Android Release AAB ────────────────────────────────────────
  android-release:
    name: Android Release
    if: inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Set version
        working-directory: android/app
        run: |
          sed -i "s/versionCode 1/versionCode ${{ inputs.version_code }}/" build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"${{ inputs.version }}\"/" build.gradle

      - name: Build Next.js
        run: npm run build
        env:
          CAPACITOR_APP_URL: https://app.oetwithdrhesham.co.uk

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storeFile=release-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab-${{ inputs.version }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk-${{ inputs.version }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

  # ── iOS Release IPA ────────────────────────────────────────────
  ios-release:
    name: iOS Release
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          CAPACITOR_APP_URL: https://app.oetwithdrhesham.co.uk

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Set version
        run: |
          cd ios/App
          agvtool new-marketing-version ${{ inputs.version }}
          agvtool new-version -all ${{ inputs.version_code }}

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/oetprep.mobileprovision

      - name: Build archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa-${{ inputs.version }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 90
