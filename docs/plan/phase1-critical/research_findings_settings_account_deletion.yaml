  interfaces_used_by_domain:
    - interface: AuthContextValue
      location: "contexts/auth-context.tsx"
      usage_pattern: "signOut() method resets all state to null; isAuthenticated becomes false. Components consuming useAuth() will redirect to login."
    - interface: SettingsSectionData
      location: "lib/mock-data (type definition)"
      usage_pattern: "{ section: SettingsSectionId; values: Record<string, unknown> }"
    - interface: SettingsSectionId
      location: "lib/mock-data (type definition)"
      usage_pattern: "Union type of valid section string IDs"

  data_flow_involving_domain: |
    Settings Hub (page.tsx) → fetchSettingsData() → GET /v1/settings → LearnerService.GetSettingsAsync()
    Settings Section ([section]/page.tsx) → fetchSettingsSection(section) → GET /v1/settings/{section} → LearnerService.GetSettingsSectionAsync()
    Settings Save → updateSettingsSection(section, values) → PATCH /v1/settings/{section} → LearnerService.PatchSettingsSectionAsync()
    Admin Delete → deleteAdminUser(userId, {reason}) → POST /v1/admin/users/{userId}/delete → AdminService.DeleteUserAsync() → sets DeletedAt + AccountStatus + revokes tokens
    Sign-out → signOutFromBackend() → POST /v1/auth/sign-out → AuthService.SignOutAsync() → revokes single refresh token → clearStoredSession()

  key_relationships_to_domain:
    - from: "app/settings/page.tsx"
      to: "app/settings/[section]/page.tsx"
      relationship: "routes to via router.push('/settings/{id}')"
    - from: "app/settings/[section]/page.tsx"
      to: "lib/api.ts"
      relationship: "calls fetchSettingsSection, updateSettingsSection"
    - from: "lib/api.ts"
      to: "backend/src/OetLearner.Api/Endpoints/LearnerEndpoints.cs"
      relationship: "HTTP calls to /v1/settings/* endpoints"
    - from: "contexts/auth-context.tsx"
      to: "lib/auth-client.ts"
      relationship: "imports signOut (and other auth functions)"
    - from: "AdminService.DeleteUserAsync"
      to: "ApplicationUserAccount.DeletedAt + LearnerUser.AccountStatus"
      relationship: "writes soft-delete markers"

