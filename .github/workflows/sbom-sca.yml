name: SBOM and SCA

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      fail_on:
        description: Vulnerability severity threshold for grype
        required: false
        default: high

concurrency:
  group: sbom-sca-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sbom-sca:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Collect release evidence bundle
        env:
          EVIDENCE_DIR: release-evidence
          SCA_FAIL_ON: ${{ inputs.fail_on || 'high' }}
        run: bash scripts/evidence-collect.sh

      - name: Upload SBOM/SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ github.sha }}
          path: release-evidence/
          if-no-files-found: error
