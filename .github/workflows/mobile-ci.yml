name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'lib/mobile/**'
      - 'components/mobile/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'android/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'lib/mobile/**'
      - 'components/mobile/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  # Capacitor 7 Android compiles against Java 21 (source/target release 21);
  # JDK 17 fails with "invalid source release: 21".
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm run lint

  # ── Mobile Unit Tests ──────────────────────────────────────────
  unit-tests:
    name: Mobile Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run mobile unit tests
        run: pnpm exec vitest run --reporter=verbose lib/mobile/ components/mobile/

  # ── Android Debug Build ────────────────────────────────────────
  android-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm run build
        env:
          CAPACITOR_APP_URL: https://app.oetwithdrhesham.co.uk

      - name: Capacitor sync
        run: pnpm exec cap sync android

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ── iOS Build Check ────────────────────────────────────────────
  ios-build:
    name: iOS Build Check
    runs-on: macos-latest
    timeout-minutes: 45
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm run build
        env:
          CAPACITOR_APP_URL: https://app.oetwithdrhesham.co.uk

      - name: Capacitor sync
        run: pnpm exec cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Build iOS (no code sign)
        working-directory: ios/App
        run: |
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
