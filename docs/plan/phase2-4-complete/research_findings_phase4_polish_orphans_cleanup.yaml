# ═══════════════════════════════════════════════════
# P21 — Fix toSubTest() and toExamFamilyCode()
# ═══════════════════════════════════════════════════

p21_hardcoded_mappers:
  summary: "toSubTest() defaults unknown codes to 'Writing' silently; toExamFamilyCode() defaults to 'oet'. Backend has /v1/reference/exam-families from DB."
  complexity_estimate: "medium — ~1 day (fetch from API + update all call sites)"

  toSubTest:
    file: "lib/api.ts"
    line: 103
    code: |
      function toSubTest(code: string): SubTest {
        switch (code?.toLowerCase()) {
          case 'writing': return 'Writing';
          case 'speaking': return 'Speaking';
          case 'reading': return 'Reading';
          case 'listening': return 'Listening';
          default:
            if (process.env.NODE_ENV === 'development') {
              console.warn('[API] Unknown subtest code:', code, '- defaulting to Writing');
            }
            return 'Writing';
        }
      }
    problem: "Silently defaults any unknown/null/undefined subtest code to 'Writing'. Only warns in development."
    call_sites: 13  # lines 696,705,850,876,951,1072,1402,1523,1638,1646,1906,1922,1934
    risk: "If backend sends a new subtest code or a typo, it silently converts to Writing — data corruption"
    fix_options:
      - "Throw an error for unknown codes (break-fast approach)"
      - "Return a sentinel like 'Unknown' and handle in UI"
      - "Log to analytics.track('unknown_subtest_code', { code })"

  toExamFamilyCode:
    file: "lib/api.ts"
    line: 143
    code: |
      function toExamFamilyCode(value: unknown): ExamFamilyCode {
        const normalized = typeof value === 'string' ? value.trim().toLowerCase() : '';
        if (normalized === 'ielts' || normalized === 'pte') { return normalized; }
        return 'oet';
      }
    problem: "Hardcoded to only recognize 'oet', 'ielts', 'pte'. Any new exam family defaults to 'oet'."
    call_sites: 3  # lines 696, 951, 1072

  reference_endpoint:
    exists: true
    route: "GET /v1/reference/exam-families"
    file: "backend/src/OetLearner.Api/Endpoints/LearnerEndpoints.cs"
    line: 195
    service: "LearnerService.GetExamFamiliesAsync (line 5838)"
    returns: |
      { examFamilies: [{ code, label, scoringModel, description, subtests, criteria, isActive }] }
    note: "Fetches from db.ExamFamilies table. Can be used at app startup to populate valid codes dynamically."

