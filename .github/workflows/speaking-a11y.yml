name: Speaking Module — Accessibility (axe)

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: ./.github/actions/setup-oet-stack
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: A11y suite
        run: pnpm exec playwright test tests/a11y --reporter=html,line
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speaking-a11y-report
          path: playwright-report
