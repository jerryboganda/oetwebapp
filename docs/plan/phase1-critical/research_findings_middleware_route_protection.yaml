patterns_found:
  - category: architecture
    pattern: "Client-only auth enforcement via React context + guard component"
    description: "All route protection happens client-side. AuthGuard is the single enforcement point, integrated into AppShell. No server-side (middleware) protection exists."
    examples:
      - file: components/layout/app-shell.tsx
        location: "app-shell.tsx:154"
        snippet: "<AuthGuard requiredRole={requiredRole}>{shellWithNotifications}</AuthGuard>"
      - file: components/auth/auth-guard.tsx
        location: "auth-guard.tsx:17"
        snippet: "export function AuthGuard({ children, requiredRole }: AuthGuardProps)"
    prevalence: common

  - category: architecture
    pattern: "Token storage in Web Storage (localStorage/sessionStorage), NOT cookies"
    description: "Auth sessions (JWT accessToken + refreshToken) are stored as JSON in localStorage (remember me) or sessionStorage (no remember me). No cookies are used for auth tokens. This means Next.js middleware CANNOT read auth state without a storage migration."
    examples:
      - file: lib/auth-storage.ts
        location: "auth-storage.ts:6-7"
        snippet: "const LOCAL_SESSION_KEY = 'oet.auth.session.local'; const SESSION_SESSION_KEY = 'oet.auth.session.session';"
      - file: lib/auth-storage.ts
        location: "auth-storage.ts:43"
        snippet: "persistWebStorageKey(key, JSON.stringify(session), persistence);"
    prevalence: common

  - category: architecture
    pattern: "Role-based route partitioning via file system route groups"
    description: "Routes are organized by role: app/(auth)/ for public auth pages, app/admin/ for admin role, app/expert/ for expert role, and top-level app/* routes for learner role."
    examples:
      - file: lib/auth-routes.ts
        location: "auth-routes.ts:13-26"
        snippet: "if (path.startsWith('/admin')) return role === 'admin'; if (path.startsWith('/expert')) return role === 'expert'; return role === 'learner';"
    prevalence: common

  - category: architecture
    pattern: "Hardcoded public route list in AuthGuard"
    description: "AuthGuard maintains a hardcoded list of paths that skip auth checks (isAuthRoute). Adding new public routes requires modifying this list."
    examples:
      - file: components/auth/auth-guard.tsx
        location: "auth-guard.tsx:23-34"
        snippet: "const isAuthRoute = nextPath === '/sign-in' || nextPath === '/register' || ..."
    prevalence: common

  - category: architecture
    pattern: "AppShell wraps AuthProvider conditionally"
    description: "AppShell checks if AuthContext already exists (from root providers) and only wraps in AuthProvider if absent, preventing duplicate providers."
    examples:
      - file: components/layout/app-shell.tsx
        location: "app-shell.tsx:~158"
        snippet: "return requireAuth && !hasAuthProvider ? <AuthProvider>{content}</AuthProvider> : content;"
    prevalence: common

  - category: architecture
    pattern: "Bearer token auth via Authorization header"
    description: "API calls attach the accessToken as a Bearer token in the Authorization header. No cookie-based auth with the backend."
    examples:
      - file: lib/auth-client.ts
        location: "auth-client.ts:68-72"
        snippet: "headers.set('Authorization', `Bearer ${accessToken}`);"
    prevalence: common

  - category: error_handling
    pattern: "MFA challenge interception"
    description: "Sign-in can return a pending MFA challenge instead of a session. AuthGuard checks pendingMfaChallenge and redirects to /mfa/challenge."
    examples:
      - file: components/auth/auth-guard.tsx
        location: "auth-guard.tsx:43-45"
        snippet: "if (pendingMfaChallenge) { router.replace(`/mfa/challenge?next=${encodeURIComponent(nextPath)}`); }"
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: AuthProvider (contexts/auth-context.tsx)
      responsibility: "Manages auth state (session, user, loading, error, MFA). Hydrates from storage on mount."
      location: contexts/auth-context.tsx
      relationship_to_domain: "Source of truth for auth state consumed by middleware candidates"
    - component: AuthGuard (components/auth/auth-guard.tsx)
      responsibility: "Client-side auth enforcement — redirects unauthenticated/wrong-role users"
      location: components/auth/auth-guard.tsx
      relationship_to_domain: "Current enforcement point that middleware would partially replace"
    - component: AppShell (components/layout/app-shell.tsx)
      responsibility: "Unified layout integrating AuthGuard, nav, and notifications"
      location: components/layout/app-shell.tsx
      relationship_to_domain: "Integration point where AuthGuard is wired into the component tree"
    - component: auth-storage (lib/auth-storage.ts)
      responsibility: "Persistence layer for JWT tokens in localStorage/sessionStorage"
      location: lib/auth-storage.ts
      relationship_to_domain: "CRITICAL: tokens stored here are NOT accessible in middleware (no cookies)"
    - component: auth-client (lib/auth-client.ts)
      responsibility: "Backend API communication for auth operations"
      location: lib/auth-client.ts
      relationship_to_domain: "Token refresh, session restore — all client-side"

  interfaces_used_by_domain:
    - interface: AuthSession
      location: lib/types/auth.ts:18
      usage_pattern: "accessToken + refreshToken + expiry + currentUser. Serialized to JSON in Web Storage."
    - interface: UserRole
      location: lib/types/auth.ts:1
      usage_pattern: "'learner' | 'expert' | 'admin' — used for route access decisions"
    - interface: CurrentUser
      location: lib/types/auth.ts:4
      usage_pattern: "userId, email, role, displayName, MFA/email verification flags"

  data_flow_involving_domain: |
    1. User signs in → auth-client.ts calls backend → receives AuthSession (accessToken, refreshToken, user).
    2. auth-storage.ts saves AuthSession JSON to localStorage (rememberMe) or sessionStorage.
    3. AuthProvider hydrates from auth-storage on mount → sets context state.
    4. AuthGuard reads from useAuth() context → if not authenticated, redirects to /sign-in.
    5. API calls use ensureFreshAccessToken() → reads from storage, refreshes if expired → attaches Bearer token.
    6. NO server-side component reads auth state. All auth checks are post-hydration client-side.

  key_relationships_to_domain:
    - from: app/layout.tsx
      to: app/providers.tsx
      relationship: "renders AppProviders"
    - from: app/providers.tsx
      to: contexts/auth-context.tsx
      relationship: "wraps children in AuthProvider"
    - from: contexts/auth-context.tsx
      to: lib/auth-client.ts
      relationship: "calls restoreSession, signIn, signOut etc."
    - from: lib/auth-client.ts
      to: lib/auth-storage.ts
      relationship: "reads/writes auth sessions"
    - from: components/auth/auth-guard.tsx
      to: contexts/auth-context.tsx
      relationship: "reads auth state via useAuth()"
    - from: components/layout/app-shell.tsx
      to: components/auth/auth-guard.tsx
      relationship: "wraps content in AuthGuard when requireAuth=true"
    - from: app/admin/layout.tsx
      to: components/layout/app-shell.tsx
      relationship: "uses AppShell with requiredRole='admin'"
    - from: app/expert/layout.tsx
      to: components/layout/app-shell.tsx
      relationship: "uses AppShell with requiredRole='expert'"

