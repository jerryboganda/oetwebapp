      status: complete
      has_tests: false
      platform_guarded: false
      notes: "Used by capacitor.config.ts at build time"

    - file: runtime.ts
      purpose: "Core mobile runtime initialization — keyboard, status bar, splash screen, network, back button, app state, viewport metrics, color scheme sync"
