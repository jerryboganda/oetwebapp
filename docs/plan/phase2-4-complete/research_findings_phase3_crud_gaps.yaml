patterns_found:
  - category: architecture
    pattern: "List-only admin pages for complex domains"
    description: "Admin media and content hierarchy pages only consume GET/list endpoints. Backend has full CRUD service methods but the frontend never calls create/update/delete."
    examples:
      - file: app/admin/media/page.tsx
        location: "line 1-130"
        snippet: "Uses fetchAdminMediaAssets (list), fetchAdminMediaAudit (audit), adminProcessMediaAsset (process) — no upload/delete/replace"
      - file: app/admin/content-hierarchy/page.tsx
        location: "line 1-112"
        snippet: "Uses fetchAdminContentPrograms, fetchAdminContentPackages — no create/update/delete forms"
    prevalence: common

  - category: architecture
    pattern: "Expert feature specialization gap"
    description: "Expert cancel for private speaking sessions is missing. Learner and admin both have cancel, but expert has no cancel endpoint."
    examples:
      - file: backend/src/OetLearner.Api/Endpoints/PrivateSpeakingEndpoints.cs
        location: "line 160-261"
        snippet: "Expert section has: profile, sessions, sessions/{id}, availability, availability POST, availability DELETE — no cancel"
    prevalence: occasional

  - category: architecture
    pattern: "Backend-ready, frontend-missing CRUD"
    description: "ContentHierarchyService has CreateProgram, UpdateProgram, CreateTrack, UpdateTrack, CreateModule, UpdateModule, CreateLesson, CreatePackage, UpdatePackage — none exposed in frontend"
    examples:
      - file: backend/src/OetLearner.Api/Services/ContentHierarchyService.cs
        location: "line 29-170"
        snippet: "Full CRUD service methods for programs, tracks, modules, lessons, packages"
    prevalence: common

  - category: architecture
    pattern: "Permission model defined but not surfaced"
    description: "AdminPermissions has 13 granular constants, AdminPermissionGrant entity exists, but no endpoint to assign/revoke permissions and no frontend UI."
    examples:
      - file: backend/src/OetLearner.Api/Domain/AuthEntities.cs
        location: "line 139-186"
        snippet: "AdminPermissions constants + AdminPermissionGrant entity"
    prevalence: rare

  - category: architecture
    pattern: "Date-specific override pattern (private speaking)"
    description: "Private speaking has a date-override system (block/add availability on specific dates). Review schedule has no equivalent — only weekly recurring."
    examples:
      - file: backend/src/OetLearner.Api/Domain/PrivateSpeakingEntities.cs
        location: "line 146"
        snippet: "Date-specific availability override (block or add availability on a specific date)"
    prevalence: occasional

