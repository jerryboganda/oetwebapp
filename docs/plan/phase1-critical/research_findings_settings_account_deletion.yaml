patterns_found:
  - category: architecture
    pattern: "Hub-and-spoke settings navigation"
    description: "Settings has a hub page (app/settings/page.tsx) that shows grouped cards, each linking to a dynamic route (app/settings/[section]/page.tsx) that renders section-specific forms. A static SECTION_CONFIG record maps section IDs to full config objects."
    examples:
      - file: app/settings/page.tsx
        location: "lines 39-76"
        snippet: "const settingsGroups: SettingGroup[] = [{title: 'Account & Privacy', items: [{id: 'profile'...}, {id: 'privacy'...}]}, ...]"
      - file: app/settings/[section]/page.tsx
        location: "lines ~157-600"
        snippet: "const SECTION_CONFIG: Record<SettingsSectionId, SectionConfig> = { profile: {...}, privacy: {...}, ... }"
    prevalence: common

  - category: architecture
    pattern: "Soft-delete via dual fields"
    description: "Account deletion uses TWO fields: ApplicationUserAccount.DeletedAt (DateTimeOffset?) as the auth-level marker, and LearnerUser.AccountStatus (string) as the domain-level status. Both must be set during delete and cleared during restore."
    examples:
      - file: backend/src/OetLearner.Api/Services/AdminService.cs
        location: "lines 1585-1592"
        snippet: "learner.AccountStatus = DeletedUserStatus; authAccount.DeletedAt = now; authAccount.UpdatedAt = now; await RevokeRefreshTokensAsync(authAccount.Id, ct);"
    prevalence: common

  - category: architecture
    pattern: "Endpoint mapping via static extension methods"
    description: "Each endpoint file defines a static class with a MapXxxEndpoints extension method on IEndpointRouteBuilder. Creates a MapGroup with a base path, then chains individual endpoint mappings with inline lambdas that delegate to service methods."
    examples:
      - file: backend/src/OetLearner.Api/Endpoints/AuthEndpoints.cs
        location: "lines 10-14"
        snippet: "public static IEndpointRouteBuilder MapAuthEndpoints(this IEndpointRouteBuilder app) { var auth = app.MapGroup('/v1/auth'); auth.MapPost('/register', async (...) => Results.Ok(await service.RegisterLearnerAsync(...))).AllowAnonymous(); }"
      - file: backend/src/OetLearner.Api/Endpoints/LearnerEndpoints.cs
        location: "lines 10-12"
        snippet: "var v1 = app.MapGroup('/v1').RequireAuthorization('LearnerOnly');"
    prevalence: common

  - category: architecture
    pattern: "API layer with apiRequest core function"
    description: "All frontend API calls go through apiRequest<T>(path, init) in lib/api.ts. It handles auth token injection (ensureFreshAccessToken), retry with exponential backoff on 5xx/408/429, typed errors via ApiError class, and timeout via fetchWithTimeout."
    examples:
      - file: lib/api.ts
        location: "line 312"
        snippet: "async function apiRequest<T = any>(path: string, init?: RequestInit): Promise<T>"
      - file: lib/api.ts
        location: "lines 775-778"
        snippet: "export async function updateSettingsSection(section: '...', values: Record<string, unknown>): Promise<ApiRecord> { return apiRequest<ApiRecord>(`/v1/settings/${section}`, { method: 'PATCH', body: JSON.stringify({ values }) }); }"
    prevalence: common

  - category: architecture
    pattern: "Admin lifecycle pattern (delete/restore with reason and audit)"
    description: "Admin delete/restore uses POST endpoints (not DELETE verb) with an optional reason field, rate-limited via 'PerUserWrite'. Service method takes adminId + adminName for audit logging. Returns { id, status } response."
    examples:
      - file: backend/src/OetLearner.Api/Endpoints/AdminEndpoints.cs
        location: "lines 195-200"
        snippet: "admin.MapPost('/users/{userId}/delete', async (string userId, HttpContext http, AdminUserLifecycleRequest request, AdminService service, CancellationToken ct) => Results.Ok(await service.DeleteUserAsync(http.AdminId(), http.AdminName(), userId, request, ct))).RequireRateLimiting('PerUserWrite');"
    prevalence: common

  - category: structure
    pattern: "Component library imports in settings"
    description: "Settings pages consistently use: LearnerDashboardShell (layout shell with pageTitle, subtitle, backHref), LearnerPageHero (hero section with eyebrow, icon, accent, highlights), LearnerSurfaceSectionHeader (section headers), InlineAlert (error/warning/success), Badge, Button, Skeleton, MotionSection/MotionItem (from motion-primitives), Card, Toast."
    examples:
      - file: app/settings/page.tsx
        location: "lines 1-20"
        snippet: "import { LearnerDashboardShell } from '@/components/layout'; import { InlineAlert } from '@/components/ui/alert'; import { LearnerPageHero, LearnerSurfaceSectionHeader } from '@/components/domain';"
    prevalence: common

  - category: naming
    pattern: "Settings section IDs"
    description: "Section IDs used across frontend and backend: profile, privacy, goals, study, notifications, audio, accessibility. These are used as URL segments (/settings/{section}), API paths (/v1/settings/{section}), and SECTION_CONFIG keys."
    examples:
      - file: app/settings/[section]/page.tsx
        location: "line ~157"
        snippet: "const SECTION_CONFIG: Record<SettingsSectionId, SectionConfig> = { profile: {...}, privacy: {...}, notifications: {...}, audio: {...}, accessibility: {...}, study: {...}, goals: {...} }"
    prevalence: common

  - category: error_handling
    pattern: "Freeze-aware settings guard"
    description: "Settings hub checks freeze status and blocks modifications when account is frozen. Shows InlineAlert warning and sets cursor-not-allowed on items."
    examples:
      - file: app/settings/page.tsx
        location: "lines 118-121"
        snippet: "if (freezeState?.currentFreeze) { setError('Settings are read-only while your account is frozen.'); return; }"
    prevalence: occasional

