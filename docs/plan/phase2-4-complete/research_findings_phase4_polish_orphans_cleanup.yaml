# ═══════════════════════════════════════════════════
# P19 — Fix Error Swallowing in lib/api.ts
# ═══════════════════════════════════════════════════

p19_error_swallowing:
  summary: "4 catch blocks found. 2 are intentional JSON-parse fallbacks, 1 is cache cleanup, 1 is response JSON parse fallback."
  complexity_estimate: "small — ~1 hour"

  catch_blocks:
    - location: "lib/api.ts:333"
      function: "apiRequest"
      context: "Inside the error-response parsing try/catch — attempts response.json() to extract error details"
      code_snippet: |
        try {
          const error = await response.json();
          code = error.code ?? code;
          message = error.message ?? error.title ?? message;
          ...
        } catch {
          retryable = isRetryable(response.status);
        }
      severity: "benign"
      reason: "If error response body isn't JSON, falls back to status-based retryable. Acceptable pattern."
      recommendation: "Optional: add console.warn in development only"

    - location: "lib/api.ts:394"
      function: "uploadBinary"
      code_snippet: |
        try {
          const error = await response.json();
          message = error.message ?? error.title ?? message;
        } catch {
          // noop
        }
      severity: "low"
      reason: "Swallows JSON parse failure on upload error response. The outer throw still propagates."
      recommendation: "Add console.warn for upload error parse failures"

    - location: "lib/api.ts:411"
      function: "fetchAuthorizedObjectUrl"
      code_snippet: |
        try {
          const error = await response.json();
          message = error.message ?? error.title ?? message;
        } catch {
          // noop
        }
      severity: "low"
      reason: "Same pattern as uploadBinary — swallows JSON parse failure on error response."
      recommendation: "Add console.warn for object URL fetch parse failures"

    - location: "lib/api.ts:455"
      function: "ensureAttempt"
      code_snippet: |
        try {
          const existing = await apiRequest<ApiRecord>(`/v1/${subtest}/attempts/${cached}`);
          if (existing.state !== 'completed') { return existing; }
          cacheRemove(key);
        } catch {
          cacheRemove(key);
        }
      severity: "medium"
      reason: "Silently removes cache entry if API call fails. Could mask real errors vs 404."
      recommendation: "Distinguish 404 (stale cache) from 5xx (real error); only remove on 404"

  error_pattern_elsewhere: |
    The file uses a robust ApiError class throughout:
    - ApiError(status, code, message, retryable, fieldErrors) thrown from apiRequest()
    - isApiError() type guard exported for consumers
    - Retry logic for 5xx/408/429 with exponential backoff (RETRY_DELAYS array)
    - DOMException AbortError handling for timeouts
    - Network error wrapping as ApiError(0, 'network_error', ...)

