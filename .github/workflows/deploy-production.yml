name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      approver:
        description: "Named deploy approver"
        required: true
        type: string
      target_sha:
        description: "Full 40-character Git SHA to deploy."
        required: true
        type: string
      web_image:
        description: "Immutable web image ref, including @sha256 digest."
        required: true
        type: string
      api_image:
        description: "Immutable API image ref, including @sha256 digest."
        required: true
        type: string
      db_backup_image:
        description: "Immutable DB backup image ref, including @sha256 digest."
        required: true
        type: string
      router_image:
        description: "Immutable router image ref, including @sha256 digest."
        required: true
        type: string
      reading_media_smoke_ack:
        description: "I confirm the deploy-gate Reading/media smoke checklist is ready to run after deploy"
        required: true
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ format('{0}', 'production') }}

    steps:
      - name: Enforce production deploy gate inputs
        shell: bash
        env:
          APPROVER: ${{ inputs.approver }}
          READING_MEDIA_SMOKE_ACK: ${{ inputs.reading_media_smoke_ack }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          if [ "$APPROVER" != "Dr Faisal Maqsood" ]; then
            echo "Production deploy approver must be Dr Faisal Maqsood." >&2
            exit 1
          fi
          if [ "$READING_MEDIA_SMOKE_ACK" != "true" ]; then
            echo "Reading/media smoke checklist acknowledgement is required." >&2
            exit 1
          fi
          case "$TARGET_SHA" in
            *[!0-9a-fA-F]*)
              echo "target_sha must be hexadecimal." >&2
              exit 1
              ;;
          esac
          if [ "${#TARGET_SHA}" -ne 40 ]; then
            echo "target_sha must be a full 40-character SHA." >&2
            exit 1
          fi

      - name: Check deployment secrets
        id: secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_FINGERPRINT: ${{ vars.VPS_SSH_FINGERPRINT }}
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_USER" ] && [ -n "$VPS_SSH_KEY" ] && [ -n "$VPS_APP_DIR" ] && [ -n "$VPS_SSH_FINGERPRINT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "port=${VPS_PORT:-22}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate immutable image digest inputs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ inputs.target_sha }}
          WEB_IMAGE: ${{ inputs.web_image }}
          API_IMAGE: ${{ inputs.api_image }}
          DB_BACKUP_IMAGE: ${{ inputs.db_backup_image }}
          ROUTER_IMAGE: ${{ inputs.router_image }}
        run: |
          require_digest_ref() {
            local key="$1"
            local value="${!key:-}"
            local digest
            case "$value" in
              *@sha256:*) ;;
              *) echo "$key must be an immutable @sha256 image ref." >&2; exit 1 ;;
            esac
            digest="${value##*@sha256:}"
            case "$digest" in
              *[!0-9a-fA-F]*) echo "$key digest must be hexadecimal." >&2; exit 1 ;;
            esac
            if [ "${#digest}" -ne 64 ]; then
              echo "$key digest must be 64 hex characters." >&2
              exit 1
            fi
          }
          for key in WEB_IMAGE API_IMAGE DB_BACKUP_IMAGE ROUTER_IMAGE; do
            require_digest_ref "$key"
          done
          require_successful_run() {
            local workflow="$1"
            if ! gh run list --workflow "$workflow" --commit "$TARGET_SHA" --status success --limit 1 --json databaseId --jq '.[0].databaseId' | grep -Eq '^[0-9]+$'; then
              echo "No successful $workflow run found for $TARGET_SHA." >&2
              exit 1
            fi
          }
          require_successful_run qa-smoke.yml
          sbom_run_id="$(gh run list --workflow sbom-sca.yml --commit "$TARGET_SHA" --status success --limit 1 --json databaseId --jq '.[0].databaseId')"
          if ! printf '%s' "$sbom_run_id" | grep -Eq '^[0-9]+$'; then
            echo "No successful sbom-sca.yml run found for $TARGET_SHA." >&2
            exit 1
          fi
          rm -rf sbom-sca-refs
          if ! gh run download "$sbom_run_id" --name "sbom-sca-${TARGET_SHA}" --dir sbom-sca-refs >/dev/null 2>&1; then
            echo "No SBOM/SCA artifact found for $TARGET_SHA." >&2
            exit 1
          fi
          artifact_name="release-images-${TARGET_SHA}"
          found=false
          for run_id in $(gh run list --workflow build-release-images.yml --commit "$TARGET_SHA" --status success --limit 20 --json databaseId --jq '.[].databaseId'); do
            rm -rf release-image-refs
            if gh run download "$run_id" --name "$artifact_name" --dir release-image-refs >/dev/null 2>&1; then
              found=true
              break
            fi
          done
          if [ "$found" != "true" ]; then
            echo "No successful build-release-images.yml artifact found for $TARGET_SHA." >&2
            exit 1
          fi
          if [ ! -f release-image-refs/release-images.env ]; then
            echo "$artifact_name is missing release-images.env." >&2
            exit 1
          fi
          while IFS='=' read -r key value; do
            case "$key" in
              WEB_IMAGE|API_IMAGE|DB_BACKUP_IMAGE|ROUTER_IMAGE)
                if [ "${!key:-}" != "$value" ]; then
                  echo "$key does not match the immutable ref produced for $TARGET_SHA." >&2
                  echo "Expected: $value" >&2
                  echo "Received: ${!key:-}" >&2
                  exit 1
                fi
                ;;
            esac
          done < release-image-refs/release-images.env

      - name: Fail deploy when secrets are missing
        if: steps.secrets.outputs.enabled != 'true'
        run: |
          echo "Production deploy secrets are not configured; refusing to produce a green no-op deploy." >&2
          exit 1

      - name: Deploy over SSH
        if: steps.secrets.outputs.enabled == 'true'
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          TARGET_SHA: ${{ inputs.target_sha }}
          WEB_IMAGE: ${{ inputs.web_image }}
          API_IMAGE: ${{ inputs.api_image }}
          DB_BACKUP_IMAGE: ${{ inputs.db_backup_image }}
          ROUTER_IMAGE: ${{ inputs.router_image }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          APP_PUBLIC_URL: https://app.oetwithdrhesham.co.uk
          API_PUBLIC_URL: https://api.oetwithdrhesham.co.uk
          READING_MEDIA_SMOKE_ACK: ${{ inputs.reading_media_smoke_ack }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.secrets.outputs.port }}
          fingerprint: ${{ vars.VPS_SSH_FINGERPRINT }}
          command_timeout: 30m
          script_stop: true
          envs: VPS_APP_DIR,TARGET_SHA,WEB_IMAGE,API_IMAGE,DB_BACKUP_IMAGE,ROUTER_IMAGE,GHCR_USERNAME,GHCR_TOKEN,APP_PUBLIC_URL,API_PUBLIC_URL,READING_MEDIA_SMOKE_ACK
          script: |
            set -eo pipefail
            echo "[ci] SSH connected at $(date -u)"
            cd "$VPS_APP_DIR"
            if [ "$(pwd)" != "/opt/oetwebapp" ]; then
              echo "[ci] refusing deploy from stale/noncanonical checkout: $(pwd)" >&2
              exit 1
            fi
            git fetch origin main --tags
            if ! git cat-file -e "$TARGET_SHA^{commit}" 2>/dev/null; then
              git fetch origin "$TARGET_SHA"
            fi
            rm -rf .deploy/incoming-driver
            mkdir -p .deploy/incoming-driver
            git archive "$TARGET_SHA" scripts | tar -x -C .deploy/incoming-driver
            DOCKER_CONFIG="$(mktemp -d)"
            export DOCKER_CONFIG
            trap 'docker logout ghcr.io >/dev/null 2>&1 || true; rm -rf "$DOCKER_CONFIG"' EXIT
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin >/dev/null
            echo "[ci] running gated deploy wrapper..."
            VPS_APP_DIR="$VPS_APP_DIR" DEPLOY_REF="$TARGET_SHA" WEB_IMAGE="$WEB_IMAGE" API_IMAGE="$API_IMAGE" DB_BACKUP_IMAGE="$DB_BACKUP_IMAGE" ROUTER_IMAGE="$ROUTER_IMAGE" APP_PUBLIC_URL="$APP_PUBLIC_URL" API_PUBLIC_URL="$API_PUBLIC_URL" bash .deploy/incoming-driver/scripts/deploy/deploy-prod.sh
            echo "[ci] deploy-gate Reading/media smoke acknowledgement: $READING_MEDIA_SMOKE_ACK"
            echo "[ci] SSH session complete at $(date -u)"
