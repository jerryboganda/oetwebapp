# ═══════════════════════════════════════════════════════════════════════
# SECTION 2: RBAC MATRIX
# ═══════════════════════════════════════════════════════════════════════

rbac:
  jwt_config:
    algorithm: HS256_symmetric
    token_validation:
      validates: [issuer, audience, lifetime, signing_key]
      name_claim: ClaimTypes.NameIdentifier
      role_claim: ClaimTypes.Role
      map_inbound_claims: false
    on_token_validated:
      - "Checks auth_account_id claim present"
      - "Looks up ApplicationUserAccount in DB"
      - "Fails if account is null or deleted"
      - "If role=learner, checks User.AccountStatus == 'active' (suspension)"
      - "If role=expert, checks ExpertUsers.IsActive (suspension)"
    development_auth:
      scheme: "DevelopmentOrJwt hybrid policy scheme"
      condition: "Auth:UseDevelopmentAuth=true AND Environment.IsDevelopment()"
      handler: "DevelopmentAuthHandler — fails closed outside Development"

  role_policies:
    LearnerOnly:
      requires: [authenticated, "role=learner"]
    ExpertOnly:
      requires: [authenticated, "role=expert", "email_verified=true"]
    AdminOnly:
      requires: [authenticated, "role=admin", "email_verified=true"]
    SponsorOnly:
      requires: [authenticated, "role=sponsor", "email_verified=true"]

  granular_admin_permission_policies:
    AdminContentRead:   { requires: ["admin", "content:read OR system_admin"] }
    AdminContentWrite:  { requires: ["admin", "content:write OR system_admin"] }
    AdminContentPublish: { requires: ["admin", "content:publish OR system_admin"] }
    AdminContentEditorReview: { requires: ["admin", "content:editor_review OR content:publish OR system_admin"] }
    AdminContentPublisherApproval: { requires: ["admin", "content:publisher_approval OR content:publish OR system_admin"] }
    AdminBillingRead:   { requires: ["admin", "billing:read OR system_admin"] }
    AdminBillingWrite:  { requires: ["admin", "billing:write OR system_admin"] }
    AdminUsersRead:     { requires: ["admin", "users:read OR system_admin"] }
    AdminUsersWrite:    { requires: ["admin", "users:write OR system_admin"] }
    AdminReviewOps:     { requires: ["admin", "review_ops OR system_admin"] }
    AdminSystemAdmin:   { requires: ["admin", "system_admin"] }

  note_admin_granular_policies_not_applied: |
    The granular admin permission policies (AdminContentRead, AdminContentWrite, etc.) are DEFINED
    in Program.cs but NOT currently applied to any endpoint groups — AdminEndpoints.cs uses
    the broad "AdminOnly" policy for the entire /v1/admin group. The granular policies exist
    for future fine-grained enforcement but are not wired to specific endpoints yet.

  endpoint_role_matrix:
    AllowAnonymous:
      - "/health/*"
      - "/v1/auth/register"
      - "/v1/auth/catalog/signup"
      - "/v1/auth/sign-in"
      - "/v1/auth/external/*/start"
      - "/v1/auth/external/*/callback"
      - "/v1/auth/external/*/exchange"
      - "/v1/auth/email/*"
      - "/v1/auth/forgot-password"
      - "/v1/auth/reset-password"
      - "/v1/auth/mfa/challenge"
      - "/v1/auth/mfa/recovery"
      - "/v1/auth/refresh"
      - "/v1/auth/sign-out"
      - "/v1/payment/webhooks/stripe"
      - "/v1/payment/webhooks/paypal"
    AnyAuthenticated:
      - "/v1/auth/mfa/authenticator/*"
      - "/v1/auth/me"
      - "/v1/auth/sessions*"
      - "/v1/analytics/events"
      - "/v1/notifications/*"
      - "/v1/media/*"
      - "/v1/programs*"
      - "/v1/packages*"
      - "/v1/free-previews"
      - "/v1/foundation-resources"
      - "/v1/content-browser*"
      - "/v1/programs-browser"
      - "/v1/search*"
      - "/v1/recommendations"
      - "/v1/media/{assetId}/url"
      - "/v1/content/by-skill"
      - "/v1/notifications/hub (SignalR)"
      - "/v1/conversations/hub (SignalR)"
    LearnerOnly:
      - "All /v1/* learner endpoints (~100+)"
      - "/v1/auth/account/delete"
      - "/v1/private-speaking/*"
      - "/v1/marketplace/* (browse, profile, submissions)"
      - "/v1/community/*"
      - "/v1/certificates/*"
      - "/v1/referrals/*"
      - "/v1/tutoring/*"
      - "/v1/exam-bookings/*"
      - "/v1/conversations/*"
      - "/v1/pronunciation/*"
      - "/v1/grammar/*"
      - "/v1/lessons/*"
      - "/v1/strategies/*"
      - "/v1/vocabulary/*"
      - "/v1/review/*"
      - "/v1/gamification/*"
      - "/v1/adaptive/*"
      - "/v1/predictions/*"
      - "/v1/writing/coach-*"
    ExpertOnly:
      - "All /v1/expert/* endpoints (~35)"
      - "/v1/expert/private-speaking/*"
    AdminOnly:
      - "All /v1/admin/* endpoints (~120+)"
      - "/v1/admin/notifications/*"
