  - id: p3-cookie-setup
    title: "Add auth indicator cookie to login/logout flows"
    description: |
      Add cookie set/clear helpers to lib/auth-storage.ts:
      - setAuthIndicatorCookie(): sets document.cookie oet_auth=1 with Path=/, SameSite=Lax,
        Secure in production. HttpOnly=false so Edge middleware can read it.
      - clearAuthIndicatorCookie(): removes the cookie by setting max-age=0.
      Call setAuthIndicatorCookie() inside saveStoredSession().
      Call clearAuthIndicatorCookie() inside clearStoredSession().
      This covers all auth paths: signIn, register, OAuth callback, MFA completion, token refresh —
      because they all flow through saveStoredSession. signOut and token expiry flow through
      clearStoredSession. No sensitive data in cookie — flag only.
