name: OET Gap-Closure Validation

# Validates the OET Listening/Reading gap-closure work on clean GitHub-hosted
# Ubuntu runners (ample RAM), bypassing the local Windows Docker Desktop engine
# which SIGBUSes/OOMs under heavy .NET + tsc build load. Runs only on this
# feature branch + manual dispatch — never touches main (no deploy trigger).
on:
  push:
    branches:
      - ci/oet-gapclosure-validation
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oet-gapclosure-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-xunit:
    name: Backend xUnit (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore test project
        run: dotnet restore backend/tests/OetLearner.Api.Tests/OetLearner.Api.Tests.csproj
      - name: Test (OetLearner.Api.Tests)
        run: >
          dotnet test backend/tests/OetLearner.Api.Tests/OetLearner.Api.Tests.csproj
          -c Debug --no-restore --nologo
          --logger "console;verbosity=normal"

  frontend:
    name: Frontend (tsc / vitest / lint)
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Typecheck (tsc --noEmit)
        if: ${{ !cancelled() }}
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        if: ${{ !cancelled() }}
        run: npm test
      - name: Lint (eslint)
        if: ${{ !cancelled() }}
        run: npm run lint
