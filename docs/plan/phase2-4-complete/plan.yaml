plan_id: phase2-4-complete
objective: |
  Implement all remaining gap analysis items P5–P24 (excluding P16 which is already complete).
  Covers learner escalation, community threads, admin permissions, sponsor dashboard, media upload/delete,
  content hierarchy editing, permission templates, bulk user import, expert schedule exceptions,
  expert session cancel, forum moderation, session management, orphan endpoint wiring, error handling
  fixes, subscriptions route cleanup, mapping function fixes, expert onboarding wizard, analytics CSV
  export, and multi-stage content approval.
created_at: "2026-04-13"
created_by: gem-planner
completed_at: "2026-04-13"
status: complete
research_confidence: high

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 21
  risk_score: medium

tldr: |
  39 tasks across 6 waves implementing 19 gap items (P5–P24, skipping P16).
  Wave 1 handles 4 small independent fixes (P14, P19, P20, P21) in parallel.
  Wave 2 tackles 5 medium backend-heavy items (P5-BE, P6, P13, P15-BE, P18) in parallel.
  Wave 3 adds 6 frontend + permission items (P5-FE, P7, P11, P15-FE, P17-BE, P17-FE) in parallel.
  Wave 4 runs 4 heavy CRUD items (P9-BE, P9-FE, P10, P12) in parallel.
  Wave 5 delivers 3 large greenfield features (P8, P22, P23) in parallel.
  Wave 6 closes with P24 (multi-stage content approval), the largest single item.
  Documentation task in wave 6 covers all phases.
  Backend follows ASP.NET Minimal API patterns (endpoint mappers, services, DTOs).
  Frontend uses Next.js App Router, SCSS modules, useState, custom components (no shadcn/MUI).

open_questions: []

resolved_decisions:
  - decision: "P5 escalation scope"
    resolution: "Learner disputes a specific review via /submissions/{id} action — not a global escalation form."
  - decision: "P8 sponsor role"
    resolution: "Uses existing sponsor role type from auth-context. Needs new backend endpoints and frontend routes."
  - decision: "P16 review wizard"
    resolution: "SKIP — already a fully functional review wizard."
  - decision: "P20 subscriptions route"
    resolution: "Only remove /subscriptions re-export route. fetchDiagnosticOverview vs fetchDiagnosticSession are NOT duplicates (different return types)."
  - decision: "P22 expert onboarding"
    resolution: "Guided wizard: profile → schedule → calibration → first review."
  - decision: "P23 export format"
    resolution: "CSV export format using browser Blob/download. No new library needed."
  - decision: "P24 multi-stage"
    resolution: "Draft → EditorReview → PublisherApproval → Published. Disable direct-publish bypass."

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "P9 file upload storage — no existing file storage integration pattern in backend"
      likelihood: medium
      impact: high
      mitigation: "Use MediaStorageService.cs already in Services/ — extend with actual file handling. Start with local disk storage, abstract behind interface for future cloud migration."
    - scenario: "P24 multi-stage approval breaks existing content publishing flow"
      likelihood: medium
      impact: critical
      mitigation: "Feature-flag the new stages. Run old and new flows in parallel during rollout. Existing Draft → InReview → Published path continues working until flag enabled."
    - scenario: "P8 sponsor dashboard is greenfield — scope creep into full enterprise feature"
      likelihood: medium
      impact: medium
      mitigation: "Scope to 4 core pages: dashboard overview, cohort list, learner progress, billing summary. No nested admin within sponsor role."
    - scenario: "P10 content hierarchy edit — 5 entity types (programs/tracks/modules/lessons/packages) create large surface area"
      likelihood: medium
      impact: medium
      mitigation: "Reuse shared form patterns. Each entity type uses same FormEditor component with different field configs. Limit to essential fields per entity."
    - scenario: "P7 admin sidebar permissions — JWT claim changes could break existing admin pages"
      likelihood: low
      impact: high
      mitigation: "Additive change only — add adminPermissions to CurrentUser type. Sidebar defaults to showing items if permissions data is missing (graceful degradation)."
    - scenario: "P12 bulk user import CSV parsing — malformed input crashes backend"
      likelihood: medium
      impact: medium
      mitigation: "Backend CSV parsing with validation, row-by-row error reporting, max file size limit (5MB), and transaction rollback on failure."
    - scenario: "P18 orphan endpoint wiring — API response shapes may not match expected frontend types"
      likelihood: low
      impact: medium
      mitigation: "Each orphan endpoint has existing backend return DTOs. Add TypeScript types matching backend contracts. Wire one endpoint at a time."
  assumptions:
    - "Backend ASP.NET Minimal API patterns (endpoint registration in MapXxxEndpoints, services injected via DI) are consistent across all endpoint files — confirmed by Endpoints/ directory structure"
    - "Frontend SCSS modules pattern (page.module.scss per route) is used universally — confirmed by existing routes"
    - "lib/api.ts is the single API client layer — all frontend API calls go through it"
    - "CommunityEndpoints.cs has all 9 thread/reply endpoints already mapped — frontend only task"
    - "ContentHierarchyEndpoints.cs has full CRUD for programs/tracks/modules/lessons/packages"
    - "MediaStorageService.cs exists but only handles metadata — needs file I/O extension"
    - "ForumThread entity has isPinned/isLocked boolean fields in DB schema"
    - "RefreshTokenRecord entity has CreatedAt, LastUsedAt, DeviceInfo metadata"
    - "ContentPublishRequest entity already tracks requester/reviewer for approval workflow"
    - "LearnerEndpoints.cs has study-plan/drift, readiness/risk, engagement/streak-freeze, fluency-timeline, diagnostic-personalization endpoints"
    - "AdminEndpoints.cs has escalation CRUD but no learner-facing POST endpoint"
    - "PrivateSpeakingOverride pattern in ExpertService can be extended for review exceptions"
    - "Existing sponsor role type in auth-context can be used for P8 role enforcement"

implementation_specification:
  code_structure: |
    Backend changes follow existing Minimal API patterns:
    - New endpoints in Endpoints/*.cs (MapXxxEndpoints extension methods)
    - New services/methods in Services/*.cs (DI-registered)
    - New DTOs in Contracts/*.cs
    Frontend changes follow Next.js App Router patterns:
    - New pages: app/{route}/page.tsx with 'use client' where needed
    - SCSS modules: page.module.scss per route
    - API functions: lib/api.ts
    - Types: types/*.ts
    - Reusable components: components/domain/ and components/ui/
  affected_areas:
    - "backend/src/OetLearner.Api/Endpoints/ — new and modified endpoint mappers"
    - "backend/src/OetLearner.Api/Services/ — new and modified service classes"
    - "backend/src/OetLearner.Api/Contracts/ — new DTOs"
    - "lib/api.ts — new API client functions"
    - "lib/utils.ts — toSubTest() and toExamFamilyCode() fixes"
    - "app/community/threads/ — replace redirect stubs with real UI"
    - "app/admin/ — sidebar permissions, content hierarchy, media, bulk ops, permissions, publish-requests"
    - "app/submissions/ — escalation action"
    - "app/settings/ — session management"
    - "app/expert/ — schedule exceptions, session cancel, onboarding wizard"
    - "app/sponsor/ — new greenfield routes"
    - "contexts/auth-context.tsx — adminPermissions in CurrentUser"
    - "components/layout/admin-sidebar.tsx — conditional rendering"
