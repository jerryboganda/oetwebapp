# OPEN QUESTIONS & GAPS
# ═══════════════════════════════════════════════════════════════════════

open_questions:
  - question: "Should the granular admin permission policies be wired to endpoint subgroups?"
    context: "12 policies are defined but none are applied — all admins have full access to every admin endpoint"
    type: decision_blocker
    affects: ["admin RBAC enforcement"]

  - question: "Should /v1/certificates/verify/{code} be made public (AllowAnonymous)?"
    context: "Certificate verification is a public utility, but it's currently behind LearnerOnly auth"
    type: nice_to_know
    affects: ["certificate verification UX"]

gaps:
  - area: "Grammar, Video, Strategy, Vocabulary, Pronunciation, ForumCategory admin CRUD"
    description: "Learner-facing content types that lack backend admin management endpoints"
    impact: research_blocker
    affects: ["admin content completeness"]

  - area: "Frontend role enforcement"
    description: "Next.js middleware checks for auth cookie presence only, not role — frontend role-gating confirmed by page-level logic but not centralized middleware"
    impact: nice_to_know
    affects: ["frontend security posture"]
