  - id: plat-linux-protocol
    title: "Add Linux .desktop protocol handler mimeType to electron-builder config"
    description: |
      Add mimeType to the existing linux config in electron-builder.config.cjs
      so that the generated .desktop file includes the x-scheme-handler/oet-prep
      association. This enables deep linking on Linux.

      Change the linux config from:
        linux: {
          target: ['AppImage', 'deb'],
          category: 'Education',
        }

      To:
        linux: {
          target: ['AppImage', 'deb'],
          category: 'Education',
          mimeTypes: ['x-scheme-handler/oet-prep'],
        }

      This is a single-line addition. electron-builder will auto-generate the
      .desktop file with MimeType=x-scheme-handler/oet-prep when building
      AppImage or deb targets.
