plan_id: phase1-critical
objective: "Map settings page structure and backend user/account patterns for account deletion implementation"
focus_area: "Settings page and account deletion patterns"
created_at: "2026-04-13T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - Settings page uses a hub-and-spoke pattern: `app/settings/page.tsx` (hub with 4 groups) routes to `app/settings/[section]/page.tsx` (dynamic section detail) via `SECTION_CONFIG` record (8 sections: profile, privacy, goals, study, notifications, audio, accessibility, + goals).
  - Backend already has a robust soft-delete pattern on `ApplicationUserAccount.DeletedAt` (nullable DateTimeOffset) + `LearnerUser.AccountStatus` (string: "active"|"suspended"|"deleted"), but only admin-initiated via `POST /v1/admin/users/{userId}/delete`. No learner self-service delete endpoint exists.
  - The sign-out flow in `auth-context.tsx` calls `signOutFromBackend()` → clears session state to null → components react to `isAuthenticated=false`. This pattern can be reused for post-deletion redirect.
  - No "Danger Zone" component exists. The gap analysis doc (COMPREHENSIVE_SYSTEM_GAP_ANALYSIS.md line 224) explicitly calls for a settings "Danger Zone" + backend cascade-delete endpoint as P1 priority.
  - The API layer uses `apiRequest<T>(path, init)` with auto-retry, auth-token injection, and typed error handling (`ApiError` class). Settings functions: `fetchSettingsData()`, `fetchSettingsSection(section)`, `updateSettingsSection(section, values)`.

research_metadata:
  methodology: "Hybrid retrieval: semantic_search + grep_search for discovery, read_file for detailed examination across 3 research passes (complex). Relationship discovery via endpoint → service → entity chain."
  scope: "Frontend settings pages (app/settings/**), backend domain entities (AuthEntities.cs, Entities.cs), backend services (AdminService, AuthService, LearnerService), backend endpoints (Auth/Learner/AdminEndpoints.cs), frontend API layer (lib/api.ts, lib/auth-client.ts), auth context (contexts/auth-context.tsx), gap analysis doc."
  confidence: high
  coverage: 95
  decision_blockers: 1
  research_blockers: 0

