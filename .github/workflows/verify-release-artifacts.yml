name: Verify Release Artifacts

on:
  workflow_dispatch:
    inputs:
      evidence_dir:
        description: Directory containing release evidence files
        required: false
        default: release-evidence
      evidence_env:
        description: Verification mode for evidence signature requirements
        required: false
        default: local
        type: choice
        options:
          - local
          - staging
          - production
      signer_fingerprint:
        description: Optional GPG signer fingerprint for local/staging verification. Production uses the protected environment variable.
        required: false
        default: ''

permissions:
  contents: read

jobs:
  verify-release-artifacts:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.evidence_env }}
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Collect evidence bundle
        shell: bash
        env:
          EVIDENCE_DIR: ${{ inputs.evidence_dir }}
        run: bash scripts/evidence-collect.sh

      - name: Sign production evidence manifest
        if: inputs.evidence_env == 'production'
        shell: bash
        env:
          EVIDENCE_DIR: ${{ inputs.evidence_dir }}
          EVIDENCE_SIGNER_FINGERPRINT: ${{ vars.EVIDENCE_SIGNER_FINGERPRINT }}
          EVIDENCE_GPG_PRIVATE_KEY: ${{ secrets.PRODUCTION_EVIDENCE_GPG_PRIVATE_KEY }}
          EVIDENCE_GPG_PASSPHRASE: ${{ secrets.PRODUCTION_EVIDENCE_GPG_PASSPHRASE }}
        run: bash scripts/evidence-sign.sh

      - name: Verify required evidence files
        shell: bash
        env:
          EVIDENCE_DIR: ${{ inputs.evidence_dir }}
          EVIDENCE_ENV: ${{ inputs.evidence_env }}
          EVIDENCE_SIGNER_FINGERPRINT: ${{ inputs.evidence_env == 'production' && vars.EVIDENCE_SIGNER_FINGERPRINT || inputs.signer_fingerprint }}
        run: bash scripts/evidence-verify.sh

      - name: Upload verified evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ github.sha }}
          path: ${{ inputs.evidence_dir }}/
          if-no-files-found: error
