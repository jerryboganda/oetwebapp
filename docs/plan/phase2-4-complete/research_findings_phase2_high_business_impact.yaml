open_questions:
  - question: "Should learner escalation be scoped to a specific submission route (app/submissions/[id]/dispute) or a standalone page (app/escalation-request)?"
    context: "The admin escalation entity links to ReviewRequestId, suggesting scoping to a submission flow. But standalone page is simpler."
    type: decision_blocker
    affects: ["P5"]

  - question: "Should the sponsor role be a new ApplicationUserRole or reuse the existing SponsorAccount.AuthAccountId with a claim-based approach?"
    context: "ApplicationUserRoles enum only has Learner/Expert/Admin. Adding 'sponsor' changes the auth model. Alternatively, sponsors could be learners with a sponsor_id claim."
    type: decision_blocker
    affects: ["P8"]

  - question: "Should community thread routes be gated behind the community_forums feature flag?"
    context: "Feature flag flg-018 'community_forums' is disabled by default. If pages are built, should they check this flag and show a 'coming soon' state?"
    type: nice_to_know
    affects: ["P6"]

  - question: "How should the admin layout handle the mobile menu sections when permissions filter out items?"
    context: "adminMobileMenuSections is a separate hardcoded array referencing adminNavItems by index. Filtering navItems could break index alignment."
    type: research
    affects: ["P7"]

gaps:
  - area: "Learner escalation backend endpoint"
    description: "No POST endpoint exists for learners to create escalation requests. This is the primary blocker for P5."
    impact: decision_blocker
    affects: ["P5"]

  - area: "Sponsor role in auth system"
    description: "No sponsor role exists in ApplicationUserRoles. SponsorAccount has AuthAccountId but no role mapping or auth policy."
    impact: decision_blocker
    affects: ["P8"]

  - area: "Frontend admin_permissions in session"
    description: "CurrentUser interface lacks adminPermissions. JWT contains the claim but it's not decoded/surfaced to frontend."
    impact: research_blocker
    affects: ["P7"]

  - area: "Community types in frontend"
    description: "No TypeScript interfaces for ForumCategory, ForumThread, ForumReply in lib/types/. API functions exist but return untyped data."
    impact: nice_to_know
    affects: ["P6"]
