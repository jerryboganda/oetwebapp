services:
  postgres:
    image: postgres:17-alpine
    container_name: oet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - oet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  learner-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: oet-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Auth__Authority: ${AUTH_AUTHORITY:-}
      Auth__Audience: ${AUTH_AUDIENCE:-}
      Auth__Issuer: ${AUTH_ISSUER:-}
      Auth__SigningKey: ${AUTH_SIGNING_KEY:-}
      Auth__RequireHttpsMetadata: ${AUTH_REQUIRE_HTTPS_METADATA:-true}
      Platform__PublicApiBaseUrl: ${PUBLIC_API_BASE_URL}
      Platform__FallbackEmailDomain: ${FALLBACK_EMAIL_DOMAIN:-example.invalid}
      Billing__CheckoutBaseUrl: ${CHECKOUT_BASE_URL}
      Storage__LocalRootPath: /var/opt/oet-learner/storage
      Storage__MaxUploadBytes: ${MAX_UPLOAD_BYTES:-26214400}
      Bootstrap__AutoMigrate: ${AUTO_MIGRATE:-true}
      Bootstrap__SeedDemoData: ${SEED_DEMO_DATA:-false}
      Proxy__TrustForwardHeaders: true
      Proxy__EnforceHttps: true
      Cors__AllowedOriginsCsv: ${CORS_ALLOWED_ORIGINS}
      Features__EnableSwagger: ${ENABLE_SWAGGER:-false}
    volumes:
      - oet_learner_storage:/var/opt/oet-learner/storage
    expose:
      - "8080"
    networks:
      - internal
      - npm_proxy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        APP_URL: ${APP_URL}
    container_name: oet-web
    restart: unless-stopped
    depends_on:
      learner-api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      APP_URL: ${APP_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    expose:
      - "3000"
    networks:
      - npm_proxy

volumes:
  oet_postgres_data:
  oet_learner_storage:

networks:
  internal:
    driver: bridge
  npm_proxy:
    external: true
    name: ${NPM_PROXY_NETWORK:-npm_proxy}
