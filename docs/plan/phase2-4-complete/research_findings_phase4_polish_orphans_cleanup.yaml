    - "No stage-sequence configuration in ContentPublishRequest"
    - "No 'current_stage' field on publish requests"
    - "No per-stage reviewer assignment"
    - "No conditional routing (e.g., auto-skip QC for minor edits)"
    - "No stage transition history / timeline"
