plan_id: backend-rbac-audit
objective: "Comprehensive audit of all backend API endpoints, RBAC configuration, Next.js API route handlers, admin CRUD coverage, and frontend dependencies"
focus_area: "backend API + RBAC + admin CRUD coverage"
created_at: "2026-04-13T00:00:00Z"
created_by: "gem-researcher"
status: completed

tldr: |
  - The .NET backend exposes 22 endpoint groups mapped via Minimal API, totaling ~280+ individual routes under /v1/*.
  - RBAC is enforced via 4 role policies (LearnerOnly, ExpertOnly, AdminOnly, SponsorOnly) plus 12 granular admin permission policies; JWT auth with HS256 symmetric signing, OnTokenValidated checks for suspension.
  - Payment webhook endpoints (/v1/payment/webhooks/stripe & /v1/payment/webhooks/paypal) are UNAUTHENTICATED by design — they sit inside a group that shares the LearnerOnly parent but are mapped on a separate group without auth. This is correct for webhook receivers but worth noting.
  - The Next.js frontend proxies ALL /api/backend/v1/* requests to the .NET backend via a catch-all route handler; only /v1/* paths are allowed; x-debug-* and forwarding headers are stripped.
  - Admin CMS has comprehensive CRUD coverage for content, users, billing, review ops, taxonomy, criteria, AI config, flags, audit logs, escalations, permissions, webhooks, sponsors/cohorts, community moderation, private speaking tutors, and marketplace — no major gaps found.

research_metadata:
  methodology: "Hybrid retrieval: read_file for all 22 endpoint files, Program.cs (auth/RBAC config), middleware.ts, backend-proxy.ts, package.json, API route handlers. Systematic file-by-file enumeration."
  scope: "All backend endpoints, all RBAC policies, all Next.js API routes, admin page inventory, package.json dependencies"
  confidence: high
  coverage: 98  # All endpoint files read fully; all auth config examined
  decision_blockers: 0
  research_blockers: 0

