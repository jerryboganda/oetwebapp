  structure_of_domain: "Frontend: app/settings/page.tsx (hub), app/settings/[section]/page.tsx (detail), app/settings/reminders/page.tsx (standalone). Backend: Endpoints/{Auth|Learner|Admin}Endpoints.cs → Services/{Auth|Learner|Admin}Service.cs → Domain/Entities.cs"
  error_handling_in_domain: "Frontend: try/catch with setError(message), InlineAlert display. Backend: ApiException.Validation() for 4xx, ApiException.Forbidden() for auth failures."
  testing_in_domain: "app/settings/page.test.tsx and app/settings/[section]/page.test.tsx exist."
  documentation_in_domain: "Gap analysis at docs/COMPREHENSIVE_SYSTEM_GAP_ANALYSIS.md explicitly tracks account deletion as P1."

related_dependencies:
  internal:
    - component: "lib/api.ts (apiRequest function)"
      relationship_to_domain: "outbound — settings pages call API functions"
      direction: outbound
    - component: "contexts/auth-context.tsx"
      relationship_to_domain: "outbound — will need signOut for post-deletion flow"
      direction: outbound
    - component: "components/layout (LearnerDashboardShell)"
      relationship_to_domain: "outbound — page layout wrapper"
      direction: outbound
    - component: "components/domain (LearnerPageHero, LearnerSurfaceSectionHeader)"
      relationship_to_domain: "outbound — section UI components"
      direction: outbound
    - component: "components/ui (Button, Badge, InlineAlert, Modal, Skeleton)"
      relationship_to_domain: "outbound — shared UI primitives"
      direction: outbound

domain_security_considerations:
  sensitive_areas:
    - area: "Account deletion endpoint (to be created)"
      location: "backend/src/OetLearner.Api/Endpoints/LearnerEndpoints.cs (new)"
      concern: "Must require authentication + password re-entry or OTP verification to prevent unauthorized deletion. Must be rate-limited."
    - area: "Token revocation during self-delete"
      location: "backend/src/OetLearner.Api/Services/AdminService.cs:RevokeRefreshTokensAsync"
      concern: "Self-delete must revoke ALL refresh tokens (same as admin delete), not just the current one."
    - area: "Post-deletion session cleanup"
      location: "contexts/auth-context.tsx + lib/auth-client.ts"
      concern: "After backend confirms deletion, frontend must call signOut to clear local session and redirect. No stale auth tokens should remain."
  authentication_patterns_in_domain: "LearnerEndpoints uses RequireAuthorization('LearnerOnly'). Auth token injected by ensureFreshAccessToken() in API layer."
  authorization_patterns_in_domain: "Admin endpoints use 'AdminOnly' policy + granular permission checks. Learner endpoints use 'LearnerOnly' policy."
  data_validation_in_domain: "Backend validates via ApiException.Validation(). Frontend validates field types via SECTION_CONFIG field configs (min/max/options)."

open_questions:
  - question: "Should the learner self-delete endpoint require password re-entry, email OTP, or both as confirmation?"
    context: "The admin delete flow has no confirmation beyond an optional reason. For learner self-service, stronger verification is needed per security best practices and GDPR compliance."
    type: decision_blocker
    affects: ["backend-delete-endpoint", "frontend-confirmation-modal"]

  - question: "Should self-deletion be immediate soft-delete (like admin delete) or implement a grace period (e.g., 30 days) before permanent data removal?"
    context: "Admin delete is immediate soft-delete with restore capability. Self-service may need a different approach for GDPR compliance."
    type: nice_to_know
    affects: ["backend-delete-endpoint"]

  - question: "What data should be cascade-deleted vs anonymized vs retained when a learner self-deletes?"
    context: "The gap analysis mentions 'cascade-delete'. Current admin delete only sets soft-delete markers but doesn't purge any learner data (goals, settings, submissions, etc.)."
    type: nice_to_know
    affects: ["backend-delete-endpoint"]

gaps:
  - area: "No learner self-service delete endpoint"
    description: "LearnerEndpoints.cs has no delete/deactivate/close-account endpoint. LearnerService.cs has no method for self-deletion. Only admin-initiated delete exists via AdminService.DeleteUserAsync."
    impact: decision_blocker
    affects: ["backend-delete-endpoint", "frontend-danger-zone"]

  - area: "No Danger Zone component"
    description: "No red-themed destructive action section exists in the codebase. DESIGN.md defines 'Danger Red #ef4444' for destructive actions but no component implements this pattern."
    impact: research_blocker
    affects: ["frontend-danger-zone"]

  - area: "No self-delete API function in lib/api.ts"
    description: "Only deleteAdminUser exists. No learner-facing deleteMyAccount or similar function is defined."
    impact: research_blocker
    affects: ["frontend-api-integration"]

  - area: "No self-delete confirmation request DTO"
    description: "AdminUserLifecycleRequest(Reason) exists for admin flows. A learner self-delete will need a new request DTO (e.g., with password or OTP confirmation)."
    impact: research_blocker
    affects: ["backend-contracts"]
