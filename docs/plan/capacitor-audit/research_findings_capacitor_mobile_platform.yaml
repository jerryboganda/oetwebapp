plan_id: capacitor-mobile-platform-audit
objective: "Comprehensive audit of Capacitor mobile platform integration across iOS, Android, native plugins, auth, push, offline, and store readiness"
focus_area: capacitor-mobile-platform
created_at: "2026-04-13"
created_by: gem-researcher
status: completed

tldr: |
  - Capacitor 6.2.1 shell app pointing at production URL (app.oetwithdrhesham.co.uk) with 15 @capacitor/* plugins installed and 12 actively used across 17 lib/mobile modules.
  - Android targets SDK 35, minSdk 22, has release signing + ProGuard + deep link intent-filter w/ autoVerify; iOS has App.entitlements (applinks + aps-environment), PrivacyInfo.xcprivacy (email, deviceID, audio), custom SpeakingRecorderPlugin in Swift.
  - MobileRuntimeBridge in providers.tsx bootstraps push-notifications, deep-link-handler, runtime lifecycle (keyboard, status bar, network, back button), and resume motion; auth-client sends platform=capacitor for OAuth.
  - Push pipeline: frontend registers via @capacitor/push-notifications → token logged to console (TODO: send to backend); backend has web-push only (VAPID/WebPush) — no FCM/APNs native push dispatcher yet.
  - Offline: IndexedDB-based offline-sync module with content caching (7-day TTL), attempt queuing, vocabulary cache, auto-sync-on-reconnect; no service worker on Capacitor.

research_metadata:
  methodology: "Hybrid retrieval: semantic_search + grep_search across app/, lib/, components/, backend/, android/, ios/; targeted read_file for all config and module files; file_search for workflows and well-known files"
  scope: "Full-stack Capacitor mobile integration — config, native projects, lib/mobile modules, UI adaptations, auth, push, offline, store readiness"
  confidence: high
  coverage: 95
  decision_blockers: 2
  research_blockers: 0

