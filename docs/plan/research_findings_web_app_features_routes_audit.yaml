# ============================================================
# 6. AUTH FLOW
# ============================================================
auth_flow:
  overview: |
    JWT-based auth with access token + refresh token model. Tokens stored in
    localStorage (remember-me) or sessionStorage (session-only). AuthContext
    hydrates on mount by checking stored session and refreshing if expired.

  sign_in_flow:
    - "1. User enters email + password at /(auth)/sign-in"
    - "2. POST /v1/auth/sign-in → returns AuthSession or mfa_challenge_required"
    - "3. If MFA required: redirect to /(auth)/mfa/challenge, store PendingMfaChallenge"
    - "4. User enters TOTP code → POST /v1/auth/mfa/challenge/complete → AuthSession"
    - "5. If MFA recovery: /(auth)/mfa/recovery → POST /v1/auth/mfa/recovery/complete"
    - "6. Session saved to storage, AuthContext updated"

  registration_flow:
    - "1. User fills form at /(auth)/register (email, password, name, profession, exam type, etc.)"
    - "2. POST /v1/auth/register → returns AuthSession"
    - "3. Redirect to /(auth)/register/success (email verification prompt)"
    - "4. User verifies email: POST /v1/auth/email/send-verification-otp + /verify-otp"

  password_reset_flow:
    - "1. /(auth)/forgot-password: enter email"
    - "2. POST /v1/auth/forgot-password → OTP sent"
    - "3. /(auth)/forgot-password/verify: enter OTP"
    - "4. /(auth)/reset-password: enter new password → POST /v1/auth/reset-password"
    - "5. /(auth)/reset-password/success: confirmation"

  mfa_setup:
    - "1. /(auth)/mfa/setup: POST /v1/auth/mfa/authenticator/begin → QR code"
    - "2. User scans QR, enters code → POST /v1/auth/mfa/authenticator/confirm"

  external_oauth:
    - "1. User clicks OAuth button → redirect to /v1/auth/external/{provider}/start?platform=..."
    - "2. Backend handles OAuth flow with provider (Google, etc.)"
    - "3. Callback redirects to /(auth)/auth/callback/[provider]?exchangeToken=..."
    - "4. Frontend calls POST /v1/auth/external/{provider}/exchange"
    - "5. Returns ExternalAuthExchangeResult: authenticated|needs_registration|mfa_required"
    - "6. platform=desktop uses oet-prep:// scheme for redirect"
    - "7. platform=capacitor uses native deep-link handler"

  session_management:
    - "Token refresh: ensureFreshSession() checks expiry with 30s skew, calls POST /v1/auth/refresh"
    - "Active sessions: GET /v1/auth/sessions, DELETE individual or all"
    - "Sign out: POST /v1/auth/sign-out with refresh token, then clear storage"
    - "Account deletion: POST /v1/auth/account/delete with password + reason"

  platform_auth_differences:
    - "Desktop (Electron): platform=desktop in OAuth, oet-prep:// protocol handler"
    - "Capacitor mobile: platform=capacitor in OAuth, native deep-link handler"
    - "Web: standard redirect-based OAuth"

  auth_guards:
    - "components/auth/auth-guard.tsx: Route-level auth check"
    - "components/auth/auth-page-gate.tsx: Redirects authed users away from auth pages"
    - "lib/hooks/use-admin-auth.ts: Admin role + permission check"
    - "lib/hooks/use-expert-auth.ts: Expert role check"
    - "lib/hooks/use-sponsor-auth.ts: Sponsor role check"
    - "lib/admin-permissions.ts: RBAC permission constants + hasPermission()"

