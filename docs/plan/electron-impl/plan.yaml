  - id: plat-oauth-desktop
    title: "Configure OAuth desktop flow via custom protocol callback"
    description: |
      Ensure the OAuth flow works in desktop mode where the system browser handles
      the OAuth provider login and redirects back to the app via oet-prep:// protocol.

      The protocol handler and mapProtocolUrlToRendererUrl() already exist in main.cjs
      (line 186). The openOrNavigateUrl() function (line 260) already handles
      oet-prep:// URLs. This task ensures the full flow works end-to-end.

      Implementation steps:

      1. Backend configuration — Add oet-prep://auth/callback as an allowed
         OAuth redirect URI in the backend. This is in the ASP.NET Core backend
         configuration (appsettings or environment variable). The exact mechanism
         depends on how the backend validates redirect URIs. Add to the backend
         config file or environment:
           - For Google: oet-prep://auth/callback/google
           - For Facebook: oet-prep://auth/callback/facebook  
           - For LinkedIn: oet-prep://auth/callback/linkedin

      2. Frontend OAuth initiation — In the desktop runtime, when a user clicks
         "Sign in with Google" (or other provider), the auth flow should:
         a. Build the OAuth URL with redirect_uri=oet-prep://auth/callback/{provider}
         b. Call window.desktopBridge.openExternal(oauthUrl) to open system browser
         c. System browser completes OAuth → provider redirects to oet-prep://auth/callback/{provider}?code=...
         d. OS routes oet-prep:// URL to the Electron app (already registered)
         e. main.cjs openOrNavigateUrl() maps it to renderer URL via mapProtocolUrlToRendererUrl()
         f. Renderer /auth/callback/[provider] page processes the code

      3. Verify the existing protocol registration in main.cjs handles the
         second-instance event correctly for the OAuth callback URL.

      4. Add a desktop-aware redirect URI builder in the auth flow that detects
         runtime kind and returns oet-prep://auth/callback/{provider} instead of
         the web callback URL when running in desktop mode.

      Note: This task touches both frontend (lib/ or app/(auth)/) and backend
      (backend/ config). The core Electron plumbing is already in place.
