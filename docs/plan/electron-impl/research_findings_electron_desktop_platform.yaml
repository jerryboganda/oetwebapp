# PATTERNS FOUND
# ============================================================
patterns_found:
  - category: architecture
    pattern: "Bundled full-stack desktop"
    description: "Desktop bundles both Next.js standalone renderer and ASP.NET Core backend as child processes, using SQLite for local database"
    examples:
      - file: electron/main.cjs
        location: "startBundledBackendServer(), startStandaloneRendererServer()"
        snippet: "spawn(backendExecutable, [], { cwd: getBundledBackendRoot(), env: getBundledBackendEnv(runtimeUrl) })"
    prevalence: common

  - category: architecture
    pattern: "Multi-runtime detection"
    description: "Three runtime kinds — web, desktop, capacitor-native — detected via bootstrap script and runtime signals"
    examples:
      - file: lib/runtime-signals.ts
        location: "getAppRuntimeKind()"
        snippet: "if (runtimeWindow.desktopBridge) return 'desktop'"
    prevalence: common

  - category: security
    pattern: "IPC sender validation"
    description: "Every ipcMain.handle callback validates the sender frame URL against the trusted renderer origin"
    examples:
      - file: electron/main.cjs
        location: "validateSenderFrame()"
        snippet: "const senderUrl = event?.senderFrame?.url; return isTrustedRendererUrl(senderUrl);"
    prevalence: common

  - category: security
    pattern: "Path traversal prevention in offline cache"
    description: "Cache keys sanitized to alphanumeric+hyphens+underscores+dots, then resolved path checked against cache directory"
    examples:
      - file: electron/main.cjs
        location: "sanitizeCacheKey() + resolve().startsWith()"
        snippet: "const resolved = path.resolve(filePath); if (!resolved.startsWith(OFFLINE_CACHE_DIR)) throw"
    prevalence: common

  - category: naming
    pattern: "desktop: IPC channel prefix"
    description: "All IPC channels use 'desktop:' namespace prefix with colon-separated hierarchy"
    examples:
      - file: electron/main.cjs
        location: "Lines 801-964"
        snippet: "desktop:open-external, desktop:secret-storage:get, desktop:offline-cache:store"
    prevalence: common

  - category: structure
    pattern: "CJS modules for Electron"
    description: "All Electron source files use CommonJS (.cjs extension) with require/module.exports"
    examples:
      - file: electron/main.cjs
        location: "Line 1"
        snippet: "const { app, BrowserWindow, ipcMain } = require('electron');"
    prevalence: common

