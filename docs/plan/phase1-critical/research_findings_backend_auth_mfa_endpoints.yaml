domain_security_considerations:
  sensitive_areas:
    - area: "Password storage"
      location: "AuthService.cs (RegisterLearnerAsync, ResetPasswordAsync)"
      concern: "Uses ASP.NET Identity PasswordHasher (bcrypt-like). Verified secure."
    - area: "JWT signing key"
      location: "Program.cs, AuthTokenOptions"
      concern: "Minimum 32-char symmetric key enforced at startup. HMAC-SHA256."
    - area: "MFA authenticator secret"
      location: "AuthService.cs"
      concern: "Encrypted at rest via IDataProtector. Decrypted only for TOTP verification."
    - area: "MFA challenge token"
      location: "AuthService.cs"
      concern: "Data-protected opaque token containing account ID. Time-bounded by _mfaChallengeLifetime."
    - area: "Recovery codes"
      location: "AuthenticatorTotp.cs, AuthService.cs"
      concern: "SHA-256 hashed before storage. Single-use (RedeemedAt set on use)."
    - area: "OTP codes"
      location: "EmailOtpService.cs"
      concern: "6-digit codes, HMAC-hashed with challengeId+accountId+purpose. Expiry-bounded. Attempt counting exists."
  authentication_patterns_in_domain: |
    - Primary: email/password with optional TOTP MFA
    - External: OAuth2 via Google/Facebook/LinkedIn (start → callback → exchange flow)
    - Development: X-Debug-* header bypass (IsDevelopment only)
    - JWT Bearer with OnTokenValidated DB check for account existence/suspension
    - Hybrid scheme in dev: DevelopmentOrJwt policy scheme that forwards to Bearer if Authorization header present, else Development handler
  authorization_patterns_in_domain: |
    - RequireAuthorization() for authenticated-user-only endpoints
    - AllowAnonymous() for public endpoints (register, sign-in, OTP, MFA challenge, etc.)
    - Named policies: LearnerOnly, ExpertOnly, AdminOnly
    - Granular admin policies: AdminContentRead, AdminContentWrite, AdminContentPublish, AdminBillingRead, AdminBillingWrite, AdminUsersRead, AdminUsersWrite, AdminReviewOps, AdminSystemAdmin
    - Admin permissions stored as comma-separated JWT claim, checked via HasAdminPermission helper
  data_validation_in_domain: |
    - Email validation via AuthEmailAddress.TrimAndValidateOrThrow / NormalizeOrThrow
    - Required field checks with ApiException.Validation
    - Password required checks
    - OTP code format validation (6 digits)
    - Recovery code hash-based validation

