p24_content_approval:
  summary: "Single-stage approval workflow exists. Content: Draft→InReview→(approved→Published | rejected→Draft). No multi-stage chain."
  complexity_estimate: "large — ~4-6 days for multi-stage (schema + service + UI + migration)"

  current_workflow:
    content_statuses:
      enum: "ContentStatus { Draft, InReview, Published, Archived }"
      file: "backend/src/OetLearner.Api/Domain/Enums.cs"
      line: 45

    publish_request_entity:
      file: "backend/src/OetLearner.Api/Domain/AdminEntities.cs"
      line: 136
      fields:
        - "Id (string, PK)"
        - "ContentItemId (string)"
        - "RequestedBy / RequestedByName"
        - "ReviewedBy / ReviewedByName"
        - "Status: 'pending' | 'approved' | 'rejected'"
        - "RequestNote / ReviewNote"
        - "RequestedAt / ReviewedAt"

    workflow_steps:
      - step: 1
        action: "Author creates/edits content in admin-content-editor"
        file: "components/domain/admin-content-editor.tsx"
        detail: "Can 'Save Draft' or 'Publish' directly"
      - step: 2
        action: "Author clicks Publish → publishAdminContent() is called"
        detail: "This directly publishes without approval for some paths"
      - step: 3
        action: "OR author requests publish → RequestContentPublishAsync()"
        file: "backend/src/OetLearner.Api/Services/AdminService.cs"
        line: 2982
        detail: "Creates ContentPublishRequest with status='pending', sets content to InReview"
      - step: 4
        action: "Reviewer views pending requests on /admin/publish-requests"
        file: "app/admin/publish-requests/page.tsx"
        detail: "Modal to approve/reject with optional note"
      - step: 5a
        action: "Approve → ApprovePublishRequestAsync()"
        file: "backend/src/OetLearner.Api/Services/AdminService.cs"
        line: 3055
        detail: "Sets PR status='approved', content status=Published, creates revision"
      - step: 5b
        action: "Reject → RejectPublishRequestAsync()"
        line: 3089
        detail: "Sets PR status='rejected', content remains InReview (no automatic revert to Draft)"

    validation_rules:
      - "Content must be Draft or InReview to request publishing"
      - "Cannot have duplicate pending requests for same content"
      - "Cannot approve your own publish request (self_approve check)"

    roles_involved:
      - role: "author"
        capabilities: "Create content, edit drafts, request publish, direct publish"
        note: "No role-based restriction on direct publish in admin-content-editor currently"
      - role: "reviewer"
        capabilities: "Approve or reject publish requests"
        note: "Any admin can review — no explicit 'editor' or 'publisher' role distinction"

  missing_for_multi_stage:
