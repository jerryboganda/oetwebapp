name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - android
          - ios
          - both
        default: both
      version:
        description: 'Version name (e.g. 1.2.0)'
        required: true
        type: string
      version_code:
        description: 'Version code / build number (integer)'
        required: true
        type: string

concurrency:
  group: mobile-release
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ── Android Release AAB ────────────────────────────────────────
  android-release:
    name: Android Release
    if: inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Validate Android release inputs
        run: node scripts/qa/validate-mobile-release-inputs.mjs --platform=android --version="$MOBILE_VERSION" --version-code="$MOBILE_VERSION_CODE"
        env:
          MOBILE_VERSION: ${{ inputs.version }}
          MOBILE_VERSION_CODE: ${{ inputs.version_code }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Set version
        working-directory: android/app
        env:
          MOBILE_VERSION: ${{ inputs.version }}
          MOBILE_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const file = 'build.gradle';
           const version = process.env.MOBILE_VERSION;
           const versionCode = process.env.MOBILE_VERSION_CODE;
           let content = fs.readFileSync(file, 'utf8');
           if (!/versionCode\s+\d+/.test(content)) throw new Error('build.gradle is missing versionCode');
           if (!/versionName\s+"[^"]+"/.test(content)) throw new Error('build.gradle is missing versionName');
           content = content.replace(/versionCode\s+\d+/, `versionCode ${versionCode}`);
           content = content.replace(/versionName\s+"[^"]+"/, `versionName "${version}"`);
           fs.writeFileSync(file, content);
          NODE

      - name: Build Next.js
        run: npm run build
        env:
          CAPACITOR_APP_URL: https://app.oetwithdrhesham.co.uk

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode keystore
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Create keystore.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const required = ['ANDROID_KEYSTORE_PASSWORD', 'ANDROID_KEY_ALIAS', 'ANDROID_KEY_PASSWORD'];
          for (const name of required) {
            if (!process.env[name]) throw new Error(`${name} is required`);
          }
          fs.writeFileSync('android/keystore.properties', [
            'storeFile=release-keystore.jks',
            `storePassword=${process.env.ANDROID_KEYSTORE_PASSWORD}`,
            `keyAlias=${process.env.ANDROID_KEY_ALIAS}`,
            `keyPassword=${process.env.ANDROID_KEY_PASSWORD}`,
            '',
          ].join('\n'));
          NODE

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab-${{ inputs.version }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk-${{ inputs.version }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

  # ── iOS Release IPA ────────────────────────────────────────────
  ios-release:
    name: iOS Release
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Validate iOS release inputs
        run: node scripts/qa/validate-mobile-release-inputs.mjs --platform=ios --version="$MOBILE_VERSION" --version-code="$MOBILE_VERSION_CODE"
        env:
          MOBILE_VERSION: ${{ inputs.version }}
          MOBILE_VERSION_CODE: ${{ inputs.version_code }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}

      - name: Build Next.js
        run: npm run build
        env:
          CAPACITOR_APP_URL: https://app.oetwithdrhesham.co.uk

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Set version
        env:
          MOBILE_VERSION: ${{ inputs.version }}
          MOBILE_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          cd ios/App
          agvtool new-marketing-version "$MOBILE_VERSION"
          agvtool new-version -all "$MOBILE_VERSION_CODE"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/oetprep.mobileprovision

      - name: Build archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const teamId = process.env.APPLE_TEAM_ID;
          if (!teamId) throw new Error('APPLE_TEAM_ID is required');
          const escapedTeamId = teamId
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&apos;');
          fs.writeFileSync(path.join(process.env.RUNNER_TEMP, 'ExportOptions.plist'), `<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${escapedTeamId}</string>
          </dict>
          </plist>
          `);
          NODE
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa-${{ inputs.version }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 90
