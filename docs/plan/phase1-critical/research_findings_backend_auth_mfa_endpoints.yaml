patterns_found:
  - category: architecture
    pattern: "Minimal API endpoint-per-feature pattern"
    description: "Each feature area has its own static MapXxxEndpoints extension method in a dedicated file under Endpoints/. All endpoints are registered in Program.cs via extension method calls."
    examples:
      - file: AuthEndpoints.cs
        location: "AuthEndpoints.cs:10"
        snippet: "public static IEndpointRouteBuilder MapAuthEndpoints(this IEndpointRouteBuilder app)"
    prevalence: common

  - category: architecture
    pattern: "Request/Response DTO records in Contracts/"
    description: "All request and response types are C# records in Contracts/ folder, separated into AuthRequests.cs and AuthResponses.cs files per domain."
    examples:
      - file: AuthRequests.cs
        location: "AuthRequests.cs:1-53"
        snippet: "public record MfaChallengeRequest(string Email, string Code, string? ChallengeToken, string? RecoveryCode);"
    prevalence: common

  - category: architecture
    pattern: "Scoped service layer"
    description: "Business logic lives in Services/ as scoped services injected via DI. AuthService is the main auth orchestrator."
    examples:
      - file: AuthService.cs
        location: "AuthService.cs:18"
        snippet: "public sealed class AuthService(LearnerDbContext db, IPasswordHasher<ApplicationUserAccount> passwordHasher, AuthTokenService tokenService, ...)"
    prevalence: common

  - category: error_handling
    pattern: "ApiException custom exception with global handler"
    description: "All domain errors throw ApiException (static factory methods: Validation, NotFound, Conflict, Forbidden). MFA challenge throws MfaChallengeRequiredException. Both are caught by the global UseExceptionHandler in Program.cs."
    examples:
      - file: Program.cs
        location: "Program.cs:~480"
        snippet: "if (exception is MfaChallengeRequiredException mfaChallengeRequiredException) { context.Response.StatusCode = 403; ... }"
    prevalence: common

  - category: naming
    pattern: "Entity classes in Domain/, one file per subdomain"
    description: "Domain entities are grouped by feature area with suffix 'Entities.cs' (AuthEntities.cs, BillingEntities.cs, etc.)"
    examples:
      - file: AuthEntities.cs
        location: "AuthEntities.cs:1"
        snippet: "namespace OetLearner.Api.Domain;"
    prevalence: common

  - category: structure
    pattern: "MFA challenge-response flow via exception"
    description: "When sign-in detects MFA is enabled, it throws MfaChallengeRequiredException (caught by middleware, returned as 403 with email + challengeToken). Client then calls /mfa/challenge or /mfa/recovery with the token."
    examples:
      - file: AuthService.cs
        location: "AuthService.cs:~310"
        snippet: "if (account.AuthenticatorEnabledAt is not null) { throw new MfaChallengeRequiredException(account.Email, CreateMfaChallengeToken(account.Id)); }"
    prevalence: occasional

  - category: structure
    pattern: "Data-protection-based MFA challenge tokens"
    description: "MFA challenge tokens are created using IDataProtector to encrypt the account ID, providing tamper-proof opaque tokens."
    examples:
      - file: AuthService.cs
        location: "AuthService.cs:33"
        snippet: "_mfaChallengeProtector = dataProtectionProvider.CreateProtector(\"AuthService.MfaChallenge\")"
    prevalence: occasional

