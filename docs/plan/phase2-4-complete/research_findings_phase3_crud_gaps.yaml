related_conventions:
  naming_patterns_in_domain: "fetchAdmin* / adminProcess* for admin API functions; ContentHierarchyService / PrivateSpeakingService for backend service classes"
  structure_of_domain: "Endpoint files map routes → service methods → EF Core. Frontend pages use useEffect+useState pattern with AsyncStateWrapper."
  error_handling_in_domain: "Frontend: useState<PageStatus> + try/catch + Toast. Backend: Results.NotFound / Results.BadRequest."
  testing_in_domain: "AdminFlowsTests covers admin endpoints. ProductionReadinessTests covers media upload pipeline."
  documentation_in_domain: "admin_cms_backend_api_complete_A_to_Z.md documents full admin API surface"

open_questions:
  - question: "Should media upload use multipart/form-data or a presigned-URL pattern like the existing speaking audio upload?"
    context: "Backend speaking upload uses upload-session → presigned PUT → complete workflow. Media assets currently only have metadata upsert."
    type: nice_to_know
    affects: ["P9"]

  - question: "Should expert session cancel use the same CancelBookingAsync method with role='expert' or need different business rules?"
    context: "Learner cancel and admin cancel both call CancelBookingAsync with different role strings. Expert cancel would be trivial to add."
    type: nice_to_know
    affects: ["P14"]

  - question: "Should user CSV import reuse InviteUserAsync per row or need a dedicated bulk endpoint?"
    context: "InviteUserAsync creates an account + sends email. Bulk import might skip email or batch it."
    type: nice_to_know
    affects: ["P12"]

gaps:
  - area: "P9 — Media upload/delete/replace"
    description: "No file upload endpoint (only metadata upsert). No DELETE endpoint for media assets. No replace workflow. Frontend has no upload UI."
    impact: research_blocker
    affects: ["P9"]

  - area: "P10 — Content hierarchy edit UI"
    description: "Backend has full CRUD. Frontend is list-only — needs create/edit forms for programs, tracks, modules, lessons, packages."
    impact: research_blocker
    affects: ["P10"]

  - area: "P11 — Permission role templates"
    description: "AdminPermissions constants and AdminPermissionGrant entity exist. No assign/revoke endpoint. No frontend UI for permission management."
    impact: research_blocker
    affects: ["P11"]

  - area: "P12 — Bulk user CSV import"
    description: "No user CSV import endpoint. ContentImportService handles content import only. AdminService.InviteUserAsync is single-user."
    impact: research_blocker
    affects: ["P12"]

  - area: "P13 — Review schedule exceptions"
    description: "Expert review schedule (GET/PUT /expert/schedule) is weekly-only. Private speaking has date-override pattern but review schedule does not."
    impact: research_blocker
    affects: ["P13"]

  - area: "P14 — Expert-initiated session cancel"
    description: "Missing expert.MapPost('/sessions/{bookingId}/cancel') in PrivateSpeakingEndpoints. Learner and admin cancel exist."
    impact: research_blocker
    affects: ["P14"]

  - area: "P15 — Forum moderation endpoints"
    description: "No delete/pin/lock/ban endpoints. ForumThread has isPinned/isLocked fields but no mutation API. Expert can only post verified replies."
    impact: research_blocker
    affects: ["P15"]

  - area: "P16 — Mobile review is NOT a stub"
    description: "ExpertMobileReviewPage is a fully functional multi-step wizard calling real API endpoints. Original P-item assumption was wrong."
    impact: nice_to_know
    affects: ["P16"]

  - area: "P17 — Session/device listing"
    description: "RefreshTokenRecord has all needed fields (CreatedAt, RevokedAt, LastUsedAt). No list-sessions or revoke-all endpoint exists. No frontend UI."
    impact: research_blocker
    affects: ["P17"]
