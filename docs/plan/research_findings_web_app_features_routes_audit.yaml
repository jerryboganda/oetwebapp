plan_id: web-app-features-routes-audit
objective: Comprehensive audit of all routes, features, components, contexts, hooks, API integrations, and auth flows
focus_area: Full web application – all roles (Learner, Expert, Admin, Sponsor)
created_at: "2026-04-13"
created_by: gem-researcher
status: completed

tldr: |
  - 65 page routes confirmed: 42 learner, 8 expert + 14 nested expert sub-routes, 41+ admin sub-routes, sponsor portal, plus auth group (13 routes) and _not-found.
  - 52 static routes + 13 dynamic routes (with [params]). Dynamic params: [sessionId], [id], [reviewRequestId], [learnerId], [caseId], [threadId], [lessonId], [drillId], [provider], [...path], [section].
  - Frontend API layer in lib/api.ts (~100+ exported fetch functions), lib/auth-client.ts (~20 auth functions), lib/notifications-api.ts, lib/admin.ts (data transform layer), lib/learner-data.ts (score guarantee/certificates/referral/study commitment).
  - Platform awareness implemented via lib/runtime-signals.ts (web/desktop/capacitor-native detection), lib/mobile/* (Capacitor native APIs), hooks/use-mobile.ts (CSS breakpoint).
  - State management: 2 React Contexts (AuthContext, NotificationCenterContext), 1 Zustand-like store (expert-store.ts), 6 custom hooks in lib/hooks/.

research_metadata:
  methodology: "Hybrid retrieval: recursive list_dir of app/ tree, file_search for all page.tsx, grep_search for exported functions and platform patterns, targeted read_file for key modules"
  scope: "Full app/ directory tree, components/, contexts/, hooks/, lib/ — all roles and route segments"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

