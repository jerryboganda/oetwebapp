plan_id: electron-impl
objective: |
  Implement the remaining Electron desktop gaps identified in docs/electron-desktop-conversion-plan.md.
  Phase 1: Security hardening (Fuses, IPC sender validation, download handler).
  Phase 2: Platform completion (Linux protocol handler, OAuth desktop flow).
