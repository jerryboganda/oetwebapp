  runtime_components:
    directory: "components/runtime/"
    count: 1
    items:
      - {name: runtime-lifecycle-bridge, purpose: "Lifecycle bridge for runtime signals (desktop/capacitor)"}

  theme_provider:
    file: "components/theme-provider.tsx"
    purpose: "next-themes ThemeProvider wrapper"

  platform_awareness:
    description: |
      Platform detection is NOT done via component-level `isNative`/`isDesktop` props.
      Instead, it's centralized in lib/runtime-signals.ts which exports getAppRuntimeKind() → 'web' | 'desktop' | 'capacitor-native'.
      The mobile runtime bridge (components/mobile/mobile-runtime-bridge.tsx) integrates Capacitor native APIs.
      The runtime lifecycle bridge (components/runtime/runtime-lifecycle-bridge.tsx) handles lifecycle for desktop/capacitor.
      Individual lib/mobile/* modules use Capacitor.isNativePlatform() directly for feature gating.
    detection_files:
      - "lib/runtime-signals.ts: getAppRuntimeKind() — checks document.dataset, window.desktopBridge, window.Capacitor"
      - "lib/auth-client.ts: buildExternalAuthStartHref() — detects platform for OAuth flow"
      - "lib/mobile/runtime.ts: isNative flag"
      - "lib/mobile/speaking-recorder.ts: isNativeSpeakingRecorderPlatform()"
      - "lib/mobile/secure-storage.ts: Capacitor.isNativePlatform() guards"
      - "lib/mobile/share.ts: Capacitor.isNativePlatform() guards"
      - "hooks/use-mobile.ts: useIsMobile() — CSS media query breakpoint (768px)"

# ============================================================
# 4. CONTEXT & STATE MANAGEMENT
# ============================================================
state_management:
  react_contexts:
    - name: AuthContext
      file: "contexts/auth-context.tsx"
      provides: |
        session, user, loading, error, role, isAuthenticated, pendingMfaChallenge,
        signIn, signUp, signOut, refreshSession, sendVerificationOtp, verifyEmailOtp,
        beginAuthenticatorSetup, confirmAuthenticatorSetup, completeMfaChallenge,
        completeRecoveryChallenge, clearError
      pattern: "createContext + useState + useEffect for session hydration"

    - name: NotificationCenterContext
      file: "contexts/notification-center-context.tsx"
      provides: |
        notifications, unreadCount, totalCount, hasMore, isLoading, connectionStatus,
        preferences, pushSupported, pushPermission, pushEnabled,
        refreshFeed, loadMore, markRead, markAllRead, updatePreferences,
        enablePush, disablePush
      pattern: "createContext + SignalR hub connection for real-time + REST API for CRUD"

  stores:
    - name: expert-store
      file: "lib/stores/expert-store.ts"
      purpose: "Expert-scoped state (likely Zustand or similar pattern)"

  custom_hooks:
    top_level:
      - name: useIsMobile
        file: "hooks/use-mobile.ts"
        purpose: "CSS breakpoint detection (768px)"
      - name: useAnalytics
        file: "hooks/use-analytics.ts"
        purpose: "Wrapper for analytics.track()"

    lib_hooks:
      - name: useCurrentUser
        file: "lib/hooks/use-current-user.ts"
        purpose: "Current authenticated user from AuthContext"
      - name: useAdminAuth
        file: "lib/hooks/use-admin-auth.ts"
        purpose: "Admin auth guard + permission check"
      - name: useExpertAuth
        file: "lib/hooks/use-expert-auth.ts"
        purpose: "Expert auth guard"
      - name: useSponsorAuth
        file: "lib/hooks/use-sponsor-auth.ts"
        purpose: "Sponsor auth guard"
      - name: useDashboardHome
        file: "lib/hooks/use-dashboard-home.ts"
        purpose: "Fetch & transform dashboard home data"
      - name: useSignupCatalog
        file: "lib/hooks/use-signup-catalog.ts"
        purpose: "Fetch registration catalog (professions, exam types)"

