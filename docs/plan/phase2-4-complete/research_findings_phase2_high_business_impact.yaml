p7_admin_permissions_sidebar:
  summary: "Backend has full granular permission system (13 permissions, 9 policies). Frontend sidebar is completely unconditional. CurrentUser lacks admin_permissions field, so frontend cannot filter."

  existing_code:
    admin_layout:
      file: app/admin/layout.tsx
      sidebar_mechanism: "Hardcoded const adminNavItems: NavItem[] with 25 entries — passed to AdminDashboardShell → AppShell → Sidebar"
      mobile_nav: "adminMobileNavItems (6 items, selected subset) + adminMobileMenuSections (4 groups)"
      page_title: "getAdminPageTitle() — pathname-based title resolution"
      permission_filtering: NONE
      notes: "Every admin sees everything regardless of their permission grants"

    nav_item_type:
      file: components/layout/sidebar.tsx
      interface: |
        NavItem { href: string; label: string; icon: ReactNode; exact?: boolean; matchPrefix?: string }
      notes: "No permission field on NavItem type"

    admin_dashboard_shell:
      file: components/layout/admin-dashboard-shell.tsx
      purpose: "Thin wrapper: AppShell + LearnerWorkspaceContainer with workspaceRole='admin'"
      accepts_nav_items: "No — nav items defined in layout.tsx, AppShell receives workspaceRole"

    backend_permissions:
      file: backend/src/OetLearner.Api/Domain/AuthEntities.cs
      class: AdminPermissions
      all_permissions:
        - "content:read"
        - "content:write"
        - "content:publish"
        - "billing:read"
        - "billing:write"
        - "users:read"
        - "users:write"
        - "review_ops"
        - "quality_analytics"
        - "ai_config"
        - "feature_flags"
        - "audit_logs"
        - "system_admin"

    backend_policies:
      file: backend/src/OetLearner.Api/Program.cs
      policies:
        - "AdminContentRead → content:read | system_admin"
        - "AdminContentWrite → content:write | system_admin"
        - "AdminContentPublish → content:publish | system_admin"
        - "AdminBillingRead → billing:read | system_admin"
        - "AdminBillingWrite → billing:write | system_admin"
        - "AdminUsersRead → users:read | system_admin"
        - "AdminUsersWrite → users:write | system_admin"
        - "AdminReviewOps → review_ops | system_admin"
        - "AdminSystemAdmin → system_admin"
      helper: "HasAdminPermission(ctx, params string[] anyOf) — checks comma-separated admin_permissions JWT claim"

    jwt_claim:
      file: backend/src/OetLearner.Api/Services/AuthTokenService.cs
      claim_type: "admin_permissions"
      format: "Comma-separated string of permission codes"
      line: 42

    permission_grant_entity:
      file: backend/src/OetLearner.Api/Domain/AuthEntities.cs
      class: AdminPermissionGrant
      fields: "Id, AdminUserId, Permission, GrantedBy, GrantedAt"

    admin_auth_hook:
      file: lib/hooks/use-admin-auth.ts
      provides: "role, isAuthenticated, isLoading, requireAdminAccess"
      permission_awareness: NONE
      notes: "Only checks role === 'admin', no permission granularity"

    current_user_type:
      file: lib/types/auth.ts
      interface: CurrentUser
      fields: "userId, email, role, displayName, isEmailVerified, isAuthenticatorEnabled, requiresEmailVerification, requiresMfa, emailVerifiedAt, authenticatorEnabledAt"
      admin_permissions_field: MISSING

    admin_permissions_api:
      file: lib/api.ts
      functions:
        - "fetchAdminPermissions(userId) → GET /v1/admin/permissions/{userId}"
        - "updateAdminPermissions(userId, permissions[]) → PUT /v1/admin/permissions/{userId}"
      notes: "These exist for the admin permissions management page, not for sidebar filtering"

    admin_permissions_type:
      file: lib/types/admin.ts
      interface: AdminPermissionsResponse
      fields: "userId, permissions: AdminPermissionGrant[], allPermissions: string[]"

  required_nav_to_permission_mapping:
