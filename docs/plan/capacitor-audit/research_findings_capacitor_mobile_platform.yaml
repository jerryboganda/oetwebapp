# ═══════════════════════════════════════════════════════════════════
# 8. PUSH NOTIFICATION PIPELINE
# ═══════════════════════════════════════════════════════════════════

push_notification_pipeline:
  frontend:
    registration: "registerPushNotifications() → requestPermissions → PushNotifications.register()"
    token_handling: |
      onRegistration callback fires with FCM/APNs token.
      Currently logged to console with TODO comment: "Send token to backend for push targeting"
    notification_received: "onNotificationReceived handler exists (in MobileRuntimeBridge)"
    action_performed: "Navigates to route from notification.data.route if present"
    badge_clearing: "removeAllDeliveredNotifications on app resume"
    permission_check: "checkPushPermission + requestPushPermission exported"

  backend:
    push_type: "Web Push only (VAPID-based via WebPush library)"
    services:
      - "NotificationService.cs — full notification orchestration with channels, scheduling, quiet hours"
      - "WebPushDispatcher.cs — IWebPushDispatcher using WebPush NuGet package"
    configuration: "WebPush:Enabled, WebPush:Subject, WebPush:PublicKey, WebPush:PrivateKey"
    fcm_support: "NOT IMPLEMENTED — no FCM Admin SDK or native push dispatcher found"
    apns_support: "NOT IMPLEMENTED — no APNs integration found"
    device_token_storage: "NOT IMPLEMENTED — no DeviceToken/register-device endpoint found"

  pipeline_status:
    web_push: COMPLETE
    native_push_ios: "INCOMPLETE — APNs token not sent to backend; no APNs dispatcher"
    native_push_android: "INCOMPLETE — FCM token not sent to backend; no FCM dispatcher; google-services.json missing"
    gap: |
      Frontend registers for push and receives FCM/APNs tokens, but there is no backend endpoint
      to store device tokens and no server-side FCM/APNs dispatcher. Push notifications on native
      will NOT work until: (1) token registration endpoint, (2) FCM/APNs server-side integration,
      (3) google-services.json for Android.

# ═══════════════════════════════════════════════════════════════════
# 9. OFFLINE CAPABILITY
# ═══════════════════════════════════════════════════════════════════

offline_capability:
  implementation: lib/mobile/offline-sync.ts
  storage: IndexedDB
  database: oet-offline
  version: 1

  features:
    content_caching:
      ttl: "7 days"
      storage: "IndexedDB object store 'content'"
      operations: [cacheContent, getCachedContent, clearExpiredContent]

    attempt_queuing:
      storage: "IndexedDB object store 'attempts' with synced index"
      operations: [queueOfflineAttempt, getPendingAttempts, markAttemptSynced]

    vocabulary_cache:
      storage: "IndexedDB object store 'vocabulary'"
      operations: [cacheVocabularyTerms, getCachedVocabularyTerms]

    sync_engine:
      method: "syncPendingAttempts(callback) — iterates pending, calls sync callback, marks synced"
      auto_sync: "enableAutoSync(callback) — listens for online event, triggers sync"

    network_detection:
      method: "navigator.onLine + online/offline events (in offline-sync.ts)"
      native_method: "Capacitor Network plugin (in runtime.ts)"

  service_worker:
    on_capacitor: "DISABLED — providers.tsx skips SW registration when __CAPACITOR_NATIVE__ is set"
    on_web: "Registered at /sw.js for web platform"

  status_reporting:
    method: getOfflineSyncStatus
    fields: [lastSyncedAt, pendingAttempts, cachedContentCount, isOnline]

  integration_status: |
    The offline-sync module is fully implemented as a library but its integration into actual
    app pages (calling cacheContent, queueOfflineAttempt, etc.) was not found in the search.
    This module appears to be infrastructure-ready but not yet wired into production page flows.

# ═══════════════════════════════════════════════════════════════════
# 10. STORE / DISTRIBUTION READINESS
# ═══════════════════════════════════════════════════════════════════

store_readiness:
  app_icons:
    android: "Full set: mipmap-hdpi through mipmap-xxxhdpi + adaptive (anydpi-v26)"
    ios: "AppIcon-512@2x.png (single 1024x1024 asset)"

  splash_screens:
    android: "Full set: portrait + landscape drawables (hdpi through xxxhdpi)"
    ios: "3 splash variants (2732x2732) + LaunchScreen storyboard"

  store_listing_metadata:
    file: docs/mobile-store-listings.md
    content:
      - "App name: OET Prep Learner"
      - "Short description (80 char)"
      - "Full description for Google Play"
      - "Full description for Apple App Store"

  privacy:
    ios_privacy_manifest: "PrivacyInfo.xcprivacy — complete (tracking=false, 3 data types, 1 API type)"
    android_data_safety: "Not found in codebase — must be filled in Play Console"
    encryption_declaration: "ITSAppUsesNonExemptEncryption = false"

  deep_link_verification:
    android_assetlinks: "public/.well-known/assetlinks.json — PLACEHOLDER sha256 fingerprint"
    apple_aasa: "public/.well-known/apple-app-site-association — PLACEHOLDER TEAM_ID"
    status: "Both files exist but have placeholder values that must be replaced before production"

  ci_cd:
    mobile_ci: ".github/workflows/mobile-ci.yml — lint, type-check, unit tests, Android debug build"
    mobile_release: ".github/workflows/mobile-release.yml — manual dispatch for Android/iOS/both with version input"
    triggers: "Push to main + PR on android/, ios/, capacitor.config.ts, lib/mobile/, components/mobile/"

  version:
    android: "versionCode 1, versionName 1.0 (in build.gradle)"
    ios: "$(MARKETING_VERSION) / $(CURRENT_PROJECT_VERSION) — Xcode managed"

  signing:
    android: "Release signing via keystore.properties (conditional)"
    ios: "Managed via Xcode project settings"

  store_urls:
    android: "https://play.google.com/store/apps/details?id=com.oetprep.learner"
    ios: "https://apps.apple.com/app/oet-prep-learner/id0000000000 (PLACEHOLDER)"

# ═══════════════════════════════════════════════════════════════════
# 11. FEATURE PARITY GAPS (Mobile vs Web)
# ═══════════════════════════════════════════════════════════════════

feature_parity_gaps:
  mobile_only_features:
    - "Native haptic feedback (impact, notification)"
    - "Native speaking recorder (AVAudioRecorder on iOS)"
    - "Secure Keychain/Keystore token storage"
    - "Forced app update checking"
    - "Native share sheet"
    - "Status bar chrome sync"
    - "App resume motion animation"
    - "Android back button handling"

  web_only_features:
    - "Service worker registration"
    - "Web Push notifications (VAPID)"

  incomplete_on_mobile:
    - feature: "Push notifications"
      gap: "Frontend registers but backend can't deliver native push (no FCM/APNs)"
    - feature: "Biometric authentication"
      gap: "Not implemented on any platform"
    - feature: "Pull-to-refresh"
      gap: "Referenced in plans but not implemented"
    - feature: "Swipe gestures for flashcards"
      gap: "Referenced in mega-master-prompt but not implemented"
    - feature: "Camera for profile photos"
      gap: "Planned P3 — @capacitor/camera not installed"
    - feature: "Local notifications (study reminders)"
      gap: "Planned P2 — @capacitor/local-notifications not installed"
    - feature: "Offline actual page integration"
      gap: "offline-sync library exists but app pages don't consume it"
    - feature: "@capacitor/filesystem usage"
      gap: "Installed in native project but not imported in any TypeScript file"

# ═══════════════════════════════════════════════════════════════════
# OPEN QUESTIONS
# ═══════════════════════════════════════════════════════════════════

open_questions:
  - question: "Is there a backend endpoint planned for native push token registration?"
    context: "Frontend TODO comment says 'Send token to backend for push targeting' but no endpoint exists"
    type: decision_blocker
    affects: [push-notifications, native-push-delivery]

  - question: "How does the backend distinguish capacitor OAuth redirects from web OAuth?"
    context: "auth-client sends platform=capacitor but NormalizePlatform in backend only recognizes 'desktop'; capacitor may fall through to default web flow"
    type: decision_blocker
    affects: [mobile-auth-flow, oauth-callback]

  - question: "Are the .well-known placeholder values (SHA256 fingerprint, TEAM_ID) blocking deep link verification in production?"
    context: "assetlinks.json has REPLACE_WITH_YOUR_SHA256_CERT_FINGERPRINT; AASA has TEAM_ID prefix"
    type: research
    affects: [deep-link-verification, store-submission]

  - question: "Why is @capacitor/filesystem installed in the native project but not used in any TypeScript code?"
    context: "Listed in package.json and capacitor.build.gradle but zero imports found"
    type: nice_to_know
    affects: [bundle-size, unused-dependencies]

  - question: "Is the offline-sync module actively consumed by any page components?"
    context: "Library is fully built but grep found no imports of cacheContent/queueOfflineAttempt in app/ or components/"
    type: research
    affects: [offline-capability, feature-completeness]

# ═══════════════════════════════════════════════════════════════════
# GAPS
# ═══════════════════════════════════════════════════════════════════

gaps:
  - area: "Native push notification delivery"
    description: "No backend FCM/APNs integration; no device token registration endpoint; no google-services.json"
    impact: decision_blocker
    affects: [push-notifications]

  - area: "OAuth capacitor platform handling"
    description: "Backend NormalizePlatform only accepts 'desktop'; capacitor platform likely falls through to web — needs verification"
    impact: decision_blocker
    affects: [mobile-auth-flow]

  - area: "Deep link verification files"
    description: "assetlinks.json and apple-app-site-association have placeholder values that must be replaced"
    impact: research_blocker
    affects: [deep-link-verification]

  - area: "iOS App Store ID"
    description: "forced-update.ts has placeholder App Store ID (id0000000000)"
    impact: research_blocker
    affects: [forced-update, store-listing]

  - area: "Filesystem plugin unused"
    description: "@capacitor/filesystem is installed and in native gradle but never imported in TS code"
    impact: nice_to_know
    affects: [bundle-size]

  - area: "Offline-sync integration"
    description: "offline-sync.ts library is complete but not consumed by any app pages"
    impact: nice_to_know
    affects: [offline-capability]

  - area: "Android google-services.json missing"
    description: "Required for Firebase/FCM push notifications; build.gradle warns if absent"
    impact: research_blocker
    affects: [push-notifications, android-build]
