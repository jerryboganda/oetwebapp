# =============================================================================
# docker-compose.staging.yml — OET Staging Stack
#
# Usage:
#   docker compose --env-file .env.staging -f docker-compose.staging.yml up -d --build
#
# Requires: .env.staging (copy from .env.staging.example and fill in secrets).
# See docs/STAGING-LOCAL-GITHUB-PLAN.md for the full setup checklist.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — staging database
  # Env vars: POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: oet-staging-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_stat_statements.max=5000
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - oetwebsite_staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # ClamAV — upload virus scanner sidecar
  # No secrets required; uses a persistent volume for signature DB.
  # ---------------------------------------------------------------------------
  clamav:
    image: clamav/clamav:stable
    container_name: oet-staging-clamav
    restart: unless-stopped
    volumes:
      - oetwebsite_staging_clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Learner API — .NET backend
  # Most env vars have defaults; see .env.staging.example for REQUIRED ones.
  # ---------------------------------------------------------------------------
  learner-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: oet-staging-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://+:8080
      AllowedHosts: ${API_ALLOWED_HOSTS:?Set staging API_ALLOWED_HOSTS};127.0.0.1;localhost;learner-api
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      AUTHTOKENS__ISSUER: ${AUTHTOKENS__ISSUER}
      AUTHTOKENS__AUDIENCE: ${AUTHTOKENS__AUDIENCE}
      AUTHTOKENS__ACCESSTOKENSIGNINGKEY: ${AUTHTOKENS__ACCESSTOKENSIGNINGKEY}
      AUTHTOKENS__REFRESHTOKENSIGNINGKEY: ${AUTHTOKENS__REFRESHTOKENSIGNINGKEY}
      AUTHTOKENS__ACCESSTOKENLIFETIME: ${AUTHTOKENS__ACCESSTOKENLIFETIME:-00:15:00}
      AUTHTOKENS__REFRESHTOKENLIFETIME: ${AUTHTOKENS__REFRESHTOKENLIFETIME:-30.00:00:00}
      AUTHTOKENS__OTPLIFETIME: ${AUTHTOKENS__OTPLIFETIME:-00:10:00}
      AUTHTOKENS__AUTHENTICATORISSUER: ${AUTHTOKENS__AUTHENTICATORISSUER:-OET Staging}
      BREVO__ENABLED: ${BREVO__ENABLED:-false}
      BREVO__APIKEY: ${BREVO__APIKEY:-}
      BREVO__BASEURL: ${BREVO__BASEURL:-https://api.brevo.com/v3}
      BREVO__FROMEMAIL: ${BREVO__FROMEMAIL:-staging@example.invalid}
      BREVO__FROMNAME: ${BREVO__FROMNAME:-OET Staging}
      SMTP__ENABLED: ${SMTP__ENABLED:-false}
      Billing__AllowSandboxFallbacks: ${BILLING__ALLOWSANDBOXFALLBACKS:-true}
      Billing__Stripe__SecretKey: ${BILLING__STRIPE__SECRETKEY:-}
      Billing__Stripe__SuccessUrl: ${BILLING__STRIPE__SUCCESSURL:-https://staging.oetwithdrhesham.co.uk/billing/success}
      Billing__Stripe__CancelUrl: ${BILLING__STRIPE__CANCELURL:-https://staging.oetwithdrhesham.co.uk/billing/cancel}
      Billing__Stripe__WebhookSecret: ${BILLING__STRIPE__WEBHOOKSECRET:-}
      Platform__PublicApiBaseUrl: ${PUBLIC_API_BASE_URL}
      Platform__FallbackEmailDomain: ${FALLBACK_EMAIL_DOMAIN:-staging.example.invalid}
      Billing__CheckoutBaseUrl: ${CHECKOUT_BASE_URL:-https://staging.oetwithdrhesham.co.uk}
      Storage__LocalRootPath: /var/opt/oet-learner/storage
      Storage__MaxUploadBytes: ${MAX_UPLOAD_BYTES:-26214400}
      Bootstrap__AutoMigrate: ${AUTO_MIGRATE:-true}
      Bootstrap__SeedDemoData: ${SEED_DEMO_DATA:-true}
      Proxy__TrustForwardHeaders: true
      Proxy__EnforceHttps: true
      Cors__AllowedOriginsCsv: ${CORS_ALLOWED_ORIGINS}
      Features__EnableSwagger: ${ENABLE_SWAGGER:-true}
      AI__ProviderId: ${AI__ProviderId:-mock}
      AI__BaseUrl: ${AI__BaseUrl:-}
      AI__ApiKey: ${AI__ApiKey:-}
      AI__DefaultModel: ${AI__DefaultModel:-mock}
      AI__ReasoningEffort: ${AI__ReasoningEffort:-low}
      AI__DefaultMaxTokens: ${AI__DefaultMaxTokens:-2048}
      AI__DefaultTemperature: ${AI__DefaultTemperature:-0.2}
      UploadScanner__Provider: ${UPLOAD_SCANNER__PROVIDER:-clamav}
      UploadScanner__Host: ${UPLOAD_SCANNER__HOST:-clamav}
      UploadScanner__Port: ${UPLOAD_SCANNER__PORT:-3310}
      UploadScanner__FailClosedOnError: ${UPLOAD_SCANNER__FAILCLOSEDONERROR:-true}
    volumes:
      - oetwebsite_staging_learner_storage:/var/opt/oet-learner/storage
    expose:
      - "8080"
    networks:
      - internal
      - npm_proxy

  # ---------------------------------------------------------------------------
  # Web — Next.js frontend
  # Build args: NEXT_PUBLIC_API_BASE_URL, APP_URL
  # Runtime:    GEMINI_API_KEY (optional)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        APP_URL: ${APP_URL}
    container_name: oet-staging-web
    restart: unless-stopped
    depends_on:
      learner-api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      API_PROXY_TARGET_URL: http://learner-api:8080
      APP_URL: ${APP_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    expose:
      - "3000"
    networks:
      - internal
      - npm_proxy

# Named volumes — persist across container recreates.
volumes:
  oetwebsite_staging_postgres_data:
  oetwebsite_staging_learner_storage:
  oetwebsite_staging_clamav_data:

# Networks — internal bridge + external Nginx Proxy Manager network.
networks:
  internal:
    driver: bridge
  npm_proxy:
    external: true
    name: ${NPM_PROXY_NETWORK:-npm_proxy}
