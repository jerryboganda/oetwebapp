  - id: sec-download-handler
    title: "Add will-download session handler for file downloads"
    description: |
      Add a session.defaultSession.on('will-download') handler inside the
      app.whenReady() block in main.cjs, after the existing session permission
      setup. This handles file downloads (certificates, CSV exports, audio files)
      that would otherwise fail silently in Electron.

      Implementation:
      1. Add the handler after session.defaultSession.setPermissionCheckHandler:

         session.defaultSession.on('will-download', (_event, item, _webContents) => {
           const suggestedFilename = item.getFilename();
           const savePath = dialog.showSaveDialogSync(mainWindow, {
             defaultPath: suggestedFilename,
           });

           if (!savePath) {
             item.cancel();
             return;
           }

           item.setSavePath(savePath);

           item.on('done', (_e, state) => {
             if (state === 'completed') {
               shell.showItemInFolder(savePath);
             }
           });
         });

      2. Behavior:
         - Prompts native OS save dialog with suggested filename
         - If user cancels dialog, download is cancelled (item.cancel())
         - If user confirms, file is saved to chosen path
         - On completion, reveals file in system file manager
         - No progress bar (keep simple; can add later if needed)

      3. dialog is already imported at top of main.cjs (line 1).
         shell is already imported at top of main.cjs (line 1).
