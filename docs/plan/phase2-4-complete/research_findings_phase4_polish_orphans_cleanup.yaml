open_questions:
  - question: "Should readiness/risk and streak-freeze endpoints require explicit .RequireAuthorization('LearnerOnly')?"
    context: "Both endpoints call http.UserId() which requires auth, but lack the explicit policy chain"
    type: research
    affects: ["P18"]

  - question: "Should admin-content-editor's direct 'Publish' button be removed or gated behind the approval workflow?"
    context: "Currently any admin can bypass the publish-request flow by clicking 'Publish' in the editor"
    type: decision_blocker
    affects: ["P24"]

  - question: "What export format do stakeholders prefer — CSV, Excel, or both?"
    context: "No export library exists; choice affects dependency and implementation complexity"
    type: decision_blocker
    affects: ["P23"]

  - question: "Is the expert onboarding wizard a new standalone route or a modal overlay on /expert?"
    context: "Need to decide UX pattern before implementation"
    type: decision_blocker
    affects: ["P22"]

