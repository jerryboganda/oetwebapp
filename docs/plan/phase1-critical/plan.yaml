  # ─── Wave 2: Middleware + Frontend Delete (2 parallel) ─────────────
  - id: p3-middleware
    title: "Create Next.js middleware for server-side route protection"
    description: |
      Create middleware.ts at project root. This is the first server-side auth gate — currently all
      route protection is client-side via AuthGuard which causes an HTML flash for unauthenticated users.

      Middleware logic:
      1. Read oet_auth cookie from request
      2. If path matches public routes → NextResponse.next()
      3. If path matches protected routes AND no cookie → redirect to /sign-in?next={pathname}
      4. If cookie exists → NextResponse.next() (role enforcement remains client-side)

      Public routes (convention-based matching):
      Match paths under /(auth)/** route group as public (maps to URL paths: /sign-in, /register,
      /register/success, /forgot-password, /forgot-password/verify, /reset-password,
      /reset-password/success, /verify-email, /mfa/challenge, /mfa/setup, /mfa/recovery,
      /auth/callback/*) plus explicit exceptions (/terms). This uses Next.js route group conventions
      instead of maintaining a hardcoded URL list.
      Export the public route pattern as a shared constant importable by tests.

      Matcher config excludes:
      /_next/static, /_next/image, /favicon.ico, /api/*, /public assets (*.svg, *.png, *.jpg, etc.)

      Key constraint: This is a flag-only check, NOT token validation. The cookie contains no sensitive
      data. Full auth validation remains the backend's responsibility. This prevents serving protected
      HTML to unauthenticated browsers before client-side redirect.
