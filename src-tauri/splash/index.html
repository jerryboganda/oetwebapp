<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OET Prep</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f7f5ef; color: #1c1917; display: grid; place-items: center; height: 100vh; margin: 0; }
    .card { text-align: center; }
    .spinner { width: 36px; height: 36px; margin: 0 auto 1rem; border: 3px solid #e7e5e4; border-top-color: #44403c; border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #57534e; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>OET Prep</h1>
    <p>Starting local services…</p>
  </div>
</body>
</html>
