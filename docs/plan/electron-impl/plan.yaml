created_by: gem-planner
status: completed
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 3
  risk_score: low

tldr: |
  Five tasks across two waves to close the remaining Electron desktop gaps.
  Wave 1 (parallel): Install @electron/fuses with afterSign hook, add IPC sender
  validation to all 11 handlers, add will-download session handler.
  Wave 2 (depends on wave 1): Add Linux .desktop protocol mimeType, implement
  OAuth desktop flow via custom protocol callback.
  All changes are in CommonJS (.cjs) files. No product behavior changes in wave 1.

