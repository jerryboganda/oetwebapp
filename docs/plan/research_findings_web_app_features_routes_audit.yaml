# ============================================================
api_integration:
  architecture:
    proxy_route: "app/api/backend/[...path]/route.ts — forwards /v1/* to NEXT_PUBLIC_API_BASE_URL"
    health_route: "app/api/health/route.ts — frontend health check"
    base_client: "lib/api.ts — apiRequest() with auth, retry (max 2), timeout, typed errors"
    auth_client: "lib/auth-client.ts — postJson/getJson with auth token management"
    notification_client: "lib/notifications-api.ts — notification-specific API client"
    data_layers: "lib/admin.ts (admin data transforms), lib/learner-data.ts (learner feature data transforms)"

