patterns_found:
  - category: architecture
    pattern: "Thin page.tsx + extracted component"
    description: "Auth page.tsx files are thin wrappers that handle route guards (redirect logic via useEffect) and delegate all UI to a component in components/auth/. MFA setup → MfaSetupCard. MFA challenge → MfaChallengeForm. Verify-email is the exception — its logic is inline."
    examples:
      - file: app/(auth)/mfa/setup/page.tsx
        location: "line 33"
        snippet: "return <MfaSetupCard nextHref={nextHref} />;"
      - file: app/(auth)/mfa/challenge/page.tsx
        location: "line 33"
        snippet: "return <MfaChallengeForm nextHref={nextHref} />;"
    prevalence: common

  - category: architecture
    pattern: "AuthScreenShell as universal auth page wrapper"
    description: "Every auth page uses AuthScreenShell for consistent layout: brand, eyebrow badge, title, subtitle, card container, optional footer/socials. Children are placed inside styles.form grid."
    examples:
      - file: components/auth/mfa-challenge-form.tsx
        location: "line 75"
        snippet: |
          <AuthScreenShell
            eyebrow="Multi-Factor Authentication"
            title="Complete MFA challenge"
            subtitle={...}
          >
      - file: app/(auth)/verify-email/page.tsx
        location: "line 113"
        snippet: |
          <AuthScreenShell
            brandHref={AUTH_ROUTES.signIn}
            brandLabel="OET"
            eyebrow="Step Verification"
            title="Verify OTP"
            subtitle={...}
            footer={<p className={styles.resend}>...</p>}
          >
    prevalence: common

  - category: structure
    pattern: "useState-based form handling"
    description: "No react-hook-form or formAction. All auth forms use useState for each field (code, recoveryCode, otp, error, isSubmitting). Submit handlers are async functions on <form onSubmit={...}>."
    examples:
      - file: components/auth/mfa-challenge-form.tsx
        location: "lines 29-34"
        snippet: |
          const [code, setCode] = useState('');
          const [recoveryCode, setRecoveryCode] = useState('');
          const [error, setError] = useState<string | null>(null);
          const [isSubmittingCode, setIsSubmittingCode] = useState(false);
          const [isSubmittingRecovery, setIsSubmittingRecovery] = useState(false);
    prevalence: common

  - category: error_handling
    pattern: "Inline error notices — no toasts"
    description: "Auth pages display errors inline using <div className={styles.noticeDanger}> or <p className={styles.noticeDanger}>. No toast/sonner/notification library is used in auth flows. Success is shown via styles.noticeSuccess. Error extraction uses a shared readErrorMessage() helper."
    examples:
      - file: components/auth/mfa-challenge-form.tsx
        location: "line 108"
        snippet: "{error ? <div className={`${styles.notice} ${styles.noticeDanger}`}>{error}</div> : null}"
      - file: app/(auth)/verify-email/page.tsx
        location: "line 142"
        snippet: |
          {errorMessage ? (
            <p className={`${styles.notice} ${styles.noticeDanger}`.trim()}>
              {errorMessage}
            </p>
          ) : null}
    prevalence: common

  - category: error_handling
    pattern: "readErrorMessage helper duplicated in each component"
    description: "Each MFA/auth component has a local readErrorMessage(error: unknown): string function that extracts error.message or returns a component-specific default. Not shared across files."
    examples:
      - file: components/auth/mfa-setup-card.tsx
        location: "line 20"
        snippet: "return 'Unable to complete MFA setup.';"
      - file: components/auth/mfa-challenge-form.tsx
        location: "line 18"
        snippet: "return 'Unable to verify the MFA challenge.';"
      - file: app/(auth)/verify-email/page.tsx
        location: "line 17"
        snippet: "return 'Unable to verify the OTP code.';"
    prevalence: common

  - category: naming
    pattern: "CSS module import as 'styles'"
    description: "All auth components import auth-screen-shell.module.scss as `styles` and reference classes via styles.xxx."
    examples:
      - file: components/auth/mfa-setup-card.tsx
        location: "line 13"
        snippet: "import styles from './auth-screen-shell.module.scss';"
    prevalence: common

  - category: architecture
    pattern: "Auth context as single source of auth operations"
    description: "Components call auth operations via useAuth() hook (completeMfaChallenge, completeRecoveryChallenge, beginAuthenticatorSetup, etc). The context delegates to lib/auth-client.ts functions and updates shared state."
    examples:
      - file: components/auth/mfa-challenge-form.tsx
        location: "line 28"
        snippet: "const { pendingMfaChallenge, completeMfaChallenge, completeRecoveryChallenge } = useAuth();"
    prevalence: common

  - category: architecture
    pattern: "Direct lib/auth-client.ts calls (bypass context)"
    description: "The verify-email page calls lib/auth-client.ts functions directly (sendEmailVerificationOtp, verifyEmailOtp) rather than through the auth context. This is because the verify-email page may operate without a full session."
    examples:
      - file: app/(auth)/verify-email/page.tsx
        location: "line 8"
        snippet: "import { sendEmailVerificationOtp, verifyEmailOtp } from '@/lib/auth-client';"
    prevalence: occasional

  - category: architecture
    pattern: "OTP field via OtpCodeInput component"
    description: "All 6-digit OTP entries use the shared OtpCodeInput component with value/onChange/disabled/length props. It renders a per-digit input grid with auto-advance, paste support, and keyboard navigation."
    examples:
      - file: components/auth/mfa-setup-card.tsx
        location: "line 164"
        snippet: "<OtpCodeInput value={code} onChange={(next) => { setCode(next.replace(/\\D/g, '').slice(0, 6)); setError(null); }} disabled={!setup || isConfirming} />"
    prevalence: common

  - category: naming
    pattern: "Icons from @tabler/icons-react"
    description: "Auth pages use @tabler/icons-react for all icons: IconArrowRight, IconDeviceMobile, IconKey, IconShieldLock."
    examples:
      - file: components/auth/mfa-challenge-form.tsx
        location: "line 4"
        snippet: "import { IconArrowRight, IconDeviceMobile, IconKey, IconShieldLock } from '@tabler/icons-react';"
    prevalence: common

  - category: architecture
    pattern: "Post-auth routing via resolvePostAuthDestination"
    description: "After successful MFA/auth operations, components call resolvePostAuthDestination(user, nextHref) to compute the correct role-based redirect. admin→/admin, expert→/expert, learner→/."
    examples:
      - file: components/auth/mfa-challenge-form.tsx
        location: "line 52"
        snippet: "router.replace(resolvePostAuthDestination(session.currentUser, nextHref));"
    prevalence: common

  - category: structure
    pattern: "wizard layout for multi-section MFA forms"
    description: "MFA setup and challenge forms use <div className={styles.wizard}> as a parent grid, with .summaryCard children for grouped content sections, .passwordFlowForm for the actual form, and action rows."
    examples:
      - file: components/auth/mfa-challenge-form.tsx
        location: "line 81"
        snippet: "<div className={styles.wizard}>"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: AuthScreenShell
      responsibility: "Universal auth page layout shell — background, brand, card, header, form slot, footer, social logins"
      location: "components/auth/auth-screen-shell.tsx"
