related_conventions:
  naming_patterns_in_domain: "PascalCase components (MfaSetupCard, MfaChallengeForm, AuthScreenShell). camelCase functions (completeMfaChallenge, readErrorMessage). kebab-case files (mfa-setup-card.tsx, auth-screen-shell.module.scss)."
  structure_of_domain: "app/(auth)/{feature}/page.tsx is a thin guard + render. components/auth/{feature-component}.tsx has all UI/logic. lib/auth-client.ts has all API calls. lib/types/auth.ts has all types. One shared SCSS module for all auth components."
  error_handling_in_domain: "try/catch in async handlers. Errors stored in useState<string | null>. readErrorMessage() extracts message. Displayed inline via .noticeDanger class. No global error boundary or toast for auth flows."
  testing_in_domain: "Test directory exists at components/auth/__tests__/ (not examined in this research pass)."
  documentation_in_domain: "No inline JSDoc. Types serve as documentation."

related_dependencies:
  internal:
    - component: "lib/auth-storage.ts"
      relationship_to_domain: "Stores and retrieves sessions and pending MFA challenges"
      direction: outbound
    - component: "lib/network/fetch-with-timeout.ts"
      relationship_to_domain: "HTTP fetch with timeout used by auth-client"
      direction: outbound
    - component: "lib/analytics.ts"
      relationship_to_domain: "initializeAnalyticsTransport called after session restore"
      direction: outbound
    - component: "lib/motion.ts"
      relationship_to_domain: "Motion utilities used by MotionPage in auth layout"
      direction: outbound
  external:
    - name: "@tabler/icons-react"
      purpose_for_domain: "Icon library"
    - name: "motion"
      purpose_for_domain: "Animation (via motion/react)"

domain_security_considerations:
  sensitive_areas:
    - area: "MFA challenge token"
      location: "lib/auth-client.ts:completeMfaChallenge, completeRecoveryChallenge"
      concern: "Challenge token stored in browser storage (via savePendingMfaChallenge). Cleared after use."
    - area: "Recovery codes display"
      location: "components/auth/mfa-setup-card.tsx:~175"
      concern: "Recovery codes shown in plaintext during setup. Users instructed to save them. Only shown once."
    - area: "Access token in Authorization header"
      location: "lib/auth-client.ts:withAuthHeader"
      concern: "Bearer token sent for authenticated MFA endpoints (begin/confirm setup). Token refreshed if near expiry."
  authentication_patterns_in_domain: "JWT access/refresh token pair. Access token has expiry. Refresh token used to get new access token. Both stored via auth-storage."
  authorization_patterns_in_domain: "Role-based route resolution (admin/expert/learner). roleCanAccessPath validates next-path before redirect."
  data_validation_in_domain: "OTP validated client-side (6 digits, non-digit stripping). Recovery code trimmed. Server-side validation is the authority."

testing_patterns:
  framework: "Not examined — components/auth/__tests__/ directory exists"
  coverage_areas:
    - "Unknown — deferred to subsequent research pass"
  test_organization: "Colocated __tests__/ folder inside components/auth/"
  mock_patterns:
    - "Unknown — deferred"

open_questions:
  - question: "Does the backend already have an endpoint for regenerating MFA recovery codes (e.g. POST /v1/auth/mfa/recovery/regenerate)?"
    context: "The auth-client.ts file has no such function. If a dedicated mfa/recovery page needs a 'regenerate recovery codes' feature, the backend endpoint must exist or be created."
    type: nice_to_know
    affects: ["mfa-recovery-page"]

  - question: "Should the new MFA recovery page be accessible from the MFA challenge page, or also from account settings?"
    context: "Currently the MFA challenge form has the recovery code section inline. A separate /mfa/recovery page would need clear entry points."
    type: nice_to_know
    affects: ["mfa-recovery-page"]

gaps:
  - area: "components/auth/__tests__/"
    description: "Test files in the auth component test directory were not examined. Testing patterns for MFA/auth components are unknown."
    impact: nice_to_know
    affects: ["mfa-recovery-page", "verify-email-resend"]

  - area: "lib/auth-storage.ts"
    description: "Storage implementation not read. Assumed functional based on auth-client.ts import patterns."
    impact: nice_to_know
    affects: []

  - area: "Backend API contract for MFA recovery regeneration"
    description: "No endpoint found in auth-client.ts for regenerating recovery codes after initial setup. If the mfa/recovery page needs this, it's a backend gap."
    impact: nice_to_know
    affects: ["mfa-recovery-page"]
