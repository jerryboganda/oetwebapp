# ═══════════════════════════════════════════════════════════
# P5 — LEARNER ESCALATION REQUEST PAGE
# ═══════════════════════════════════════════════════════════

p5_learner_escalation:
  summary: "Admin escalation management is complete. Learner side is entirely missing — no endpoint, no page, no DTO."

  existing_code:
    admin_page:
      file: app/admin/escalations/page.tsx
      status: complete
      purpose: "Admin escalation dashboard — list/filter/assign/resolve escalation disputes"
      key_features:
        - DataTable with status badges, score display, divergence highlighting
        - Assign modal (pick expert reviewer from dropdown)
        - Resolve modal (finalScore 0-500, resolutionNote)
        - Status filter (pending/assigned/resolved)
        - Paginated (20 per page)
      imports:
        - "AdminRoutePanel, AdminRouteSectionHeader, AdminRouteSummaryCard, AdminRouteWorkspace"
        - "AsyncStateWrapper, DataTable, FilterBar, Badge, Button, Modal, Input, Select"
        - "useAdminAuth from lib/hooks/use-admin-auth"

    backend_entity:
      file: backend/src/OetLearner.Api/Domain/AdminEntities.cs
      class: ReviewEscalation
      fields:
        - "Id (string, PK)"
        - "ReviewRequestId (string)"
        - "OriginalReviewerId (string)"
        - "SecondReviewerId (string?, nullable)"
        - "SubtestCode (string)"
        - "TriggerCriterion (string)"
        - "AiScore (int)"
        - "HumanScore (int)"
        - "Divergence (int)"
        - "Status (string: pending|assigned|resolved)"
        - "ResolutionNote (string?, nullable)"
        - "FinalScore (int?, nullable)"
        - "CreatedAt (DateTimeOffset)"
        - "ResolvedAt (DateTimeOffset?, nullable)"

    backend_endpoints:
      - method: GET
        path: /v1/admin/escalations
        params: "status?, page?, pageSize?"
        auth: AdminOnly
        service_method: GetReviewEscalationsAsync
      - method: POST
        path: /v1/admin/escalations/{escalationId}/assign
        dto: "AdminEscalationAssignRequest(SecondReviewerId)"
        auth: AdminOnly + PerUserWrite rate limit
        service_method: AssignEscalationReviewerAsync
      - method: POST
        path: /v1/admin/escalations/{escalationId}/resolve
        dto: "AdminEscalationResolveRequest(FinalScore, ResolutionNote?)"
        auth: AdminOnly + PerUserWrite rate limit
        service_method: ResolveEscalationAsync

    auto_trigger:
      file: backend/src/OetLearner.Api/Services/ExpertService.cs
      method: TryCreateEscalationAsync
      line: 1458
      purpose: "Auto-creates ReviewEscalation when AI/human scores diverge beyond threshold during expert review submission"

    frontend_api:
      file: lib/api.ts
      functions:
        - "fetchReviewEscalations(params?) → GET /v1/admin/escalations"
        - "assignEscalationReviewer(escalationId, secondReviewerId) → POST /v1/admin/escalations/{id}/assign"
        - "resolveEscalation(escalationId, finalScore, resolutionNote?) → POST /v1/admin/escalations/{id}/resolve"

    frontend_types:
      file: lib/types/admin.ts
      types:
        - "AdminReviewEscalation (lines 487-503)"
        - "AdminEscalationsResponse (lines 504-509)"

  what_does_not_exist:
    - "No learner-facing escalation route in app/"
    - "No POST /v1/learner/escalations endpoint in backend"
    - "No learner escalation DTO/request contract"
    - "No learner-side API function in lib/api.ts"
    - "No learner escalation types in lib/types/"
    - "Learner has zero ability to dispute a review score"

  backend_gaps:
    - "Need new endpoint: POST /v1/learner/escalations (LearnerOnly auth)"
    - "Need new request DTO: LearnerEscalationRequest(reviewRequestId, reason, requestedScore?)"
    - "Need new service method in LearnerService or ExpertService"
    - "Consider GET /v1/learner/escalations for learner to track their disputes"

  files_to_create:
    - "app/escalation-request/page.tsx (or app/submissions/[submissionId]/dispute/page.tsx)"
    - "app/escalation-request/loading.tsx"
    - "Backend: new endpoint in LearnerEndpoints.cs or new EscalationEndpoints.cs"
    - "Backend: new DTO in Contracts/LearnerRequests.cs"

  files_to_modify:
    - "lib/api.ts — add learner escalation functions"
    - "lib/types/ — add learner escalation types"
    - "Backend: LearnerService.cs or new service method"

  components_to_reuse:
    - "AdminRoutePanel / AdminRouteSectionHeader pattern (adapt for learner)"
    - "AsyncStateWrapper for loading/error states"
    - "Badge component for status display"
    - "Modal component for confirmation dialogs"
    - "InlineAlert for error/success feedback"
    - "Toast for mutation confirmations"

  estimated_complexity: medium
  rationale: "Backend entity + auto-trigger exist. Main work is new POST endpoint + learner page with form. Medium because it needs careful UX around which submissions are disputable."

