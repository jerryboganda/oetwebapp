  - id: sec-fuses
    title: "Install @electron/fuses and add afterSign hook"
    description: |
      Install @electron/fuses as a devDependency. Add an afterSign hook to
      electron-builder.config.cjs that flips the following fuses on the
      signed Electron binary:

        - FuseV1Options.RunAsNode → false
        - FuseV1Options.EnableNodeCliInspectArguments → false
        - FuseV1Options.EnableEmbeddedAsarIntegrityValidation → true
        - FuseV1Options.OnlyLoadAppFromAsar → true

      Implementation details:
      1. Run: npm install --save-dev @electron/fuses
      2. In electron-builder.config.cjs, add a require for @electron/fuses:
         const { flipFuses, FuseVersion, FuseV1Options } = require('@electron/fuses');
      3. Add afterSign async function that calls flipFuses(context.appOutDir + correct binary path, { version: FuseVersion.V1, ... })
      4. Note: electron-builder afterSign receives (context) where context.appOutDir
         is the output directory. Use helper to resolve binary path per platform:
         - Windows: path.join(appOutDir, `${productName}.exe`)
         - macOS: path.join(appOutDir, `${productName}.app/Contents/Frameworks/Electron Framework.framework/Versions/A/Electron Framework`)
         - Linux: path.join(appOutDir, productName.toLowerCase())
         Or use the electron-builder provided path resolution.
      5. Ensure afterPack (existing) and afterSign (new) coexist in the config export.
