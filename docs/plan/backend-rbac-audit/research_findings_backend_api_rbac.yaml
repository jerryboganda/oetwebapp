      - { method: POST, path: "/v1/auth/email/verify-otp", auth: AllowAnonymous }
      - { method: POST, path: "/v1/auth/forgot-password", auth: AllowAnonymous }
      - { method: POST, path: "/v1/auth/reset-password", auth: AllowAnonymous }
