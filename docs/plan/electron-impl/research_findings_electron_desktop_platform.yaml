plan_id: electron-impl
objective: "Comprehensive audit of Electron desktop platform: main process, build config, security, IPC, desktop-backend-runtime, auto-update, feature parity"
focus_area: electron-desktop-platform
created_at: "2026-04-13T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - 11 ipcMain.handle() callbacks secured by validateSenderFrame() (open-external, 4× secret-storage, runtime-info, 5× offline-cache).
  - Electron 41.1.0; preload exposes `window.desktopBridge` with contextIsolation=true, nodeIntegration=false, sandbox=true. @electron/fuses configured (RunAsNode=false, NodeCLI=false, AsarIntegrity=true, OnlyLoadAppFromAsar=true).
  - Desktop bundles a full ASP.NET Core backend (SQLite) at `desktop-backend-runtime/` alongside standalone Next.js renderer; both start as child processes.
  - Build targets: Windows NSIS (x64), macOS DMG/zip, Linux AppImage/deb. Self-hosted generic updater via electron-updater. Code signing via env vars.
  - CSP defined in next.config.ts for production: no unsafe-eval, but has unsafe-inline for scripts and styles. No Electron-specific CSP override.
  - `offlineCache` API exposed in preload but TypeScript types in desktop.d.ts are MISSING the offlineCache property — type gap.

research_metadata:
  methodology: |
    Hybrid retrieval: semantic_search for desktop bridge consumers, grep_search for ipcMain.handle/desktopBridge/CSP/platform patterns.
    Detailed read_file examination of all 7 electron/ source files, electron-builder.config.cjs, next.config.ts CSP,
    desktop-backend-runtime/ appsettings, types/desktop.d.ts, lib/runtime-signals.ts, lib/auth-client.ts,
    components/auth/sign-in-form.tsx, app/providers.tsx, components/runtime/runtime-lifecycle-bridge.tsx,
    package.json scripts/build/dependencies.
  scope: "Full electron/ directory (6 source files + 1 test), build config, desktop-backend-runtime config, cross-codebase desktop consumers"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

# ============================================================
# 1. COMPLETE IPC CHANNEL INVENTORY
# ============================================================
ipc_channel_inventory:
  total_handlers: 11
  sender_validation: "All 11 handlers call validateSenderFrame(event) which checks event.senderFrame.url against renderer origin"
  handlers:
    - channel: "desktop:open-external"
      location: "electron/main.cjs:801"
      purpose: "Opens a URL in the system default browser via shell.openExternal()"
      input_validation: "Rejects non-string/empty URLs; only allows http: and https: protocols"
      returns: "true"

    - channel: "desktop:secret-storage:status"
      location: "electron/main.cjs:817"
      purpose: "Returns OS-backed secret store status (availability, backend type, readiness)"
      input_validation: "No payload required"
      returns: "{ available, backend, usingWeakBackend, allowWeakBackend, ready, vaultPath }"

    - channel: "desktop:secret-storage:get"
      location: "electron/main.cjs:828"
      purpose: "Retrieves a secret from OS-backed encrypted vault (Electron safeStorage)"
      input_validation: "Normalizes namespace (default: 'default') and key; rejects empty strings"
      returns: "string | null"

    - channel: "desktop:secret-storage:set"
      location: "electron/main.cjs:841"
      purpose: "Stores a secret in OS-backed encrypted vault"
      input_validation: "Validates namespace, key (non-empty strings), value (must be string)"
      returns: "true"

    - channel: "desktop:secret-storage:delete"
      location: "electron/main.cjs:855"
      purpose: "Deletes a secret from the vault"
      input_validation: "Normalizes namespace and key"
      returns: "boolean (whether entry existed)"

    - channel: "desktop:runtime-info"
      location: "electron/main.cjs:868"
      purpose: "Returns desktop runtime metadata: isPackaged, activeBackendUrl, windowState"
      input_validation: "No payload required"
      returns: "{ isPackaged, activeBackendUrl, ignoredPackagedLoopbackApiTarget, windowState }"

    - channel: "desktop:offline-cache:store"
      location: "electron/main.cjs:897"
      purpose: "Stores arbitrary JSON data in local filesystem cache"
      input_validation: "sanitizeCacheKey() strips non-alphanumeric chars; path traversal check via resolve().startsWith(); data must not be null"
      returns: "{ success, key }"

    - channel: "desktop:offline-cache:get"
      location: "electron/main.cjs:916"
      purpose: "Retrieves cached JSON data by key"
      input_validation: "sanitizeCacheKey() + path traversal check"
      returns: "{ cachedAt, data } | null"

    - channel: "desktop:offline-cache:delete"
      location: "electron/main.cjs:934"
      purpose: "Deletes a cached entry by key"
      input_validation: "sanitizeCacheKey() + path traversal check"
      returns: "{ success, key }"

    - channel: "desktop:offline-cache:list"
      location: "electron/main.cjs:951"
      purpose: "Lists all cached entries with metadata (size, modified time)"
      input_validation: "No payload"
      returns: "Array<{ key, sizeBytes, modifiedAt }>"

    - channel: "desktop:offline-cache:clear"
      location: "electron/main.cjs:964"
      purpose: "Deletes all cached entries"
      input_validation: "No payload"
      returns: "{ success, cleared }"

  ipc_send_channels:
    - channel: "desktop:window-state-changed"
      direction: "main → renderer (webContents.send)"
      purpose: "Broadcasts BrowserWindow focus/visibility/minimize/maximize/fullscreen state changes"
      location: "electron/main.cjs broadcastMainWindowState()"

# ============================================================
# 2. PRELOAD API SURFACE
# ============================================================
preload_api_surface:
  file: "electron/preload.cjs"
  bridge_name: "window.desktopBridge"
  mechanism: "contextBridge.exposeInMainWorld()"
  properties:
    - name: "platform"
      type: "NodeJS.Platform (process.platform)"
      description: "Operating system identifier (win32, darwin, linux)"

    - name: "versions"
      type: "{ electron, chrome, node }"
      description: "Runtime version strings"

    - name: "openExternal(url)"
      type: "(url: string) => Promise<boolean>"
      ipc_channel: "desktop:open-external"

    - name: "runtime.info()"
      type: "() => Promise<DesktopRuntimeInfo>"
      ipc_channel: "desktop:runtime-info"

    - name: "runtime.onWindowStateChange(listener)"
      type: "(listener) => () => void (unsubscribe)"
      ipc_channel: "desktop:window-state-changed (ipcRenderer.on)"

    - name: "secureSecrets.get(namespace, key)"
      type: "(ns, key) => Promise<string | null>"
      ipc_channel: "desktop:secret-storage:get"

    - name: "secureSecrets.set(namespace, key, value)"
      type: "(ns, key, value) => Promise<boolean>"
      ipc_channel: "desktop:secret-storage:set"

    - name: "secureSecrets.delete(namespace, key)"
      type: "(ns, key) => Promise<boolean>"
      ipc_channel: "desktop:secret-storage:delete"

    - name: "secureSecrets.status()"
      type: "() => Promise<SecretStorageStatus>"
      ipc_channel: "desktop:secret-storage:status"

    - name: "offlineCache.store(key, data)"
      type: "(key, data) => Promise<{ success, key }>"
      ipc_channel: "desktop:offline-cache:store"

    - name: "offlineCache.get(key)"
      type: "(key) => Promise<{ cachedAt, data } | null>"
      ipc_channel: "desktop:offline-cache:get"

    - name: "offlineCache.delete(key)"
      type: "(key) => Promise<{ success, key }>"
      ipc_channel: "desktop:offline-cache:delete"

    - name: "offlineCache.list()"
      type: "() => Promise<Array<{ key, sizeBytes, modifiedAt }>>"
      ipc_channel: "desktop:offline-cache:list"

    - name: "offlineCache.clear()"
      type: "() => Promise<{ success, cleared }>"
      ipc_channel: "desktop:offline-cache:clear"

  typescript_types:
    file: "types/desktop.d.ts"
    status: "INCOMPLETE — offlineCache property is missing from DesktopBridge interface"
    covers: "platform, versions, openExternal, runtime (info + onWindowStateChange), secureSecrets"
    missing: "offlineCache (store, get, delete, list, clear)"

# ============================================================
# 3. SECURITY AUDIT
# ============================================================
security_audit:
  browser_window_preferences:
    contextIsolation: true
    nodeIntegration: false
    sandbox: true
    webSecurity: true
    allowRunningInsecureContent: false
    webviewTag: false
    spellcheck: true
    backgroundThrottling: true
    preload: "path.join(__dirname, 'preload.cjs')"
    verdict: "PASS — all security-critical preferences correctly set"

  electron_fuses:
    location: "electron-builder.config.cjs afterSign hook"
    fuses_set:
      RunAsNode: false
      EnableNodeCliInspectArguments: false
      EnableEmbeddedAsarIntegrityValidation: true
      OnlyLoadAppFromAsar: true
    verdict: "PASS — all recommended fuses configured"

  ipc_security:
    sender_validation: "validateSenderFrame() checks event.senderFrame.url against renderer origin"
    input_sanitization: "All handlers validate/normalize inputs before processing"
    path_traversal_protection: "offline-cache handlers use sanitizeCacheKey() + resolve().startsWith() check"
    verdict: "PASS — comprehensive sender validation and input sanitization"

  content_security_policy:
    source: "next.config.ts headers()"
    production_csp:
      default_src: "'self'"
      script_src: "'self' 'unsafe-inline'"
      style_src: "'self' 'unsafe-inline' https://fonts.googleapis.com"
      font_src: "'self' https://fonts.gstatic.com"
      img_src: "'self' data: blob:"
      connect_src: "'self' blob: <api-origins> <ws-origins> https://*.googleapis.com"
      media_src: "'self' blob: <api-origins>"
      worker_src: "'self' blob:"
      frame_src: "'self'"
      object_src: "'none'"
      base_uri: "'self'"
      form_action: "'self'"
    development_csp:
      script_src: "'self' 'unsafe-inline' 'unsafe-eval'"
      note: "unsafe-eval only in development for HMR"
    findings:
      - "unsafe-inline in script-src (production): required for Next.js inline scripts but weakens CSP"
      - "unsafe-inline in style-src: common for CSS-in-JS/Tailwind but could be replaced with nonces"
      - "No unsafe-eval in production: PASS"
      - "No Electron-specific CSP override — CSP set by Next.js response headers, which apply inside BrowserWindow"
    verdict: "ACCEPTABLE — unsafe-inline for scripts is a known Next.js trade-off; no unsafe-eval in production"

  navigation_security:
    window_open_handler: "All new-window requests denied; URLs routed through openOrNavigateUrl()"
    will_navigate: "Non-renderer URLs blocked; external URLs opened in system browser"
    will_attach_webview: "Always prevented (event.preventDefault())"
    external_url_filter: "Only http: and https: protocols allowed"
    verdict: "PASS — comprehensive navigation security"

  permission_security:
    permission_check_handler: "Only 'media', 'microphone', 'notifications' allowed from trusted renderer origin"
    permission_request_handler: "Same origin+permission check"
    verdict: "PASS — minimal permission surface"

  certificate_pinning:
    file: "electron/security/certificate-pinning.cjs"
    mechanism: "session.setCertificateVerifyProc with SHA-256 fingerprint and SPKI pin validation"
    config_method: "ELECTRON_CERT_PINS env var (JSON array of { host, includeSubdomains, fingerprint256, spkiSha256 })"
    fallback: "If no pins configured, feature is disabled (no-op)"
    verdict: "PASS — optional but well-implemented certificate pinning"

  secure_secret_storage:
    file: "electron/security/secure-secrets.cjs"
    mechanism: "Electron safeStorage (OS keychain: Keychain on macOS, DPAPI on Windows, libsecret on Linux)"
    vault_file: "<userData>/secure-storage/desktop-secrets.json"
    encryption: "safeStorage.encryptString() → base64; safeStorage.decryptString()"
    weak_backend_protection: "Refuses basic_text backend unless ELECTRON_ALLOW_BASIC_TEXT_SECRET_STORAGE=true"
    file_permissions: "Directory mode 0o700, file mode 0o600"
    atomic_writes: "Write to .tmp then rename"
    verdict: "PASS — proper OS-backed encryption with weak-backend safeguard"

  single_instance_lock:
    status: "Enabled via app.requestSingleInstanceLock()"
    verdict: "PASS"

  protocol_handler:
    scheme: "oet-prep://"
    registration: "app.setAsDefaultProtocolClient('oet-prep') in packaged mode only"
    url_handling: "second-instance and open-url events route through openOrNavigateUrl()"
    mapping: "oet-prep://host/path → renderer URL via mapProtocolUrlToRendererUrl()"
    verdict: "PASS"

# ============================================================
# 4. DESKTOP-SPECIFIC FEATURES
# ============================================================
desktop_specific_features:
  native_menu:
    file: "electron/menu.cjs"
    menus:
      - "App menu (macOS only): about, hide, quit"
      - "Navigate: Home, Dashboard, Study Plan, Readiness, Goals, Listening, Reading, Writing, Speaking, Expert, Admin, Settings"
      - "Edit: undo, redo, cut, copy, paste, selectAll"
      - "View: reload, forceReload (dev), toggleDevTools (dev), zoom, fullscreen"
      - "Window: minimize, zoom, close"
      - "Help: Check for Updates, Install Update, About, Release Notes"
    keyboard_shortcuts:
      - "CmdOrCtrl+Shift+1: Home"
      - "CmdOrCtrl+Shift+2: Dashboard"
      - "CmdOrCtrl+Shift+3: Study Plan"
      - "CmdOrCtrl+Shift+4: Readiness"
      - "CmdOrCtrl+Shift+5: Goals"
      - "CmdOrCtrl+,: Settings"

  file_downloads:
    mechanism: "session 'will-download' handler with native Save dialog (dialog.showSaveDialogSync)"
    post_download: "shell.showItemInFolder() on completion"
    location: "electron/main.cjs app.whenReady()"

  deep_linking:
    scheme: "oet-prep://"
    platforms:
      windows: "Single-instance argv scan for oet-prep:// URLs"
      macos: "open-url event handler"
      linux: "x-scheme-handler/oet-prep mimeType in electron-builder config"

  oauth_flow:
    detection: "lib/auth-client.ts checks window.desktopBridge to set platform='desktop'"
    backend_handling: "ExternalAuthService redirects to oet-prep:// scheme when platform='desktop'"
    ticket_service: "ExternalAuthTicketService.NormalizePlatform() only accepts 'desktop'"

  runtime_detection:
    file: "lib/runtime-signals.ts"
    mechanism: "getAppRuntimeKind() checks window.desktopBridge → 'desktop'"
    bootstrap_script: "Inline script sets data-runtime-kind='desktop', data-desktop-native='true', data-desktop-platform"
    consumers:
      - "components/runtime/runtime-lifecycle-bridge.tsx — desktop window state sync"
      - "components/auth/sign-in-form.tsx — fetches runtime info for display"
      - "app/providers.tsx — skips service worker registration on desktop"
      - "lib/auth-client.ts — adds platform=desktop to OAuth URLs"
      - "lib/mobile/runtime.ts — distinguishes desktop from capacitor"

  offline_cache:
    mechanism: "Filesystem-based JSON cache in <userData>/offline-content/"
    api: "desktopBridge.offlineCache (store, get, delete, list, clear)"
    note: "TypeScript types missing — only preload exposes this API"

  bundled_backend:
    mechanism: "Child process spawn of OetLearner.Api.exe with SQLite database"
    database: "SQLite at <userData>/backend/oet-prep.desktop.db"
    storage: "<userData>/storage/ for file uploads"
    config: "Auto-migrate, seed demo data, development auth mode"
    health_check: "/health/ready endpoint polled during startup"

  data_isolation:
    mechanism: "configureDesktopDataPaths() creates channel-based data directories"
    channels: "prod (packaged) | dev (development) | custom via ELECTRON_RUNTIME_CHANNEL"
    paths: "<appData>/OET Prep/<channel>/user-data and session-data"

  window_state_sync:
    mechanism: "BrowserWindow events → broadcastMainWindowState() → IPC send to renderer"
    events_tracked: "show, hide, focus, blur, minimize, restore, maximize, unmaximize, enter/leave-full-screen"
    consumer: "RuntimeLifecycleBridge component manages focus/visibility state react-side"

# ============================================================
# 5. BUILD CONFIGURATION
# ============================================================
build_configuration:
  electron_version: "^41.1.0"
  electron_builder_version: "^26.8.1"
  fuses_version: "^2.1.1"
  app_id: "com.oetprep.desktop"
  product_name: "OET Prep"
  output_directory: "dist/desktop (configurable via ELECTRON_BUILD_OUTPUT)"

  packaged_files:
    - "electron/**/*"
    - "package.json"

  extra_resources:
    - from: ".next/standalone" → "standalone"
    - from: ".next/static" → "standalone/.next/static"
    - from: "public" → "standalone/public"
    - from: "desktop-backend-runtime" → "backend-runtime"

  platforms:
    windows:
      targets: ["nsis (x64)"]
      nsis_options:
        oneClick: false
        perMachine: false
        allowElevation: true
        allowToChangeInstallationDirectory: true
      code_signing: "Configurable via ELECTRON_WINDOWS_PUBLISHER_NAME; signAndEditExecutable can be disabled via ELECTRON_ALLOW_UNSIGNED_WINDOWS_BUILD"

    macos:
      targets: ["dmg", "zip"]
      hardenedRuntime: true
      gatekeeperAssess: false

    linux:
      targets: ["AppImage", "deb"]
      category: "Education"
      mimeTypes: ["x-scheme-handler/oet-prep"]

  lifecycle_hooks:
    afterPack:
      - "syncStandaloneRuntime(): copies .next/standalone to resources/standalone"
      - "syncDesktopRuntimeConfig(): writes desktop-runtime-config.json with resolved API URL"
    afterSign:
      - "flipFuses(): configures @electron/fuses on the Electron binary"

  auto_update:
    mechanism: "electron-updater with generic provider"
    url_config: "ELECTRON_UPDATES_URL env var"
    publish_config: "{ provider: 'generic', url: <updateUrl> }"
    behavior:
      auto_download: false
      auto_install_on_quit: true
      allow_downgrade: false
    flow:
      check: "autoUpdater.checkForUpdates() — scheduled 15s after app ready"
      notify: "Native Notification or dialog.showMessageBox when update available"
      download: "Automatic after availability notification"
      progress: "BrowserWindow.setProgressBar() during download"
      install: "autoUpdater.quitAndInstall(false, true) — can trigger from menu or notification click"
    menu_integration: "Help > Check for Updates / Install Update (dynamic enable/disable)"

# ============================================================
# 6. DESKTOP BACKEND RUNTIME
# ============================================================
desktop_backend_runtime:
  directory: "desktop-backend-runtime/"
  description: "Pre-built ASP.NET Core (.NET 9) backend binary distribution for embedded desktop use"
  executable: "OetLearner.Api.exe (Windows) / OetLearner.Api (macOS/Linux)"
  database: "SQLite via Microsoft.Data.Sqlite + EF Core SQLite provider"
  configuration_files:
    - "appsettings.json — empty connection string, disabled auth, empty bootstrap"
    - "appsettings.Development.json — SQLite file DB, dev auth keys, auto-migrate, seed demo"
    - "appsettings.Production.json — production auth, auto-migrate, enforce HTTPS, disable Swagger"
  runtime_start:
    location: "electron/main.cjs startBundledBackendServer()"
    port_selection: "findAvailablePort() starting from 5198"
    environment_override: "ASPNETCORE_ENVIRONMENT=Development, SQLite path in userData/backend/"
    health_check: "/health/ready polled up to 120 attempts (2 min timeout)"
  key_dlls:
    - "Npgsql.dll / Npgsql.EntityFrameworkCore.PostgreSQL.dll — PostgreSQL support (web deployment)"
    - "Microsoft.EntityFrameworkCore.Sqlite.dll — SQLite support (desktop)"
    - "Microsoft.EntityFrameworkCore.InMemory.dll — in-memory provider (testing)"
    - "WebPush.dll — push notifications"
    - "BouncyCastle.Crypto.dll — cryptographic operations"
    - "Swashbuckle.*.dll — Swagger/OpenAPI"

# ============================================================
# 7. FEATURE PARITY (DESKTOP vs WEB)
# ============================================================
feature_parity:
  service_worker:
    web: "Registered via providers.tsx"
    desktop: "Explicitly skipped when window.desktopBridge detected"
    reason: "Service workers not needed in Electron (app manages caching via offline-cache IPC)"

  push_notifications:
    web: "Standard Web Push"
    desktop: "Electron Notification API available; native permission handler allows 'notifications'"
    note: "Web Push subscription may not work identically — desktop can use native notifications"

  oauth_flow:
    web: "Standard browser redirect flow"
    desktop: "System browser opens OAuth URL; backend redirects via oet-prep:// deep link scheme"
    status: "Fully implemented"

  offline_support:
    web: "Service worker caching"
    desktop: "desktopBridge.offlineCache filesystem-based JSON cache"
    note: "Offline cache API exists but consumer usage not found beyond preload exposure"

  database:
    web: "PostgreSQL via backend API"
    desktop: "Embedded SQLite via bundled backend (auto-migrate, seed demo data)"

  navigation:
    status: "Fully compatible — Next.js App Router runs inside BrowserWindow; native menu provides keyboard shortcuts"

  web_apis:
    geolocation: "Disabled via Permissions-Policy header (camera=(), geolocation=())"
    microphone: "Allowed in permission handler from trusted renderer origin"
    camera: "Disabled"
    clipboard: "Available (standard DOM API)"

  auto_update:
    web: "N/A — server-side deployment"
    desktop: "Self-hosted generic updater via electron-updater"

# ============================================================
# 8. DESKTOP E2E TESTS
# ============================================================
desktop_tests:
