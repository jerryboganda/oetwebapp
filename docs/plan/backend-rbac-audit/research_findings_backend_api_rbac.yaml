# ═══════════════════════════════════════════════════════════════════════
# SECTION 3: UNPROTECTED / MISCONFIGURED ENDPOINTS
# ═══════════════════════════════════════════════════════════════════════

security_findings:

  intentionally_unauthenticated:
    - path: "/v1/payment/webhooks/stripe"
      reason: "Stripe webhook — verified via Stripe signature header, not JWT"
    - path: "/v1/payment/webhooks/paypal"
      reason: "PayPal webhook — verified via PayPal signature header, not JWT"
    - path: "/health/*"
      reason: "Infrastructure health checks"
    - path: "/v1/auth/* (most)"
      reason: "Pre-authentication flows (login, register, MFA, password reset)"

  potential_concerns:
    - area: "Granular admin permissions defined but not enforced"
      detail: |
        12 granular admin permission policies (AdminContentRead, AdminContentWrite, AdminBillingRead, etc.)
        are defined in Program.cs but the AdminEndpoints.cs group only uses the broad "AdminOnly" policy.
        This means any admin can access ALL admin endpoints regardless of their permission claims.
        Consider wiring granular policies to specific endpoint subgroups for least-privilege enforcement.
      severity: medium
      recommendation: "Wire AdminContentWrite to content mutation endpoints, AdminBillingWrite to billing mutations, etc."

    - area: "Certificate verify endpoint behind LearnerOnly"
      detail: |
        GET /v1/certificates/verify/{code} requires LearnerOnly auth but conceptually should be
        public — anyone trying to verify a certificate (e.g., an employer) shouldn't need a learner account.
      severity: low

    - area: "/v1/notifications and /v1/media use generic RequireAuthorization"
      detail: |
        These endpoints accept ANY authenticated role (learner, expert, admin, sponsor).
        This is likely intentional for shared functionality but worth documenting.
      severity: info


# ═══════════════════════════════════════════════════════════════════════
# SECTION 4: NEXT.JS API ROUTE HANDLERS
# ═══════════════════════════════════════════════════════════════════════

nextjs_api_routes:
  - path: "app/api/backend/[...path]/route.ts"
    purpose: "Catch-all proxy to .NET backend"
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    behavior: |
      1. Validates path starts with 'v1/' (rejects non-v1 paths)
      2. Strips x-debug-* and forwarding headers via sanitizeProxyHeaders
      3. Strips unsafe response headers (transfer-encoding, etc.)
      4. Proxies to API_PROXY_TARGET_URL env var (default: http://127.0.0.1:5198)
      5. No auth validation in the proxy — all auth handled by backend JWT middleware
    security:
      - "Path traversal prevention (rejects .., empty segments, null bytes)"
      - "Only /v1/* paths allowed"
      - "x-debug-* headers stripped"
      - "Forwarding headers stripped (x-forwarded-for, x-forwarded-host, etc.)"

  - path: "app/api/health/route.ts"
    purpose: "Frontend health check"
    methods: [GET]
    behavior: "Returns { status: 'ok', service: 'oet-web', timestamp }"
    auth: "None (server-side only, not protected by middleware)"

nextjs_middleware:
  file: middleware.ts
  behavior: |
    1. Checks if path is in PUBLIC_PATHS set (auth routes)
    2. For non-public paths, checks for 'oet_auth' cookie
    3. Redirects to /sign-in?next={path} if no auth cookie
    4. Matcher excludes /api, /_next, static files
  public_paths:
    - /sign-in
    - /register
    - /register/success
    - /terms
    - /forgot-password
    - /forgot-password/verify
    - /reset-password
    - /reset-password/success
    - /verify-email
    - /mfa/challenge
    - /mfa/setup
    - /mfa/recovery
    - /auth/callback
    - /auth/callback/*
  note: |
    The middleware only checks for presence of an auth cookie — it does NOT validate JWT or role.
    Role-based frontend protection must happen at the page/component level.
    API routes (/api/*) are excluded from this middleware entirely.


