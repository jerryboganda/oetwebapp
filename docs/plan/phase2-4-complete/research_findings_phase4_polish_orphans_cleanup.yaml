# ═══════════════════════════════════════════════════
# Patterns Found
# ═══════════════════════════════════════════════════

patterns_found:
  - category: error_handling
    pattern: "JSON parse fallback in catch blocks"
    description: "When parsing error responses, catch blocks fall back gracefully but silently"
    examples:
      - file: "lib/api.ts"
        location: "lib/api.ts:394"
        snippet: "catch { /* noop */ }"
    prevalence: common

  - category: architecture
    pattern: "Anonymous object DTOs in backend"
    description: "Orphan endpoints return anonymous objects rather than typed DTOs/records"
    examples:
      - file: "LearnerService.cs"
        location: "LearnerService.cs:6667"
        snippet: "return new { hasPlan = true, planId = plan.Id, drift = new { level = driftLevel, ... } }"
    prevalence: common

  - category: naming
    pattern: "toX() mapper functions"
    description: "Type-narrowing functions with silent defaults for unknown values"
    examples:
      - file: "lib/api.ts"
        location: "lib/api.ts:103"
        snippet: "function toSubTest(code: string): SubTest { ... default: return 'Writing'; }"
    prevalence: common

  - category: architecture
    pattern: "Inline apiRequest in analytics pages"
    description: "Analytics pages define their own apiRequest instead of using lib/api.ts"
    examples:
      - file: "app/admin/analytics/subscription-health/page.tsx"
        location: "subscription-health/page.tsx:22"
        snippet: "async function apiRequest<T = unknown>(path: string, init?: RequestInit): Promise<T> { ... }"
    prevalence: common

  - category: structure
    pattern: "Single-stage publish approval"
    description: "Content goes Draft→InReview→Published with one approve/reject decision"
    examples:
      - file: "AdminService.cs"
        location: "AdminService.cs:2998"
        snippet: "var pr = new ContentPublishRequest { Status = 'pending' }"
    prevalence: occasional

