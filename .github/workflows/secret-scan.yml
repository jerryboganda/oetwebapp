name: Security — Secret Scan (TruffleHog)
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true
jobs:
  trufflehog:
    name: TruffleHog git history scan (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Advisory: reports verified + unknown secrets without failing the build.
      # Add `--fail` to make it blocking once the history is clean.
      - name: TruffleHog scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            trufflesecurity/trufflehog:latest \
            git file:///repo --results=verified,unknown --json || true
