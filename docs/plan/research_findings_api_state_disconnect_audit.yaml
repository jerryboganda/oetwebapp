plan_id: api-state-disconnect-audit
objective: "Comprehensive audit of frontend ↔ backend API contract coherence, state management architecture, real-time features, platform-conditional code, and type safety across the OET Web App ecosystem"
focus_area: "API contracts, state management, SignalR, platform detection, environment config, types"
created_at: "2026-04-13"
created_by: gem-researcher
status: completed

tldr: |
  - Frontend (lib/api.ts ~4100 lines) exports ~200 functions covering learner, expert, admin, gamification, vocabulary, community, marketplace, private-speaking, grammar, pronunciation, conversations, and billing – all calling /v1/* endpoints.
  - Backend has 22 endpoint files with rich coverage; ~4 backend subsystems (Sponsor, parts of Marketplace admin, some PrivateSpeaking admin, ConversationHub real-time) have endpoints without fully wired frontend page consumers.
  - SignalR is used for notifications (NotificationHub) and real-time AI conversation (ConversationHub); the web proxy path (/api/backend) forces LongPolling for SignalR, and Capacitor mobile lacks explicit SignalR config.
  - Platform detection is well-structured via runtime-signals.ts (web | desktop | capacitor-native), with 3 platform code paths: desktop (desktopBridge), Capacitor (Capacitor.isNativePlatform), and CSS breakpoint mobile (useIsMobile).
  - Only 2 `as any` casts in api.ts. Primary type gap: most api.ts functions return `ApiRecord` (Record<string, any>) rather than strict typed DTOs — no compile-time contract enforcement with backend.

# ═══════════════════════════════════════════════════════════════
# 1. FRONTEND API CALLS → BACKEND ENDPOINT MAPPING
# ═══════════════════════════════════════════════════════════════

research_metadata:
  methodology: "Hybrid retrieval: full-file reads of lib/api.ts (4100+ lines), lib/auth-client.ts, lib/notifications-api.ts, lib/learner-data.ts, lib/admin.ts; grep_search for all export functions; read of all 22 backend Endpoints/*.cs files via grep for MapGet/MapPost/MapPut/MapPatch/MapDelete; cross-referencing by /v1/* path prefixes"
  scope: "Full coverage of all frontend API client files and backend endpoint registrations"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 1  # Could not read every backend endpoint file line-by-line; relied on route grep

