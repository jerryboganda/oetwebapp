plan_id: phase1-critical
objective: "Map auth page patterns for MFA recovery and email verification implementation"
focus_area: "Auth pages — MFA and email verification"
created_at: "2026-04-13"
created_by: gem-researcher
status: completed

tldr: |
  - Auth pages use a custom SCSS-based component library (NO shadcn/MUI). Core shell: `AuthScreenShell` + `OtpCodeInput` + SCSS modules (`auth-screen-shell.module.scss`). Icons from `@tabler/icons-react`.
  - Form handling uses raw `useState` + `onSubmit` handlers (no react-hook-form). Feedback is inline via `.notice`/`.noticeDanger` CSS classes — NO toast/sonner library in auth pages.
  - API calls go through `lib/auth-client.ts` which wraps `fetchWithTimeout` with `postJson`/`getJson` helpers, using `NEXT_PUBLIC_API_BASE_URL`. Auth context delegates to these functions.
  - MFA challenge page already has a recovery code section (`completeRecoveryChallenge`). The backend endpoints for MFA recovery exist: `POST /v1/auth/mfa/recovery`. A dedicated "mfa/recovery" page would structurally be a slimmed-down version of `mfa-challenge-form.tsx`.
  - Verify-email page already has a "Resend it" button calling `sendEmailVerificationOtp`. Adding "Resend OTP" is about enhancing the existing `handleResend` with cooldown/retry logic, not adding a new button.

research_metadata:
  methodology: "Hybrid retrieval: read_file for all auth pages, components, context, API client, types, routes, SCSS; grep_search for toast/notification patterns; list_dir for directory structure"
  scope: "All files in app/(auth)/mfa/*, app/(auth)/verify-email/*, components/auth/*, contexts/auth-context.tsx, lib/auth-client.ts, lib/auth-routes.ts, lib/auth/routes.ts, lib/types/auth.ts"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

