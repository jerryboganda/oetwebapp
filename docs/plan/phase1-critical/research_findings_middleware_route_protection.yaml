plan_id: phase1-critical
objective: "Map route protection patterns and understand requirements for middleware.ts implementation"
focus_area: "Next.js middleware and route protection"
created_at: "2026-04-13"
created_by: gem-researcher
status: completed

tldr: |
  - NO middleware.ts or middleware.js exists anywhere in the project; all route protection is 100% client-side.
  - Auth tokens (accessToken, refreshToken) are stored in localStorage/sessionStorage (keys: oet.auth.session.local / oet.auth.session.session) — NOT in cookies. Middleware CANNOT read these tokens without a storage migration.
  - The AuthGuard component (components/auth/auth-guard.tsx) is the single enforcement point, integrated via AppShell. It checks useAuth() context client-side and redirects unauthenticated users.
  - Three user roles exist: learner (default routes at /), expert (/expert/*), admin (/admin/*). Public auth routes are under app/(auth)/.
  - next.config.ts has NO redirects or rewrites — only security headers (CSP, X-Frame-Options, etc.) and standalone output.

research_metadata:
  methodology: "hybrid retrieval: file_search + grep_search for discovery, read_file for detailed examination across 3 passes"
  scope: "All auth-related files, route layouts, config files, storage layer"
  confidence: high
  coverage: 95
  decision_blockers: 1
  research_blockers: 0

