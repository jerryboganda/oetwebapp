plan_id: phase1-critical
objective: |
  Implement Phase 1 Critical Security & Compliance: Account Deletion (P1), MFA Recovery UX (P2),
  Next.js Middleware route protection (P3). P4 (Resend OTP) is already done — skip.
created_at: "2026-04-13"
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 3
  risk_score: low

tldr: |
  Five tasks across 2 waves implementing three security features.
  Wave 1 runs P3a (auth cookie indicator), P2 (MFA recovery page), and P1a (backend delete endpoint) in parallel.
  Wave 2 runs P3b (middleware.ts) and P1b (frontend delete UI) in parallel.
  E2E integration tests deferred to follow-up plan (requires disposable test accounts and MFA-enabled test users).
  The key architectural decision is a flag-only cookie (oet_auth=1) so Next.js middleware can
  gate routes without migrating token storage from localStorage to cookies.

open_questions: []

resolved_decisions:
  - decision: "Cookie max-age"
    resolution: |
      Set max-age to match refresh token TTL (~30 days). Cookie is set with max-age=2592000.
      clearStoredSession clears it. If refresh fails silently, clearStoredSession is already called
      which will clear the cookie.
  - decision: "GDPR grace period"
    resolution: |
      30-day soft-delete window. Backend purge job is a documented follow-up task NOT in this plan.
      Frontend delete confirmation copy says 'Your account will be permanently deleted after 30 days'.

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "Cookie not set on all auth paths (login, register, OAuth callback, token refresh)"
      likelihood: medium
      impact: high
      mitigation: "Cookie set/clear logic centralized in auth-storage.ts helpers. All auth flows funnel through saveStoredSession/clearStoredSession — set cookie there."
    - scenario: "Middleware blocks legitimate users due to cookie timing (cookie cleared before redirect completes)"
      likelihood: low
      impact: medium
      mitigation: "Middleware only redirects to /sign-in, does not return 403. Client-side AuthGuard remains as secondary enforcement."
    - scenario: "Account deletion endpoint called without proper password verification"
      likelihood: low
      impact: critical
      mitigation: "Endpoint requires password confirmation in request body. Backend validates password against identity store before soft-delete."
    - scenario: "Cookie desync on refresh failure — ensureFreshSession catch path"
      likelihood: low
      impact: medium
      mitigation: "ensureFreshSession catch path calls clearStoredSession which clears cookie — verify this end-to-end during implementation."
    - scenario: "Capacitor/Electron user hits Next.js middleware unexpectedly"
      likelihood: low
      impact: low
      mitigation: "Cookie indicator is for web platform only. Capacitor/Electron platforms do not run through Next.js middleware."
    - scenario: "XSS on origin forges oet_auth cookie to bypass middleware redirect"
      likelihood: low
      impact: low
      mitigation: "Accepted risk: if XSS exists on the origin, attacker can forge the oet_auth cookie. However, XSS would also compromise localStorage tokens directly — the cookie adds no new attack surface."
    - scenario: "Full httpOnly cookie auth not implemented, limiting middleware security depth"
      likelihood: high
      impact: low
      mitigation: "Deferred intentionally: full httpOnly cookie auth migration requires backend Set-Cookie header changes, breaks Capacitor WebView auth flow, and is estimated at 10+ file changes across both frontend and backend. Flag-only cookie is sufficient for middleware route gating."
  assumptions:
    - "Backend already has ApplicationUserAccount.DeletedAt and LearnerUser.AccountStatus infrastructure — confirmed in DB schema migrations"
    - "MFA recovery API POST /v1/auth/mfa/recovery works correctly — confirmed in lib/auth-client.ts completeRecoveryChallenge"
    - "The cookie indicator strategy is sufficient — full token-in-cookie migration is out of scope for Phase 1"
    - "Role-based route protection (admin vs expert vs learner) remains client-side via AuthGuard for this phase"
    - "LearnerUser.AccountStatus has a concurrency token — confirmed in unit tests (LifecycleConcurrencyTests)"
    - "Cookie max-age is 2592000 seconds (30 days) matching refresh token TTL"
    - "Account deletion uses 30-day soft-delete grace period; hard-delete purge job is a follow-up"
    - "E2E integration tests are deferred to a follow-up plan requiring disposable test accounts and MFA-enabled test users"

