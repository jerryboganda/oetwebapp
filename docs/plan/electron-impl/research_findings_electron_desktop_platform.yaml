gaps:
  - area: "TypeScript types for offlineCache"
    description: "types/desktop.d.ts DesktopBridge interface is missing the offlineCache property. The preload exposes 5 offlineCache methods but TypeScript consumers have no type definitions."
    impact: research_blocker
