name: _MailKit Validate (throwaway)

# Fast, reliable signal for the MailKit email change: builds the FULL solution
# (proves the SmtpEmailSender rewrite compiles everywhere) and runs the
# email/notification/production-readiness tests (incl. the WebApplicationFactory
# boot that asserts IEmailSender resolves). Avoids the chronically-cancelled
# 45-min QA-Smoke .NET job. Removed before merge. Push-triggered on this branch.
on:
  push:
    branches: [fix/smtp-mailkit]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      ConnectionStrings__OetLearner: Host=localhost;Database=oet_test;Username=postgres;Password=postgres
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-oet-stack
        with:
          with-postgres: "true"
      - name: Build full solution (Release)
        run: dotnet build backend/OetLearner.sln --configuration Release --nologo
      - name: Email / notification / readiness tests
        run: |
          dotnet test backend/tests/OetLearner.Api.Tests/OetLearner.Api.Tests.csproj \
            --configuration Release --no-build --nologo --verbosity normal \
            --filter "FullyQualifiedName~Email|FullyQualifiedName~Smtp|FullyQualifiedName~Notification|FullyQualifiedName~ProductionReadiness"
