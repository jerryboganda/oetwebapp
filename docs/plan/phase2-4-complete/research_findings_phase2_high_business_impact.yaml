tldr: |
  - P5 (Learner Escalation): Admin side fully built; NO learner-facing page or backend endpoint exists — learners cannot dispute review scores. Need new POST /v1/learner/escalations endpoint + new app page.
  - P6 (Community Threads): All 5 community frontend pages are redirect stubs to /review. Backend CRUD is 100% complete (categories, threads, replies, study groups, join). Frontend API functions already written in lib/api.ts. Replace stubs with real pages.
