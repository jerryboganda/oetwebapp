p20_duplicates:
  summary: "fetchDiagnosticOverview and fetchDiagnosticSession are NOT duplicates. subscriptions/page.tsx IS a re-export."
  complexity_estimate: "small — ~30 min for subscriptions cleanup"

  fetchDiagnosticOverview:
    file: "lib/api.ts"
    line: 735
    signature: "export async function fetchDiagnosticOverview(): Promise<ApiRecord>"
    endpoint: "GET /v1/diagnostic/overview"
    returns: "Raw ApiRecord (untyped JSON)"
    consumers:
      - "app/diagnostic/page.tsx:10,71 — uses raw overview data"

  fetchDiagnosticSession:
    file: "lib/api.ts"
    line: 1898
    signature: "export async function fetchDiagnosticSession(): Promise<DiagnosticSession>"
    endpoint: "GET /v1/diagnostic/overview (same endpoint!)"
    returns: "Typed DiagnosticSession with mapped subTests"
    consumers:
      - "app/diagnostic/results/page.tsx:17,57"
      - "app/diagnostic/hub/page.tsx:13,48"
      - "lib/api.ts:1931 — used internally by startDiagnostic()"

