name: CI — Fast Checks
# Per-push fast feedback on feature branches (main/master + PRs are covered by qa-smoke.yml).
on:
  push:
    branches-ignore: [main, master]
permissions:
  contents: read
concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true
jobs:
  frontend:
    name: Frontend (tsc + lint + encoding + vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm run lint
      - run: pnpm run check:encoding
      - run: pnpm exec vitest run --reporter=dot
      - run: pnpm run build
  backend:
    name: Backend (.NET build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - run: dotnet restore backend/OetLearner.sln
      - run: dotnet build backend/OetLearner.sln -c Release --no-restore
      - run: dotnet test backend/OetLearner.sln -c Release --no-build --logger "console;verbosity=normal"
