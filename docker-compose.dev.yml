# Dev mode: postgres + API only. Run Next.js locally with `npm run dev` for hot-reload.
# Usage:
#   docker compose -f docker-compose.dev.yml --env-file .env.docker-local up -d
#   npm run dev
#
# Frontend at http://localhost:3000 (hot-reload, instant code changes)
# API at http://localhost:8080 (from Docker)
# Postgres at localhost:5432 (from Docker)

services:
  postgres:
    # See docker-compose.local.yml — pgvector/pgvector:pg17 ships the `vector`
    # extension required by Writing V2 migration 20260612120000.
    image: pgvector/pgvector:pg17
    container_name: oet-dev-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - oet_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10

  learner-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: oet-dev-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Auth__UseDevelopmentAuth: '${AUTH_USE_DEVELOPMENT_AUTH:-false}'
      Auth__AllowDevelopmentAuthInProduction: '${AUTH_ALLOW_DEVELOPMENT_AUTH_IN_PRODUCTION:-false}'
      Platform__PublicApiBaseUrl: ${PUBLIC_API_BASE_URL}
      Platform__PublicWebBaseUrl: ${APP_URL:-http://localhost:3000}
      Billing__CheckoutBaseUrl: ${CHECKOUT_BASE_URL}
      Billing__Stripe__SecretKey: ${BILLING__STRIPE__SECRETKEY}
      Billing__Stripe__SuccessUrl: ${BILLING__STRIPE__SUCCESSURL}
      Billing__Stripe__CancelUrl: ${BILLING__STRIPE__CANCELURL}
      Billing__Stripe__WebhookSecret: ${BILLING__STRIPE__WEBHOOKSECRET}
      Billing__AllowSandboxFallbacks: '${BILLING__ALLOWSANDBOXFALLBACKS}'
      Bootstrap__AutoMigrate: '${AUTO_MIGRATE}'
      Bootstrap__SeedDemoData: '${SEED_DEMO_DATA}'
      Bootstrap__ExpertEmail: ${BOOTSTRAP_EXPERT_EMAIL}
      Bootstrap__ExpertPassword: ${BOOTSTRAP_EXPERT_PASSWORD}
      Bootstrap__ExpertDisplayName: ${BOOTSTRAP_EXPERT_DISPLAY_NAME}
      AuthTokens__Issuer: ${AUTHTOKENS__ISSUER}
      AuthTokens__Audience: ${AUTHTOKENS__AUDIENCE}
      AuthTokens__AccessTokenSigningKey: ${AUTHTOKENS__ACCESSTOKENSIGNINGKEY}
      AuthTokens__RefreshTokenSigningKey: ${AUTHTOKENS__REFRESHTOKENSIGNINGKEY}
      AuthTokens__AccessTokenLifetime: ${AUTHTOKENS__ACCESSTOKENLIFETIME}
      AuthTokens__RefreshTokenLifetime: ${AUTHTOKENS__REFRESHTOKENLIFETIME}
      AuthTokens__OtpLifetime: ${AUTHTOKENS__OTPLIFETIME}
      AuthTokens__AuthenticatorIssuer: ${AUTHTOKENS__AUTHENTICATORISSUER}
      Brevo__Enabled: '${BREVO__ENABLED}'
      Brevo__ApiKey: ${BREVO__APIKEY}
      Brevo__BaseUrl: ${BREVO__BASEURL}
      Brevo__FromEmail: ${BREVO__FROMEMAIL}
      Brevo__FromName: ${BREVO__FROMNAME}
      Brevo__EmailVerificationTemplateId: ${BREVO__EMAILVERIFICATIONTEMPLATEID}
      Brevo__PasswordResetTemplateId: ${BREVO__PASSWORDRESETTEMPLATEID}
      Brevo__WebhookSecret: ${BREVO__WEBHOOKSECRET}
      Smtp__Enabled: '${SMTP__ENABLED}'
      Smtp__Host: ${SMTP__HOST}
      Smtp__Port: '${SMTP__PORT}'
      Smtp__Username: ${SMTP__USERNAME}
      Smtp__Password: ${SMTP__PASSWORD}
      Smtp__EnableSsl: '${SMTP__ENABLESSL}'
      Smtp__FromEmail: ${SMTP__FROMEMAIL}
      Smtp__FromName: ${SMTP__FROMNAME}
      Ai__ApiKey: ${AI__APIKEY}
      Ai__BaseUrl: ${AI__BASEURL}
      Ai__ProviderId: ${AI__PROVIDERID}
      Ai__DefaultModel: ${AI__DEFAULTMODEL}
      Ai__DefaultTemperature: '${AI__DEFAULTTEMPERATURE}'
      Ai__DefaultMaxTokens: '${AI__DEFAULTMAXTOKENS}'
      Ai__ReasoningEffort: ${AI__REASONINGEFFORT}
      Pronunciation__Provider: ${PRONUNCIATION__PROVIDER}
      Pronunciation__AzureSpeechKey: ${PRONUNCIATION__AZURESPEECHKEY}
      Pronunciation__AzureSpeechRegion: ${PRONUNCIATION__AZURESPEECHREGION}
      Conversation__Enabled: '${CONVERSATION__ENABLED}'
      Conversation__AsrProvider: ${CONVERSATION__ASRPROVIDER}
      Conversation__DeepgramApiKey: ${CONVERSATION__DEEPGRAMAPIKEY}
      Conversation__TtsProvider: ${CONVERSATION__TTSPROVIDER}
      Conversation__ElevenLabsApiKey: ${CONVERSATION__ELEVENLABSAPIKEY}
      Conversation__RealtimeAsrProvider: ${CONVERSATION__REALTIMEASRPROVIDER}
      MaxUploadBytes: '${MAX_UPLOAD_BYTES}'
      Storage__LocalRootPath: /var/opt/oet-with-dr-hesham/storage
      Features__EnableSwagger: 'true'
      # ── Speaking Module ──────────────────────────────────────────────────────
      LiveKit__Provider: ${LIVEKIT__PROVIDER:-disabled}
      LiveKit__ApiKey: ${LIVEKIT__APIKEY}
      LiveKit__ApiSecret: ${LIVEKIT__APISECRET}
      LiveKit__WssUrl: ${LIVEKIT__WSSURL}
      LiveKit__WebhookSigningSecret: ${LIVEKIT__WEBHOOKSIGNINGSECRET}
      LiveKit__EgressBucket: ${LIVEKIT__EGRESSBUCKET}
      LiveKit__DefaultMaxDurationSeconds: '${LIVEKIT__DEFAULTMAXDURATIONSECONDS:-1800}'
      LiveKit__EgressEnabled: '${LIVEKIT__EGRESSENABLED:-false}'
      Anthropic__ApiKey: ${ANTHROPIC__APIKEY}
      OpenAi__ApiKey: ${OPENAI__APIKEY}
      OpenAi__ApiBase: ${OPENAI__APIBASE:-https://api.openai.com/v1}
      ElevenLabs__ApiKey: ${ELEVENLABS__APIKEY}
      Whisper__ApiKey: ${WHISPER__APIKEY}
      Aws__AccessKeyId: ${AWS__ACCESSKEYID}
      Aws__SecretAccessKey: ${AWS__SECRETACCESSKEY}
      Aws__Region: ${AWS__REGION:-eu-west-2}
      Aws__Bucket: ${AWS__BUCKET}
      SpeakingCompliance__CurrentConsentVersion: ${SPEAKINGCOMPLIANCE__CURRENTCONSENTVERSION:-recording.v1}
      SpeakingCompliance__CurrentLiveVideoConsentVersion: ${SPEAKINGCOMPLIANCE__CURRENTLIVEVIDEOCONSENTVERSION:-live_video_with_tutor.v1}
      SpeakingCompliance__RetentionDaysDefault: '${SPEAKINGCOMPLIANCE__RETENTIONDAYSDEFAULT:-90}'
      SpeakingCompliance__RetentionDaysWhenTutorReviewed: '${SPEAKINGCOMPLIANCE__RETENTIONDAYSWHENTUTORREVIEWED:-365}'
      SpeakingCompliance__AuditLogRetentionDays: '${SPEAKINGCOMPLIANCE__AUDITLOGRETENTIONDAYS:-2555}'
      Features__SpeakingV2: '${FEATURES__SPEAKINGV2:-false}'
    ports:
      - '8080:8080'
    volumes:
      - oet_local_storage:/var/opt/oet-with-dr-hesham/storage
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  oet_local_pgdata:
  oet_local_storage:
