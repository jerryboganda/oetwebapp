name: Build & Push Web Image

# Builds the Next.js (Turbopack) web image on GitHub-hosted runners (16 GB RAM)
# and pushes it to GHCR. This is the memory-safe production build path: the
# production VPS is a shared host (60+ co-tenant containers) that OOM-kills an
# in-place `next build`, so the image is built off-box here and the VPS simply
# pulls the digest.
#
# Deploy after this completes:
#   WEB_IMAGE=ghcr.io/<owner>/oetwebapp-web@sha256:<digest> \
#     docker compose --env-file .env.production -f docker-compose.production.yml \
#       up -d --no-build --force-recreate web-blue   # then health-gate + flip routers
# (docker-compose.production.yml already reads ${WEB_IMAGE}; api/router/db-backup
#  keep their existing :local images.)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'hooks/**'
      - 'contexts/**'
      - 'public/**'
      - 'messages/**'
      - 'i18n.ts'
      - 'middleware.ts'
      - 'next.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'postcss.config.mjs'
      - 'tailwind.config.*'
      - 'Dockerfile'
      - '.github/workflows/build-push-web.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: build-push-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push web image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.oetwithdrhesham.co.uk
            APP_URL=https://app.oetwithdrhesham.co.uk
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output digest
        run: |
          echo "### Web image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "WEB_IMAGE=ghcr.io/${{ github.repository }}-web@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "WEB_IMAGE=ghcr.io/${{ github.repository }}-web@${{ steps.build.outputs.digest }}"
