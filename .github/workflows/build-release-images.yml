name: Build Release Images

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Full 40-character Git SHA to build into immutable release images."
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: build-release-images-${{ inputs.target_sha }}
  cancel-in-progress: false

jobs:
  build-release-images:
    name: Build and publish digest-pinned images
    runs-on: ubuntu-latest
    environment:
      name: ${{ format('{0}', 'production') }}
    timeout-minutes: 90
    outputs:
      web_image: ${{ steps.refs.outputs.web_image }}
      api_image: ${{ steps.refs.outputs.api_image }}
      db_backup_image: ${{ steps.refs.outputs.db_backup_image }}
      router_image: ${{ steps.refs.outputs.router_image }}

    steps:
      - name: Validate exact SHA input
        shell: bash
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          case "$TARGET_SHA" in
            *[!0-9a-fA-F]*)
              echo "target_sha must be hexadecimal." >&2
              exit 1
              ;;
          esac
          if [ "${#TARGET_SHA}" -ne 40 ]; then
            echo "target_sha must be a full 40-character SHA." >&2
            exit 1
          fi

      - name: Check out exact SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.target_sha }}

      - name: Verify checked-out revision
        shell: bash
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [ "$actual_sha" != "$TARGET_SHA" ]; then
            echo "Checked out $actual_sha, expected $TARGET_SHA." >&2
            exit 1
          fi

      - name: Resolve GHCR image names
        id: names
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          repo="${REPOSITORY,,}"
          prefix="ghcr.io/${repo}"
          {
            echo "web=${prefix}/web"
            echo "api=${prefix}/api"
            echo "db_backup=${prefix}/db-backup"
            echo "router=${prefix}/router"
            echo "tag=${TARGET_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push web image
        id: web
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.names.outputs.web }}:${{ steps.names.outputs.tag }}
          labels: |
            org.opencontainers.image.revision=${{ inputs.target_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://api.oetwithdrhesham.co.uk' }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
            APP_URL=${{ vars.APP_URL || 'https://app.oetwithdrhesham.co.uk' }}

      - name: Build and push API image
        id: api
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.names.outputs.api }}:${{ steps.names.outputs.tag }}
          labels: |
            org.opencontainers.image.revision=${{ inputs.target_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push DB backup image
        id: db_backup
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: scripts/backup/Dockerfile
          push: true
          tags: ${{ steps.names.outputs.db_backup }}:${{ steps.names.outputs.tag }}
          labels: |
            org.opencontainers.image.revision=${{ inputs.target_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push router image
        id: router
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: scripts/deploy/nginx
          file: scripts/deploy/nginx/Dockerfile
          push: true
          tags: ${{ steps.names.outputs.router }}:${{ steps.names.outputs.tag }}
          labels: |
            org.opencontainers.image.revision=${{ inputs.target_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Write immutable digest refs
        id: refs
        shell: bash
        run: |
          {
            echo "WEB_IMAGE=${{ steps.names.outputs.web }}@${{ steps.web.outputs.digest }}"
            echo "API_IMAGE=${{ steps.names.outputs.api }}@${{ steps.api.outputs.digest }}"
            echo "DB_BACKUP_IMAGE=${{ steps.names.outputs.db_backup }}@${{ steps.db_backup.outputs.digest }}"
            echo "ROUTER_IMAGE=${{ steps.names.outputs.router }}@${{ steps.router.outputs.digest }}"
          } | tee release-images.env
          while IFS='=' read -r key value; do
            key_lc="$(printf '%s' "$key" | tr '[:upper:]' '[:lower:]')"
            echo "${key_lc}=${value}" >> "$GITHUB_OUTPUT"
          done < release-images.env

      - name: Upload release image refs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-images-${{ inputs.target_sha }}
          path: release-images.env
          if-no-files-found: error
          retention-days: 90

      - name: Summarize deploy inputs
        shell: bash
        run: |
          {
            echo "## Immutable release image refs"
            echo
            echo '```env'
            cat release-images.env
            echo '```'
            echo
            echo "Use these refs as the image inputs for the protected Deploy Production workflow."
          } >> "$GITHUB_STEP_SUMMARY"