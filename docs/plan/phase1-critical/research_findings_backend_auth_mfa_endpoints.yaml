auth_endpoint_registrations:
  group_prefix: "/v1/auth"
  endpoints:
    - method: POST
      path: "/v1/auth/register"
      handler: "AuthService.RegisterLearnerAsync"
      request_dto: RegisterRequest
      response_dto: AuthSessionResponse
      policy: AllowAnonymous

    - method: GET
      path: "/v1/auth/catalog/signup"
      handler: "AuthService.GetSignupCatalogAsync"
      request_dto: null
      response_dto: SignupCatalogResponse
      policy: AllowAnonymous

    - method: POST
      path: "/v1/auth/sign-in"
      handler: "AuthService.SignInAsync"
      request_dto: PasswordSignInRequest
      response_dto: "AuthSessionResponse (or 403 MfaChallengeRequired)"
      policy: AllowAnonymous

    - method: GET
      path: "/v1/auth/external/{provider}/start"
      handler: "ExternalAuthService.BuildAuthorizationRedirect"
      request_dto: "query: next?, platform?"
      response_dto: "302 Redirect"
      policy: AllowAnonymous

    - method: GET
      path: "/v1/auth/external/{provider}/callback"
      handler: "ExternalAuthService.CompleteCallbackAsync"
      request_dto: "query: code?, state?, error?"
      response_dto: "302 Redirect"
      policy: AllowAnonymous

    - method: POST
      path: "/v1/auth/external/{provider}/exchange"
      handler: "ExternalAuthService.ExchangeAsync"
      request_dto: ExternalAuthExchangeRequest
      response_dto: ExternalAuthExchangeResponse
      policy: AllowAnonymous

    - method: POST
      path: "/v1/auth/email/send-verification-otp"
      handler: "AuthService.SendEmailVerificationOtpAsync"
      request_dto: SendEmailOtpRequest
      response_dto: OtpChallengeResponse
      policy: AllowAnonymous

    - method: POST
      path: "/v1/auth/email/verify-otp"
      handler: "AuthService.VerifyEmailOtpAsync"
      request_dto: VerifyEmailOtpRequest
      response_dto: CurrentUserResponse
      policy: AllowAnonymous

    - method: POST
      path: "/v1/auth/forgot-password"
      handler: "AuthService.ForgotPasswordAsync"
      request_dto: ForgotPasswordRequest
      response_dto: OtpChallengeResponse
      policy: AllowAnonymous

    - method: POST
      path: "/v1/auth/reset-password"
      handler: "AuthService.ResetPasswordAsync"
      request_dto: ResetPasswordRequest
      response_dto: "204 NoContent"
      policy: AllowAnonymous

    - method: POST
      path: "/v1/auth/mfa/authenticator/begin"
      handler: "AuthService.BeginAuthenticatorSetupAsync"
      request_dto: BeginAuthenticatorSetupRequest (empty)
      response_dto: AuthenticatorSetupResponse
      policy: RequireAuthorization (any authenticated user)

    - method: POST
      path: "/v1/auth/mfa/authenticator/confirm"
      handler: "AuthService.ConfirmAuthenticatorSetupAsync"
      request_dto: ConfirmAuthenticatorSetupRequest
      response_dto: CurrentUserResponse
      policy: RequireAuthorization (any authenticated user)

    - method: POST
      path: "/v1/auth/mfa/challenge"
      handler: "AuthService.CompleteMfaChallengeAsync"
      request_dto: MfaChallengeRequest
      response_dto: AuthSessionResponse
      policy: AllowAnonymous

    - method: POST
      path: "/v1/auth/mfa/recovery"
      handler: "AuthService.CompleteRecoveryChallengeAsync"
      request_dto: MfaChallengeRequest
      response_dto: AuthSessionResponse
      policy: AllowAnonymous

    - method: GET
      path: "/v1/auth/me"
      handler: "AuthService.GetCurrentUserAsync"
      request_dto: "(ClaimsPrincipal from JWT)"
      response_dto: CurrentUserResponse
      policy: RequireAuthorization (any authenticated user)

    - method: POST
      path: "/v1/auth/refresh"
      handler: "AuthService.RefreshAsync"
      request_dto: RefreshTokenRequest
      response_dto: AuthSessionResponse
      policy: AllowAnonymous

    - method: POST
      path: "/v1/auth/sign-out"
      handler: "AuthService.SignOutAsync"
      request_dto: SignOutRequest
      response_dto: "204 NoContent"
      policy: AllowAnonymous

mfa_recovery_endpoint:
  path: "POST /v1/auth/mfa/recovery"
  request_dto:
    name: MfaChallengeRequest
    fields:
      - name: Email
        type: string
        required: true
        description: "The user's email address"
      - name: Code
        type: string
        required: false
        description: "Not used for recovery — the TOTP code field (used by /mfa/challenge instead)"
      - name: ChallengeToken
        type: "string?"
        required: false
        description: "Data-protected opaque token issued during sign-in 403 (contains encrypted account ID)"
      - name: RecoveryCode
        type: "string?"
        required: true_for_recovery
        description: "One of the 8 recovery codes issued during authenticator setup (format: XXXXX-XXXXX)"
  response_dto:
    name: AuthSessionResponse
    fields:
      - name: AccessToken
        type: string
      - name: RefreshToken
        type: string
      - name: AccessTokenExpiresAt
        type: DateTimeOffset
      - name: RefreshTokenExpiresAt
        type: DateTimeOffset
      - name: CurrentUser
        type: CurrentUserResponse
        nested_fields:
          - "UserId, Email, Role, DisplayName, IsEmailVerified, IsAuthenticatorEnabled, RequiresEmailVerification, RequiresMfa, EmailVerifiedAt, AuthenticatorEnabledAt"
  handler_logic_summary: |
    1. Validates RecoveryCode is not null/whitespace (throws 'mfa_recovery_code_required' if missing)
    2. Resolves account via ResolveTrackedMfaAccountAsync (uses Email + ChallengeToken to find and decrypt account ID)
    3. Hashes the recovery code: uppercase, strip dashes, SHA-256
    4. Looks up MfaRecoveryCode entity matching account ID + code hash + RedeemedAt == null
    5. If not found, throws 'invalid_mfa_recovery_code'
    6. Marks recovery code as redeemed (sets RedeemedAt = now)
    7. Calls CompleteMfaSignInAsync which:
       a. Updates account.LastLoginAt and UpdatedAt
       b. Resolves subject (learner/expert/admin user profile)
       c. Issues JWT + refresh token pair
       d. Returns AuthSessionResponse

email_verification_endpoints:
  send_otp:
    path: "POST /v1/auth/email/send-verification-otp"
    request: "SendEmailOtpRequest { Email, Purpose='verify_email' }"
    response: "OtpChallengeResponse { ChallengeId, Purpose, DeliveryChannel, DestinationHint, ExpiresAt, RetryAfterSeconds }"
    behavior: "Replaces any existing pending challenge for the account. Generates 6-digit code, sends via IEmailSender. Acts as both 'send' and 'resend'."
  verify_otp:
    path: "POST /v1/auth/email/verify-otp"
    request: "VerifyEmailOtpRequest { Email, Purpose='verify_email', Code }"
    response: "CurrentUserResponse { UserId, Email, Role, ... }"
    behavior: "Validates code hash, checks expiry, sets account.EmailVerifiedAt if first verification."
  resend_endpoint:
    exists: false
    note: "No dedicated resend endpoint. Calling send-verification-otp again replaces any pending challenge and sends a new OTP. Effectively serves as resend."

auth_policy_definitions:
  base_policies:
    - name: "LearnerOnly"
      requirements:
        - RequireAuthenticatedUser
        - "RequireRole('learner')"
    - name: "ExpertOnly"
      requirements:
        - RequireAuthenticatedUser
        - "RequireRole('expert')"
        - "RequireClaim('email_verified', 'true')"
    - name: "AdminOnly"
      requirements:
        - RequireAuthenticatedUser
        - "RequireRole('admin')"
        - "RequireClaim('email_verified', 'true')"
  granular_admin_policies:
    - name: "AdminContentRead"
      requirements: "admin role + HasAdminPermission('content:read', 'system_admin')"
    - name: "AdminContentWrite"
      requirements: "admin role + HasAdminPermission('content:write', 'system_admin')"
    - name: "AdminContentPublish"
      requirements: "admin role + HasAdminPermission('content:publish', 'system_admin')"
    - name: "AdminBillingRead"
      requirements: "admin role + HasAdminPermission('billing:read', 'system_admin')"
    - name: "AdminBillingWrite"
      requirements: "admin role + HasAdminPermission('billing:write', 'system_admin')"
    - name: "AdminUsersRead"
      requirements: "admin role + HasAdminPermission('users:read', 'system_admin')"
    - name: "AdminUsersWrite"
      requirements: "admin role + HasAdminPermission('users:write', 'system_admin')"
    - name: "AdminReviewOps"
      requirements: "admin role + HasAdminPermission('review_ops', 'system_admin')"
    - name: "AdminSystemAdmin"
      requirements: "admin role + HasAdminPermission('system_admin')"
  has_admin_permission_logic: |
    Reads 'admin_permissions' claim from JWT, splits by comma, checks if any of the required permissions exist (case-insensitive).
    system_admin always grants access to all granular permission policies.

jwt_configuration:
  algorithm: "HMAC-SHA256 (SymmetricSecurityKey)"
  signing_key_source: "AuthTokens:AccessTokenSigningKey (min 32 chars)"
  validation:
    validate_issuer: true
    validate_audience: true
    validate_lifetime: true
    validate_issuer_signing_key: true
    valid_issuer: "AuthTokens:Issuer"
    valid_audience: "AuthTokens:Audience"
    name_claim_type: "ClaimTypes.NameIdentifier"
    role_claim_type: "ClaimTypes.Role"
    map_inbound_claims: false
  on_token_validated: |
    1. Extract auth_account_id claim; fail if missing
    2. Load ApplicationUserAccount from DB; fail if not found or deleted
    3. If learner role: check LearnerUser.AccountStatus == 'active'; fail if not
    4. If expert role: check ExpertUser.IsActive; fail if not
  signalr_token_support: |
    OnMessageReceived extracts access_token from query string for /v1/notifications/hub and /v1/conversations/hub paths
  refresh_token:
    signing_key: "AuthTokens:RefreshTokenSigningKey (separate from access key, min 32 chars)"
    storage: "SHA-256 hash stored in RefreshTokenRecords table"
    rotation: "Old refresh token revoked on each refresh; new pair issued"

middleware_pipeline_order:
  - step: 1
    middleware: "UseForwardedHeaders (if trustForwardHeaders)"
  - step: 2
    middleware: "Correlation ID middleware (X-Correlation-Id)"
  - step: 3
    middleware: "Security headers (X-Content-Type-Options, X-Frame-Options, Referrer-Policy, Permissions-Policy)"
  - step: 4
    middleware: "UseExceptionHandler (global error handler for ApiException, MfaChallengeRequiredException, unhandled)"
  - step: 5
    middleware: "UseHsts (production only)"
  - step: 6
    middleware: "UseHttpsRedirection (if enforceHttps)"
  - step: 7
    middleware: "UseSwagger + UseSwaggerUI (if enableSwagger)"
  - step: 8
    middleware: "UseCors('Frontend')"
  - step: 9
    middleware: "UseAuthentication"
  - step: 10
    middleware: "UseRateLimiter"
  - step: 11
    middleware: "UseAuthorization"
  - step: 12
    middleware: "Endpoint routing (MapAuthEndpoints, MapLearnerEndpoints, etc.)"

backend_project_structure:
  root: "backend/src/OetLearner.Api/"
  folders:
    Endpoints: "HTTP route registrations (one file per feature area)"
    Services: "Business logic services (scoped/singleton)"
    Contracts: "Request/Response DTOs"
    Domain: "EF Core entity classes"
    Configuration: "IOptions configuration classes"
    Security: "Auth handlers (DevelopmentAuthHandler)"
    Data: "DbContext, migrations"
    Hubs: "SignalR hubs (NotificationHub, ConversationHub)"
    Properties: "launchSettings.json"
  key_files:
    - "Program.cs — DI registration, middleware pipeline, auth config"
    - "OetLearner.Api.csproj — project file"

