# ═══════════════════════════════════════════════════════════════
# 4. STATE MANAGEMENT ARCHITECTURE
# ═══════════════════════════════════════════════════════════════

state_management:

  contexts:
    - name: AuthContext
      file: "contexts/auth-context.tsx"
      manages:
        - "session (AuthSession | null)"
        - "user (CurrentUser | null)"
        - "loading, error states"
        - "pendingMfaChallenge"
      providers: "AuthProvider wraps the entire app"
      consumers: "Every authenticated page/component via useAuth()"
      platform_behavior: "Platform-agnostic — delegates to auth-client.ts which handles platform-aware OAuth (desktop/capacitor)"

    - name: NotificationCenterContext
      file: "contexts/notification-center-context.tsx"
      manages:
        - "notifications feed (NotificationFeedItem[])"
        - "unreadCount, totalCount, hasMore"
        - "connectionStatus (SignalR status)"
        - "preferences (NotificationPreferencePayload)"
        - "push subscription state"
      providers: "NotificationCenterProvider"
      consumers: "Notification bell, notification center panel, settings"
      platform_behavior: |
        - SignalR transport: forces LongPolling when going through /api/backend proxy (same-origin); uses WebSockets when direct API connection
        - Push notifications: uses Web Push API (service worker); NOT wired for Capacitor native push
        - Poll interval: 30s fallback polling regardless of platform

  stores:
    - name: useExpertStore
      file: "lib/stores/expert-store.ts"
      manages:
        - "playbackSpeed, currentTimestamp, isPlaying (audio review state)"
        - "reviewDrafts: Record<string, LocalReviewDraft> (persisted to localStorage)"
      persistence: "zustand persist middleware → localStorage key 'expert-console-store'"
      platform_behavior: "Uses localStorage — works on web and desktop, but NOT reliable on Capacitor native (should use Capacitor Preferences or secure storage)"

  hooks:
    - name: useIsMobile
      file: "hooks/use-mobile.ts"
      manages: "Boolean based on viewport width < 768px"
      note: "This is CSS breakpoint mobile, NOT Capacitor native detection"

    - name: useAnalytics
      file: "hooks/use-analytics.ts"
      manages: "Thin wrapper around analytics.track()"

  state_gaps:
    - gap: "Expert review draft persistence uses localStorage which is NOT reliable on Capacitor mobile native; should use capacitor-secure-storage-plugin or @capacitor/preferences for persistence"
      severity: medium

    - gap: "NotificationCenterContext push subscription uses Web Push API (service worker) which does NOT work on Capacitor native — native push (FCM/APNs) is configured in lib/mobile/push-notifications.ts but NOT integrated with NotificationCenterContext"
      severity: high

    - gap: "No global loading/error state management — each page manages its own loading/error useState"
      severity: low

# ═══════════════════════════════════════════════════════════════
# 5. SIGNALR / REAL-TIME INTEGRATION
# ═══════════════════════════════════════════════════════════════

signalr_integration:

  hubs:
    - name: NotificationHub
      file: "backend/src/OetLearner.Api/Services/NotificationHub.cs"
      registered_in: "Program.cs (builder.Services.AddSignalR())"
      frontend_consumer: "contexts/notification-center-context.tsx"
      web_status: WORKING
      desktop_status: WORKING
      capacitor_status: PARTIAL
      transport_notes: |
        - When apiBaseUrl starts with '/' (proxy path), forces HttpTransportType.LongPolling
        - When direct API URL, uses HttpTransportType.WebSockets
        - Capacitor native: SignalR client (@microsoft/signalr) works but transport depends
          on whether the native WebView supports WebSockets to the API (usually yes)

    - name: ConversationHub
      file: "backend/src/OetLearner.Api/Hubs/ConversationHub.cs"
      registered_in: "Program.cs"
      frontend_consumer: "NONE (orphan — REST endpoints consumed, but SignalR real-time audio streaming has no frontend client)"
      web_status: NOT_CONSUMED
      desktop_status: NOT_CONSUMED
      capacitor_status: NOT_CONSUMED
      note: "ConversationHub supports StartSession, SendAudio, EndSession for real-time speaking practice but the frontend conversation page uses REST endpoints only"

  platform_issues:
    - issue: "Capacitor native has NO explicit SignalR configuration in lib/mobile/ or capacitor-config.ts"
      impact: "SignalR connection from Capacitor native WebView depends on default WebView behavior; may fail behind restrictive network configs"

    - issue: "Next.js proxy (/api/backend) does NOT support WebSocket upgrade — forces LongPolling for all proxy-routed SignalR"
      impact: "Higher latency for real-time notifications in development and possibly production if proxy is used"

# ═══════════════════════════════════════════════════════════════
# 6. PLATFORM DETECTION & CONDITIONAL CODE
# ═══════════════════════════════════════════════════════════════

platform_detection:

  core_system:
    file: "lib/runtime-signals.ts"
    function: getAppRuntimeKind
    returns: "'web' | 'desktop' | 'capacitor-native'"
    detection_chain:
      - "1. Check document.documentElement.dataset.runtimeKind (set by bootstrap script)"
      - "2. Check window.desktopBridge existence → 'desktop'"
      - "3. Check window.Capacitor?.isNativePlatform?.() → 'capacitor-native'"
      - "4. Default → 'web'"
    bootstrap_script: "getRuntimeBootstrapScript() — inline <script> sets data-runtime-kind on <html>"

  type_definitions:
    file: "types/desktop.d.ts"
    defines:
      - "CapacitorGlobal (isNativePlatform, getPlatform)"
      - "DesktopBridge (platform, versions, openExternal, runtime, secureSecrets)"
      - "Window augmentation (desktopBridge?, Capacitor?)"

  platform_conditional_code_inventory:

    - location: "lib/auth-client.ts:buildExternalAuthStartHref"
      condition: "window.desktopBridge → platform='desktop'; Capacitor.isNativePlatform() → platform='capacitor'"
      purpose: "OAuth start URL includes platform param for backend to redirect appropriately"

    - location: "app/speaking/task/[id]/page.tsx"
      condition: "Capacitor.isNativePlatform() → isNativeRecorder=true"
      purpose: "Uses native audio recording API on Capacitor instead of browser MediaRecorder"
      completeness: "Fully implemented with native visualizer, pause/resume handling"

    - location: "components/auth/sign-in-form.tsx"
      condition: "window.desktopBridge?.runtime?.info"
      purpose: "Shows desktop runtime info on sign-in form (isPackaged, version)"

    - location: "components/runtime/runtime-lifecycle-bridge.tsx"
      condition: "runtimeKind === 'desktop' → desktop lifecycle; runtimeKind === 'capacitor-native' → capacitor lifecycle"
      purpose: "Bridges platform lifecycle events (window focus/blur, app state changes)"

    - location: "hooks/use-mobile.ts"
      condition: "window.innerWidth < 768 (CSS breakpoint, NOT platform)"
      purpose: "Responsive layout — used in writing player for timer/button sizing"

    - location: "contexts/notification-center-context.tsx"
      condition: "env.apiBaseUrl.startsWith('/') → LongPolling; else → WebSockets"
      purpose: "SignalR transport selection based on proxy vs direct API"

  incomplete_platform_gates:
    - feature: "Push notifications"
      issue: "NotificationCenterContext only uses Web Push API. lib/mobile/push-notifications.ts has Capacitor FCM/APNs code but it's NOT integrated with the notification center context"

    - feature: "File downloads"
      issue: "Desktop file downloads handled by Electron will-download handler. Capacitor file downloads not explicitly handled"

# ═══════════════════════════════════════════════════════════════
# 7. ENVIRONMENT & CONFIGURATION
# ═══════════════════════════════════════════════════════════════

environment_config:

  env_resolution:
    file: "lib/env.ts"
    variables:
      - name: apiBaseUrl
        resolution_order:
          - "NEXT_PUBLIC_API_BASE_URL (client-side, explicit)"
          - "Browser: falls back to '/api/backend' (same-origin proxy)"
          - "Server-side: PUBLIC_API_BASE_URL → API_PROXY_TARGET_URL → 'http://127.0.0.1:5198'"
      - name: webPushPublicKey
        source: "NEXT_PUBLIC_WEB_PUSH_PUBLIC_KEY"

  next_config:
    file: "next.config.ts"
    features:
      - "CSP headers with dynamic apiOrigins and WebSocket origins"
      - "Microphone permission allowed (self)"
      - "output: 'standalone'"
      - "HMR disable option via DISABLE_HMR env var"
    rewrites: "NONE defined in next.config.ts — proxy is handled by route handler"
    redirects: "NONE defined"

  config_gaps:
    - gap: "No explicit CORS configuration for Capacitor native in next.config.ts CSP connect-src — Capacitor WebView may need capacitor://localhost or ionic://localhost in connect-src"
      severity: medium

    - gap: "CSP connect-src only allows apiOrigins and apiWebSocketOrigins derived from NEXT_PUBLIC_API_BASE_URL/API_PROXY_TARGET_URL. If the Capacitor native app uses a different API URL, CSP may block the request"
      severity: medium

    - gap: "lib/auth-client.ts hardcodes API_BASE_URL from process.env.NEXT_PUBLIC_API_BASE_URL only — does NOT use lib/env.ts resolver, could diverge from api.ts resolution"
      severity: low

# ═══════════════════════════════════════════════════════════════
# 8. TYPES & CONTRACT MISMATCHES
# ═══════════════════════════════════════════════════════════════

type_safety:

  frontend_type_files:
    directory: "lib/types/"
    files:
      - {name: admin.ts, purpose: "Admin dashboard, content, users, billing, review ops types"}
      - {name: auth.ts, purpose: "Auth session, current user, MFA, signup types"}
      - {name: content-hierarchy.ts, purpose: "Programs, tracks, modules, lessons, packages"}
      - {name: conversation.ts, purpose: "AI conversation session types"}
      - {name: expert.ts, purpose: "Expert console, reviews, schedule, calibration types"}
      - {name: gamification.ts, purpose: "XP, streak, achievements, leaderboard types"}
      - {name: learner.ts, purpose: "Score guarantee, study commitment, certificates, referral types"}
      - {name: notifications.ts, purpose: "Notification feed, preferences, push, admin notification types"}
      - {name: subtest-content-schemas.ts, purpose: "Writing/speaking/reading/listening content schemas"}
      - {name: vocabulary.ts, purpose: "Vocabulary terms, flashcards, quiz types"}

  as_any_usage:
    count: 2
    locations:
      - {file: "lib/api.ts", line: 1248, context: "(question as any).explanation — reading question type lacks explanation field"}
      - {file: "lib/api.ts", line: 1521, context: "(existing as any)[subtest] — dynamic property assignment on TrendPoint"}

  primary_type_gap:
    description: |
      Most api.ts functions use `apiRequest<ApiRecord>` where ApiRecord = Record<string, any>.
      This means the Backend→Frontend contract is NOT enforced at compile time. The backend
      .NET DTOs are well-typed, but the frontend receives them as `any` and manually maps fields
      in each function body. If a backend DTO changes a field name, the frontend will silently
      receive undefined without any TypeScript compile error.

    affected_functions: "~150+ functions that return ApiRecord or use asRecord/asArray helpers"

    well_typed_exceptions:
      - "Expert console functions that use typed generics: apiRequest<ExpertMe>, apiRequest<ReviewQueueResponse>, etc."
      - "Auth client functions with proper typed responses (AuthSession, CurrentUser, etc.)"
      - "Notification API with full typed request/response types"

  contract_risks:
    - risk: "Backend field rename in a DTO breaks frontend silently — no compile-time detection"
      severity: high
      mitigation: "Consider generating TypeScript types from .NET OpenAPI/Swagger spec"

    - risk: "2 `as any` casts for missing type fields — low risk, minor"
      severity: low

