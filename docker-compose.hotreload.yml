# OET Prep - Complete Local Development with Hot Reload
# Usage:
#   podman compose -f docker-compose.hotreload.yml --env-file .env.docker-local up --build -d
#
# Frontend at http://localhost:3000 (hot-reload with Next.js HMR / Turbopack)
# API at http://localhost:8080 (hot-reload with dotnet watch)
# Postgres at localhost:5433 (mapped from container's 5432, to avoid host port conflicts)
#
# Make code changes in your editor -> containers auto-update instantly.
#
# DESIGN NOTE: The API intentionally relies on appsettings.Development.json for
# the bulk of its configuration (AuthTokens, SMTP, LiveKit, AI, etc). We only
# override the handful of values that MUST differ inside Docker (DB host, URLs,
# polling file watcher). Passing the full env-var surface here is fragile —
# empty/typed values (e.g. an empty Smtp:Port) crash the .NET config binder.

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: oet-hotreload-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5433:5432'
    volumes:
      - oet_hotreload_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10

  learner-api:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: oet-hotreload-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # --- Only Docker-specific overrides; everything else from appsettings.Development.json ---
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: '1'
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: '1'
      # Point the API at the postgres container (service name on the compose network)
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      # URLs the frontend (in the browser) uses to reach the API
      Platform__PublicApiBaseUrl: http://localhost:8080
      Platform__PublicWebBaseUrl: http://localhost:3000
      Billing__CheckoutBaseUrl: http://localhost:3000/billing/checkout
      Storage__LocalRootPath: /var/opt/oet-learner/storage
      # Bootstrap a known expert/admin login for local dev
      Bootstrap__AutoMigrate: 'true'
      Bootstrap__ExpertEmail: ${BOOTSTRAP_EXPERT_EMAIL}
      Bootstrap__ExpertPassword: ${BOOTSTRAP_EXPERT_PASSWORD}
      Bootstrap__ExpertDisplayName: ${BOOTSTRAP_EXPERT_DISPLAY_NAME}
      Features__EnableSwagger: 'true'
    ports:
      - '8080:8080'
    volumes:
      # Mount backend source for dotnet watch hot reload
      - ./backend:/app/backend
      # Shadow the host's Windows-built bin/obj with container-local Linux
      # artifacts. Without this, Windows MSBuild output (e.g. staticwebassets
      # with mixed-separator paths) leaks in through the bind mount and breaks
      # dotnet watch on Linux.
      - oet_hotreload_api_obj:/app/backend/src/OetLearner.Api/obj
      - oet_hotreload_api_bin:/app/backend/src/OetLearner.Api/bin
      - oet_hotreload_storage:/var/opt/oet-learner/storage
      - oet_hotreload_dotnet_cache:/root/.nuget/packages
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8080/health/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    # --no-launch-profile: ignore launchSettings.json (which binds localhost:5198,
    # unreachable from outside the container). With it bypassed, ASPNETCORE_URLS
    # (http://+:8080) binds all interfaces on the port the container exposes.
    command: dotnet watch --project backend/src/OetLearner.Api/OetLearner.Api.csproj run --no-launch-profile

# ─────────────────────────────────────────────────────────────────────────────
# FRONTEND runs NATIVELY on Windows (pnpm dev), NOT in this compose.
#
# Why: on this Windows host the Podman machine's disk I/O is slow (Next.js
# reports "Slow filesystem detected: ~13s" even on a named volume), so a
# containerized Next.js dev server cannot deliver efficient hot reload. Running
# the dev server natively gives instant, native-speed hot reload while the API
# and database stay containerized here. This matches the repo's intended dev
# model (see docker-compose.dev.yml).
#
# Start the frontend with:   pnpm install   (once)   then   pnpm run dev
# It reads .env.local -> NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  oet_hotreload_pgdata:
  oet_hotreload_storage:
  oet_hotreload_dotnet_cache:
  oet_hotreload_api_obj:
  oet_hotreload_api_bin:
