  - id: sec-ipc-validation
    title: "Add IPC sender validation to all 11 handlers in main.cjs"
    description: |
      Add a validateSenderFrame() helper function near isTrustedRendererUrl()
      (line ~157 in main.cjs) and apply it as the first guard in all 11
      ipcMain.handle() callbacks.

      1. Add helper function:
         function validateSenderFrame(event) {
           const senderUrl = event?.senderFrame?.url;
           if (!senderUrl) return false;
           return isTrustedRendererUrl(senderUrl);
         }

      2. Add validation to each handler. Pattern:
         ipcMain.handle('desktop:open-external', async (event, url) => {
           if (!validateSenderFrame(event)) {
             throw new Error('Unauthorized IPC sender.');
           }
           // ... existing logic unchanged
         });

      3. Apply to ALL 11 channels. Note: the first parameter of ipcMain.handle
         callbacks is the event — some existing handlers use _event (unused).
         Change _event to event for all 11 handlers:
           - desktop:open-external (line ~772)
           - desktop:secret-storage:status (line ~784)
           - desktop:secret-storage:get (line ~794)
           - desktop:secret-storage:set (line ~805)
           - desktop:secret-storage:delete (line ~816)
           - desktop:runtime-info (line ~826)
           - desktop:offline-cache:store (line ~856)
           - desktop:offline-cache:get (line ~871)
           - desktop:offline-cache:delete (line ~883)
           - desktop:offline-cache:list (line ~894)
           - desktop:offline-cache:clear (line ~903)

      4. For handlers that currently use () => (no event param), add event as
         first parameter: async (event) => { ... }

      5. The error message must be consistent: 'Unauthorized IPC sender.'
    wave: 1
    agent: gem-implementer
