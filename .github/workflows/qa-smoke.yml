name: QA Smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: qa-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests (.NET) · shard ${{ matrix.shard }}/${{ strategy.job-total }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: oet_provider_tests
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d oet_provider_tests"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    # Per-shard cap. The full suite ran sequentially (the test assembly sets
    # [CollectionBehavior(DisableTestParallelization = true)] in AssemblyInfo.cs,
    # and the fixtures use isolated in-memory EF Core DBs — one unique
    # `InMemory:{Guid}` database per TestWebApplicationFactory — so there is NO
    # shared Postgres/Respawn state across classes). Because xunit will not
    # parallelize within a single process, parallelism comes from this matrix:
    # each shard is its own `dotnet test` process running a DISJOINT subset of
    # test CLASSES, so each finishes well under the cap.
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        # 4 disjoint shards. There is a single test project
        # (OetWithDrHesham.Api.Tests) with a mostly-flat namespace, so we shard by
        # round-robining distinct test CLASSES (not methods — keeps the
        # --filter compact) into N buckets via a stable, deterministic
        # partition computed at runtime from `dotnet test --list-tests`.
        shard: [1, 2, 3, 4]
    env:
      TOTAL_SHARDS: 4
      OET_TEST_POSTGRES_CONNECTION: Host=127.0.0.1;Port=5432;Database=oet_provider_tests;Username=postgres;Password=postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore backend/OetWithDrHesham.sln
      - name: Build (Release, once per shard)
        run: dotnet build backend/OetWithDrHesham.sln --configuration Release --no-restore --nologo
      - name: Compute test-class filter for this shard
        id: filter
        env:
          SHARD_INDEX: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          TEST_PROJ="backend/tests/OetWithDrHesham.Api.Tests/OetWithDrHesham.Api.Tests.csproj"
          # Discover every fully-qualified test name without rebuilding, then
          # reduce to the set of distinct test CLASSES (strip the trailing
          # `.Method` and any `(args...)` theory data). Round-robin the sorted,
          # de-duplicated class list across TOTAL_SHARDS buckets so the split is
          # deterministic and balanced regardless of discovery order.
          dotnet test "$TEST_PROJ" \
            --configuration Release \
            --no-build \
            --nologo \
            --list-tests \
            | sed -n 's/^[[:space:]]\{4,\}\(.*\)$/\1/p' \
            | sed 's/(.*//' \
            | sed 's/\.[A-Za-z0-9_]*$//' \
            | sort -u > all-classes.txt

          TOTAL_CLASSES=$(wc -l < all-classes.txt | tr -d ' ')
          echo "Discovered $TOTAL_CLASSES distinct test classes."
          if [ "$TOTAL_CLASSES" -eq 0 ]; then
            echo "::error::No test classes discovered — failing rather than running an empty shard."
            exit 1
          fi

          # Round-robin: class on line i (1-based) belongs to shard ((i-1) % N)+1.
          awk -v shard="$SHARD_INDEX" -v n="$TOTAL_SHARDS" \
            'NR % n == (shard - 1) % n { print }' all-classes.txt > shard-classes.txt

          COUNT=$(wc -l < shard-classes.txt | tr -d ' ')
          echo "Shard $SHARD_INDEX owns $COUNT classes."
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::Shard $SHARD_INDEX resolved to 0 classes."
            exit 1
          fi

          # Build a compact filter: FullyQualifiedName~Class1|FullyQualifiedName~Class2|...
          # `~` is a substring match anchored on the fully-qualified class name,
          # which is unambiguous because each line is a complete namespace+class.
          FILTER=$(awk '{ printf "%sFullyQualifiedName~%s", (NR==1 ? "" : "|"), $0 }' shard-classes.txt)
          {
            echo "value<<EOF"
            echo "$FILTER"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Test (shard ${{ matrix.shard }})
        run: |
          mkdir -p "test-results-shard-${{ matrix.shard }}"
          dotnet test backend/tests/OetWithDrHesham.Api.Tests/OetWithDrHesham.Api.Tests.csproj \
            --configuration Release \
            --no-build \
            --nologo \
            --verbosity normal \
            --filter "${{ steps.filter.outputs.value }}" \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=results.trx" \
            --results-directory "test-results-shard-${{ matrix.shard }}"
      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-shard-${{ matrix.shard }}
          path: test-results-shard-${{ matrix.shard }}/
          if-no-files-found: ignore
          retention-days: 14

  frontend-unit:
    name: Frontend unit (vitest + lint + tsc + build)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm run lint
      - run: pnpm exec vitest run --reporter=dot
      - run: pnpm run build

  e2e-smoke:
    name: E2E smoke (shard ${{ matrix.shard }}/${{ strategy.job-total }} · ${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # One job per Playwright project. Each job runs that project's full
        # smoke surface end-to-end against an in-job production-mode Docker
        # stack — no `next dev` cold-compile flakes.
        project:
          - chromium-learner
          - firefox-learner
          - webkit-learner
          - sydney-learner
          - mobile-chromium-learner
          - mobile-webkit-learner
          - chromium-expert
          - firefox-expert
          - webkit-expert
          - chromium-admin
          - firefox-admin
          - webkit-admin
          - chromium-unauth
        shard: [1]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # All three engines are required: the `setup` project (auth state
        # generation) always runs under chromium regardless of which
        # downstream project this shard targets, and webkit/firefox shards
        # also need their own engine.
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Build local smoke stack
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.desktop.yml up -d --build; then
              exit 0
            fi
            echo "Smoke stack build failed on attempt ${attempt}; retrying after cleanup."
            docker compose -f docker-compose.desktop.yml down -v || true
            sleep $((attempt * 15))
          done
          docker compose -f docker-compose.desktop.yml up -d --build

      - name: Verify stack readiness
        run: node ./scripts/qa/assert-local-stack.mjs

      - name: Run Playwright smoke buckets for ${{ matrix.project }}
        env:
          # Surface every bucket failure but keep the rest of the project's
          # buckets running so we capture a complete report per shard.
          PLAYWRIGHT_CONTINUE_ON_FAILURE: '1'
          PLAYWRIGHT_HTML_OPEN: never
        run: |
          node ./scripts/qa/run-playwright-matrix.mjs smoke \
            --project=${{ matrix.project }} \
            --skip-readiness

      - name: Capture docker logs
        if: always()
        run: |
          mkdir -p output/playwright
          docker compose -f docker-compose.desktop.yml logs --no-color > output/playwright/docker-compose.log

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.project }}-shard${{ matrix.shard }}
          path: |
            output/playwright/
            blob-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Shut down smoke stack
        if: always()
        run: docker compose -f docker-compose.desktop.yml down -v

  e2e-merge-report:
    name: E2E merged HTML report
    if: always()
    needs: e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: playwright-*
          merge-multiple: false
      - name: Merge into HTML report
        run: |
          mkdir -p merged-blob
          find all-blob-reports -type d -name 'blob-report' -exec sh -c 'cp -r "$1"/* merged-blob/ 2>/dev/null || true' _ {} \;
          if [ -n "$(ls -A merged-blob 2>/dev/null)" ]; then
            pnpm exec playwright merge-reports --reporter html ./merged-blob
          else
            echo "No blob reports found to merge."
          fi
      - name: Upload merged HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-merged-html-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30

  qa-gate:
    name: QA gate (all suites green)
    if: always()
    needs: [backend-tests, frontend-unit, e2e-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all dependencies succeeded
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "::error::backend-tests failed"; exit 1
          fi
          if [ "${{ needs.frontend-unit.result }}" != "success" ]; then
            echo "::error::frontend-unit failed"; exit 1
          fi
          if [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "::error::e2e-smoke failed"; exit 1
          fi
          echo "All QA gates passed."
