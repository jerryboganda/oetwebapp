  - id: p1-backend-delete
    title: "Create learner self-service account deletion endpoint"
    description: |
      Add POST /v1/auth/account/delete endpoint to the backend auth endpoint group.

      Request DTO: DeleteAccountRequest { Password: string, Reason?: string }
      Authorization: LearnerOnly policy

      Handler logic:
      1. Extract current user from JWT claims
      2. Validate Password against identity store (UserManager.CheckPasswordAsync or equivalent)
      3. If password invalid → return 401 Unauthorized
      4. Set ApplicationUserAccount.DeletedAt = DateTimeOffset.UtcNow
      5. Update LearnerUser.AccountStatus to 'Deleted'
      6. Revoke all refresh tokens for the user
      7. SaveChanges (single transaction)
      8. Return 204 No Content

      This reuses existing soft-delete infrastructure: DeletedAt field already exists on
      ApplicationUserAccount (confirmed in migrations), AccountStatus enum already tracks state
      (confirmed: has concurrency token). No new migration needed.

      Wire the endpoint into the existing auth endpoint registration (16 existing endpoints under /v1/auth).
