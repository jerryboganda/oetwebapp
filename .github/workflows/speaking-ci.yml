name: Speaking Module CI

on:
  pull_request:
    paths:
      - 'app/speaking/**'
      - 'app/expert/speaking/**'
      - 'app/admin/content/speaking/**'
      - 'app/admin/private-speaking/**'
      - 'app/admin/analytics/speaking/**'
      - 'app/admin/analytics/mocks/**'
      - 'components/domain/speaking/**'
      - 'lib/api/speaking-*.ts'
      - 'lib/api/interlocutor-*.ts'
      - 'lib/analytics/speaking-events.ts'
      - 'backend/src/OetWithDrHesham.Api/Domain/Speaking*.cs'
      - 'backend/src/OetWithDrHesham.Api/Domain/RolePlay*.cs'
      - 'backend/src/OetWithDrHesham.Api/Domain/Interlocutor*.cs'
      - 'backend/src/OetWithDrHesham.Api/Services/Speaking/**'
      - 'backend/src/OetWithDrHesham.Api/Endpoints/*Speaking*.cs'
      - 'backend/src/OetWithDrHesham.Api/Endpoints/Tutor*.cs'
      - 'backend/src/OetWithDrHesham.Api/Endpoints/AdminSpeaking*.cs'
      - 'backend/src/OetWithDrHesham.Api/Hubs/**'
      - '.github/workflows/speaking-ci.yml'
  push:
    branches: [main]

concurrency:
  group: speaking-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      ConnectionStrings__OetWithDrHesham: Host=localhost;Database=oet_test;Username=postgres;Password=postgres
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-oet-stack
        with:
          with-postgres: "true"
      - name: Restore + build
        run: dotnet build backend/OetWithDrHesham.sln --configuration Release --nologo
      - name: Speaking-tagged tests
        run: dotnet test backend/OetWithDrHesham.sln --configuration Release --no-build --filter "FullyQualifiedName~Speaking" --logger "trx;LogFileName=speaking.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speaking-test-results
          path: '**/TestResults/*.trx'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: ./.github/actions/setup-oet-stack
      - name: Lint
        run: pnpm run lint
      - name: Vitest
        run: pnpm test -- --reporter=verbose
      - name: Type-check
        run: pnpm exec tsc --noEmit --pretty false
      - name: Build
        run: pnpm run build

  migrations-check:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-oet-stack
      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Pending model changes?
        run: |
          dotnet restore backend/src/OetWithDrHesham.Api/OetWithDrHesham.Api.csproj --nologo
          dotnet build backend/src/OetWithDrHesham.Api/OetWithDrHesham.Api.csproj --configuration Release --nologo
          cd backend/src/OetWithDrHesham.Api
          set +e
          "$HOME/.dotnet/tools/dotnet-ef" migrations has-pending-model-changes --configuration Release --no-build > /tmp/ef.out 2>&1
          ef_status=$?
          set -e
          cat /tmp/ef.out
          if grep -qi "no changes" /tmp/ef.out || [ "$ef_status" -eq 0 ]; then
            echo "OK: no pending model changes."
          else
            echo "FAIL: pending model changes detected or EF check failed - create a migration or fix the EF command." >&2
            exit 1
          fi

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        continue-on-error: true

