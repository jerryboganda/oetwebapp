plan_id: "phase1-critical"
objective: "Map backend auth endpoint patterns, MFA recovery endpoint, and email verification endpoints"
focus_area: "Backend auth and MFA endpoints"
created_at: "2026-04-13T00:00:00Z"
created_by: "gem-researcher"
status: completed

tldr: |
  - All auth endpoints are registered in AuthEndpoints.cs under /v1/auth group (16 endpoints total).
  - MFA recovery uses POST /v1/auth/mfa/recovery with MfaChallengeRequest DTO (Email, Code, ChallengeToken, RecoveryCode) → returns AuthSessionResponse.
  - Email verification has send-OTP and verify-OTP endpoints; no dedicated "resend" — the send endpoint replaces any pending challenge.
  - Three base role policies: LearnerOnly (role=learner), ExpertOnly (role=expert + email_verified), AdminOnly (role=admin + email_verified); plus 9 granular admin permission policies.
  - JWT is HMAC-SHA256 symmetric signing with OnTokenValidated hook verifying account existence and suspension status in the database.

