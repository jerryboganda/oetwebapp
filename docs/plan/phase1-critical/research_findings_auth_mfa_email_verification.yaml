      responsibility: "Page-level animation wrapper for route transitions"
      location: "components/ui/motion-primitives.tsx"
      relationship_to_domain: "domain depends on this (via auth layout)"
    - component: AuthProvider
      responsibility: "Global auth state, exposes all auth operations via useAuth hook"
      location: "contexts/auth-context.tsx"
      relationship_to_domain: "domain depends on this"
    - component: auth-client
      responsibility: "All HTTP calls to backend auth API endpoints, token management"
      location: "lib/auth-client.ts"
      relationship_to_domain: "domain depends on this"
    - component: auth-storage
      responsibility: "Session persistence (local/session storage), pending MFA challenge storage"
      location: "lib/auth-storage.ts"
      relationship_to_domain: "auth-client depends on this"

  interfaces_used_by_domain:
    - interface: AuthContextValue
      location: "contexts/auth-context.tsx:37"
      usage_pattern: "const { completeMfaChallenge, completeRecoveryChallenge, ... } = useAuth();"
    - interface: AuthScreenShellProps
      location: "components/auth/auth-screen-shell.tsx:12"
      usage_pattern: "<AuthScreenShell eyebrow=... title=... subtitle=... footer=...>{children}</AuthScreenShell>"
    - interface: OtpCodeInputProps
      location: "components/auth/otp-code-input.tsx:5"
      usage_pattern: "<OtpCodeInput value={code} onChange={...} disabled={...} />"

  data_flow_involving_domain: |
    1. User signs in → if MFA required, signIn() returns {status: 'mfa_required', challenge} → challenge saved to auth-storage → redirect to /mfa/challenge.
    2. MFA challenge page loads pendingMfaChallenge from auth context (hydrated from storage).
    3. User enters TOTP code → completeMfaChallenge(code) → POST /v1/auth/mfa/challenge → session returned → saved to storage → state updated → router.replace to post-auth destination.
    4. OR user enters recovery code → completeRecoveryChallenge(recoveryCode) → POST /v1/auth/mfa/recovery → same flow.
    5. For email verification: page mounts → sendEmailVerificationOtp(email) → POST /v1/auth/email/send-verification-otp → user enters OTP → verifyEmailOtp(email, code) → POST /v1/auth/email/verify-otp → updates stored user → routes to destination or sign-in.

  key_relationships_to_domain:
    - from: "app/(auth)/mfa/setup/page.tsx"
      to: "components/auth/mfa-setup-card.tsx"
      relationship: imports
    - from: "app/(auth)/mfa/challenge/page.tsx"
      to: "components/auth/mfa-challenge-form.tsx"
      relationship: imports
    - from: "components/auth/mfa-setup-card.tsx"
      to: "contexts/auth-context.tsx"
      relationship: calls
    - from: "components/auth/mfa-challenge-form.tsx"
      to: "contexts/auth-context.tsx"
      relationship: calls
    - from: "app/(auth)/verify-email/page.tsx"
      to: "lib/auth-client.ts"
      relationship: calls
    - from: "contexts/auth-context.tsx"
      to: "lib/auth-client.ts"
      relationship: calls
    - from: "lib/auth-client.ts"
      to: "lib/auth-storage.ts"
      relationship: calls

