domain_security_considerations:
  sensitive_areas:
    - area: "Token storage in Web Storage"
      location: lib/auth-storage.ts
      concern: "JWT tokens in localStorage/sessionStorage are vulnerable to XSS. Not accessible by middleware. CSP mitigates XSS risk (see next.config.ts headers)."
    - area: "Token refresh flow"
      location: lib/auth-client.ts:154-177
      concern: "Refresh token sent in request body (not httpOnly cookie). Refresh uses same fetch-based client-side flow."
    - area: "Public route bypass list"
      location: components/auth/auth-guard.tsx:23-34
      concern: "Hardcoded list must stay in sync with actual public routes. No server-side enforcement."
  authentication_patterns_in_domain: "Bearer JWT auth via Authorization header. Access token + refresh token flow. MFA via authenticator app with recovery codes."
  authorization_patterns_in_domain: "Role-based (learner/expert/admin). Path prefix matching: /admin/* requires admin, /expert/* requires expert, all else requires learner."
  data_validation_in_domain: "isSafeRelativePath() validates redirect targets start with / and not //. Post-auth redirect validates role can access target path."

open_questions:
  - question: "Will middleware need to read auth tokens, and if so, will a cookie-based token storage migration be required?"
    context: "Current tokens are in localStorage/sessionStorage only. Next.js middleware runs on the edge and has NO access to Web Storage. To do server-side auth checks in middleware, a parallel cookie (even a lightweight session indicator or opaque 'logged-in' flag) would need to be set."
    type: decision_blocker
    affects: ["middleware-implementation"]

  - question: "Should middleware handle the full auth check, or only fast-path redirects (e.g., redirect to /sign-in if no auth cookie, redirect wrong-role prefixes)?"
    context: "A full JWT validation in middleware requires crypto operations at the edge. A lightweight approach sets a cookie flag on login and middleware only checks that flag, deferring full validation to client-side AuthGuard."
    type: decision_blocker
    affects: ["middleware-implementation"]

  - question: "How does the Capacitor/native mobile flow interact with cookie-based auth?"
    context: "auth-storage.ts uses lib/mobile/native-storage abstraction. Need to verify cookies work in Capacitor WebView if migrating to cookie-based storage."
    type: research
    affects: ["middleware-implementation", "mobile-compatibility"]

  - question: "Are there any API route handlers (app/api/) that need middleware protection?"
    context: "app/api/ has backend/ and health/ subdirectories. Need to determine if these need auth enforcement at middleware level."
    type: nice_to_know
    affects: ["middleware-implementation"]

